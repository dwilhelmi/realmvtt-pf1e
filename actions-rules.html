<div style="display: flex; flex-direction: column; gap: 4px">
  <label label="Settings" size="md" textalign="center" variant="bold"></label>
  <checkbox
    field="toggleable"
    label="Toggleable"
    description="All modifiers are inactive by default."
    size="sm"
    textalign="right"
  ></checkbox>

  <div style="display: flex; flex-direction: column; gap: 4px; margin-top: 4px">
    <label
      label="Provides Items"
      size="sm"
      textalign="left"
      variant="bold"
    ></label>
    <list
      field="providesItems"
      variant="outline-striped"
      listtype="provides_item_list"
    ></list>
  </div>

  <label label="Modifiers" size="md" textalign="center" variant="bold"></label>

  <list field="modifiers" listtype="modifier_list" variant="striped"></list>

  <label label="FX" size="md" textalign="center" variant="bold"></label>

  <div style="margin-top: 4px">
    <fxcontrol field="animation" label="Animation"></fxcontrol>
  </div>
</div>

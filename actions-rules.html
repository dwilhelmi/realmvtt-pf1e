<div style="display: flex; flex-direction: column; gap: 4px">
  <label label="Settings" size="md" textalign="center" variant="bold"></label>
  <checkbox
    field="toggleable"
    label="Toggleable"
    description="Show a toggle on the Actions tab for a character with this Action."
    size="sm"
    textalign="right"
  ></checkbox>

  <div style="display: flex; flex-direction: row; gap: 4px; margin-top: 4px">
    <div style="display: flex; flex-direction: column; gap: 4px">
      <label
        label="Provides Attack"
        size="sm"
        textalign="left"
        variant="bold"
      ></label>
      <label
        label="Add an Item here if this Feature provides an attack."
        size="sm"
        textalign="left"
        color="dimmed"
        variant="standard"
      ></label>
    </div>
    <list
      field="providesAttacks"
      variant="outline"
      listtype="attached_item_list"
    ></list>
  </div>

  <label label="Modifiers" size="md" textalign="center" variant="bold"></label>

  <list field="modifiers" listtype="modifier_list" variant="striped"></list>

  <label label="FX" size="md" textalign="center" variant="bold"></label>

  <div style="margin-top: 4px">
    <fxcontrol field="animation" label="Animation"></fxcontrol>
  </div>
</div>

<script>
  function handleRoll(attackNumber) {
    const weaponDataPath = getNearestParentDataPath(dataPath);
    const weapon = api.getValue(weaponDataPath);
    performAttackRoll(record, weapon, weaponDataPath, attackNumber);
  }

  function rollDamage(isCritical) {
    const weaponDataPath = getNearestParentDataPath(dataPath);
    const weapon = api.getValue(weaponDataPath);
    performDamageRoll(record, weapon, weaponDataPath, isCritical);
  }

  function untoggleOtherDamage(damageType) {
    const valuesToSet = {};
    const itemDataPath = getNearestParentDataPath(dataPath);

    if (damageType === "bludgeoning") {
      valuesToSet[`${itemDataPath}.data.versatilePiercing`] = false;
      valuesToSet[`${itemDataPath}.data.versatileSlashing`] = false;
    } else if (damageType === "piercing") {
      valuesToSet[`${itemDataPath}.data.versatileBludgeoning`] = false;
      valuesToSet[`${itemDataPath}.data.versatileSlashing`] = false;
    } else if (damageType === "slashing") {
      valuesToSet[`${itemDataPath}.data.versatileBludgeoning`] = false;
      valuesToSet[`${itemDataPath}.data.versatilePiercing`] = false;
    }

    api.setValues(valuesToSet);
  }

  function loadAmmo() {
    // Mark the reload checkbox as true, and send chat message
    const weaponDataPath = getNearestParentDataPath(dataPath);
    const weapon = api.getValue(weaponDataPath);

    api.setValues({
      [`${weaponDataPath}.data.loadedAmmo`]: true,
    });

    api.sendMessage(`**[center]Reloading ${weapon.name}[/center]**`);
  }

  function onAmmoSelectChange(value) {
    // Set ammo field to current amount of ammo
    const inventory = record.data?.inventory || [];
    const ammo = inventory.find((item) => item._id === value);

    const weaponDataPath = getNearestParentDataPath(dataPath);
    const valuesToSet = {
      [`${weaponDataPath}.data.ammo`]: ammo?.data?.count || 0,
    };

    // Check if ammo has uses system
    const usesMax = parseInt(ammo?.data?.uses?.max || "0", 10);
    const usesValue = parseInt(ammo?.data?.uses?.value || "0", 10);

    if (usesMax > 1) {
      // Show uses counter and set values
      valuesToSet[`${weaponDataPath}.fields.uses.value.hidden`] = false;
      valuesToSet[`${weaponDataPath}.data.uses.max`] = usesMax;
      valuesToSet[`${weaponDataPath}.data.uses.value`] = usesValue || usesMax;
    } else {
      // Hide uses counter
      valuesToSet[`${weaponDataPath}.fields.uses.value.hidden`] = true;
    }

    api.setValues(valuesToSet);
  }

  function onUsesChange() {
    // Update the ammo item's uses.value to match the weapon's uses.value
    const weaponDataPath = getNearestParentDataPath(dataPath);
    const weapon = api.getValue(weaponDataPath);
    const ammoSelected = weapon?.data?.ammoSelect;

    if (!ammoSelected) return;

    const inventory = record.data?.inventory || [];
    const usesValue = weapon?.data?.uses?.value;

    // Find the ammo item and update its uses.value
    inventory.forEach((item, index) => {
      if (item._id === ammoSelected) {
        api.setValue(`data.inventory.${index}.data.uses.value`, usesValue);
      }
    });
  }

  function onAmmoChange() {
    // Update all weapons using the same ammo AND the ammo item's count
    const weaponDataPath = getNearestParentDataPath(dataPath);
    const weapon = api.getValue(weaponDataPath);
    let ammoSelected = weapon?.data?.ammoSelect;
    const newAmmoCount = weapon?.data?.ammo;

    // Bombs and thrown weapons don't use ammo select
    const isBomb = weapon?.data?.group?.toLowerCase() === "bomb";
    const isThrown = weapon?.data?.traits?.some((trait) =>
      trait.toLowerCase().startsWith("thrown")
    );

    // If we need ammo select, and we don't have it, return
    if (!ammoSelected && !isBomb && !isThrown) return;
    else if (isBomb || isThrown) {
      // In this case, we just use the weapon itself as the ammo selected
      ammoSelected = weapon._id;
    }

    const inventory = record.data?.inventory || [];
    const valuesToSet = {};

    inventory.forEach((item, index) => {
      // Update the ammo item's count
      if (item._id === ammoSelected) {
        valuesToSet[`data.inventory.${index}.data.count`] = newAmmoCount;
      }
      // Update all other weapons using this ammo
      if (item.data?.ammoSelect === ammoSelected && item._id !== weapon._id) {
        valuesToSet[`data.inventory.${index}.data.ammo`] = newAmmoCount;
      }
    });

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }

  function ammoOptions() {
    // Get all ammo items in the inventory
    const inventory = record.data?.inventory || [];
    const ammoOptions = inventory.filter(
      (item) => item.data?.itemCategory?.toLowerCase() === "ammo"
    );

    return [
      ...ammoOptions.map((ammo) => ({
        value: ammo._id,
        label: ammo.identified !== false ? ammo.name : ammo.unidentifiedName,
      })),
    ];
  }

  function handleStow() {
    const dataPathToWeapon = getNearestParentDataPath(dataPath);
    const weapon = api.getValue(dataPathToWeapon);
    const valuesToSet = {
      [`${dataPathToWeapon}.data.carried`]: "carried",
    };
    api.setValues(valuesToSet);
    const ourToken = api.getToken();

    api.sendMessage(
      `**:one-action: Stowing Weapon: ${weapon.name}**`,
      undefined,
      [],
      [],
      ourToken
    );
  }

  function handleDrop() {
    const dataPathToWeapon = getNearestParentDataPath(dataPath);
    const weapon = api.getValue(dataPathToWeapon);
    const valuesToSet = {
      [`${dataPathToWeapon}.data.carried`]: "dropped",
    };
    api.setValues(valuesToSet);
    const ourToken = api.getToken();

    api.sendMessage(
      `**:free-action: Dropping Weapon: ${weapon.name}**`,
      undefined,
      [],
      [],
      ourToken
    );
  }
</script>

<div style="display: flex; flex-direction: column">
  <!-- Main row for icon, name, buttons -->
  <div
    style="display: flex; flex-direction: row; gap: 4px; align-items: center"
  >
    <div style="width: 30px; height: 30px; min-width: 30px; min-height: 30px">
      <portrait width="30px" height="30px" field="portrait"></portrait>
    </div>
    <div style="width: 100%">
      <namefield
        field="namefield"
        placeholder="Weapon Name..."
        variant="standard"
      ></namefield>
    </div>
    <!--  A way to change to thrown if Throw type is there -->
    <iconbutton
      size="md"
      hidden="true"
      field="meleeToggleBtnDisabled"
      variant="default"
      options='[{"icon": "IconSword", "label": "Melee", "value": "melee"}]'
    >
    </iconbutton>
    <iconbutton
      size="md"
      hidden="true"
      field="rangeToggleBtnDisabled"
      variant="default"
      options='[{"icon": "IconBow", "label": "Ranged", "value": "ranged"}]'
    >
    </iconbutton>
    <iconbutton
      size="md"
      hidden="true"
      field="rangeToggleBtn"
      variant="default"
      options='[{"icon": "IconSword", "label": "Melee", "value": "melee"}, {"icon": "IconBow", "label": "Ranged", "value": "ranged"}]'
    >
    </iconbutton>
    <!-- Select Hand, hidden for two-handed weapons -->
    <iconbutton
      size="md"
      field="handBtn"
      variant="default"
      options='[{"icon": "IconCircleNumber1Filled", "label": "One Hand", "value": "one"}, {"icon": "IconCircleNumber2Filled", "label": "Two-Hands", "value": "two"}]'
    >
    </iconbutton>
    <!-- Roll Attack -->
    <iconbutton
      size="lg"
      field="rollBtn"
      variant="outline"
      options='[{"icon": "D20-1", "label": "Roll 1st Attack", "value": "roll"}]'
      onclick="handleRoll(1);"
    >
    </iconbutton>
    <iconbutton
      size="lg"
      field="rollBtn"
      variant="outline"
      options='[{"icon": "D20-2", "label": "Roll 2nd Attack", "value": "roll"}]'
      onclick="handleRoll(2);"
    >
    </iconbutton>
    <iconbutton
      size="lg"
      field="rollBtn"
      variant="outline"
      options='[{"icon": "D20-3", "label": "Roll 3nd Attack", "value": "roll"}]'
      onclick="handleRoll(3);"
    >
    </iconbutton>
    <div>
      <!-- Roll Damage -->
      <button
        size="xs"
        radius="xs"
        field="damageBtn"
        label="Damage"
        variant="light"
        onclick="rollDamage(false);"
      ></button>
    </div>
    <!-- Roll Crit -->
    <div>
      <button
        size="xs"
        radius="xs"
        field="critBtn"
        label="Critical"
        variant="light"
        color="red"
        onclick="rollDamage(true);"
      ></button>
    </div>
  </div>
  <div
    style="
      display: flex;
      flex-direction: row;
      gap: 4px;
      margin-left: auto;
      align-items: center;
      margin-bottom: 4px;
    "
  >
    <checkbox
      field="versatileBludgeoning"
      editable="true"
      label="Bludgeoning"
      radius="lg"
      size="sm"
      hidden="true"
      onchange="untoggleOtherDamage('bludgeoning');"
    ></checkbox>
    <checkbox
      field="versatilePiercing"
      editable="true"
      label="Piercing"
      size="sm"
      radius="lg"
      hidden="true"
      onchange="untoggleOtherDamage('piercing');"
    ></checkbox>
    <checkbox
      field="versatileSlashing"
      editable="true"
      label="Slashing"
      size="sm"
      radius="lg"
      hidden="true"
      onchange="untoggleOtherDamage('slashing');"
    ></checkbox>
    <button
      size="xs"
      field="stowBtn"
      label="Stow"
      icon="one-action"
      variant="default"
      onclick="handleStow();"
    ></button>
    <button
      size="xs"
      field="dropBtn"
      label="Drop"
      icon="free-action"
      variant="default"
      onclick="handleDrop();"
    ></button>
  </div>
  <!-- Ammo Field for Ranged Weapons -->
  <box field="ammoFields" hidden="true" width="100%">
    <div
      style="
        display: flex;
        flex-direction: row;
        width: 100%;
        gap: 4px;
        align-items: center;
      "
    >
      <div style="margin-left: auto"></div>
      <dropdown
        field="ammoSelect"
        width="150px"
        size="xs"
        hidden="true"
        placeholder="Select Ammo..."
        optionsFunction="return ammoOptions();"
        onchange="onAmmoSelectChange(value);"
      ></dropdown>
      <button
        size="xs"
        field="reloadBtn"
        label="Reload"
        hidden="true"
        variant="light"
        color="secondary"
        onclick="loadAmmo();"
      ></button>
      <checkbox field="loadedAmmo" label="Loaded:" size="xs" hidden="true">
      </checkbox>
      <counter
        field="uses.value"
        hidden="true"
        maxvaluefield="uses.max"
        label="Uses"
        size="xs"
        textalign="center"
        color="cyan"
        editable="true"
        onchange="onUsesChange();"
      ></counter>
      <label size="xs" variant="bold" label="Ammo: "></label>
      <numberfield
        hidden="false"
        field="ammo"
        placeholder="0"
        width="60px"
        variant="tooltip"
        minvalue="0"
        label="Ammo"
        size="xs"
        onchange="onAmmoChange();"
      >
      </numberfield>
    </div>
  </box>
</div>
<stringfield field="hideFromList" hidden="true"></stringfield>

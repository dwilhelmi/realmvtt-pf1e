<script>
  // Show or hide relevant values on load or change of type
  function showHideFields() {
    const backgroundsDataPath = getNearestParentDataPath(dataPath);
    const backgrounds = backgroundsDataPath
      ? api.getValue(backgroundsDataPath)
      : record;
    const dataPrefix = backgroundsDataPath
      ? `${backgroundsDataPath}.data`
      : "data";
    const fieldsPath = backgroundsDataPath
      ? `${backgroundsDataPath}.fields`
      : "fields";

    const valuesToSet = {};

    // Check if traits is set
    if (
      backgrounds.data?.traits &&
      backgrounds.data?.traits.length > 0 &&
      !backgrounds.data?.traitsList
    ) {
      const traitsObjects = [];
      for (const trait of backgrounds.data.traits) {
        traitsObjects.push({
          _id: generateUuid(),
          name: trait,
          identified: true,
          data: {},
        });
      }

      valuesToSet[`${dataPrefix}.traitsList`] = traitsObjects;
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }
</script>

<accordion size="xs" field="descriptionOpen">
  <accordion.control>
    <div style="display: flex; gap: 2px; width: 100%; align-items: center">
      <div style="width: 30px; height: 30px; min-width: 30px; min-height: 30px">
        <portrait width="30px" height="30px" field="portrait"></portrait>
      </div>
      <numberfield
        size="xs"
        width="35px"
        editable="false"
        hidecontrols="true"
        textalign="center"
        variant="tooltip"
        field="level"
        label="Level"
        placeholder="1"
      ></numberfield>
      <label field="namefield" size="sm" variant="bold"></label>
      <iconbutton
        field="actions"
        size="sm"
        variant="subtle"
        color="default"
        disabled="true"
        hidden="true"
        width="max-content"
        options='[{"label": "Standard", "value": "standard"},
    {"label": "Move", "value": "move"},
    {"label": "Full-Round", "value": "fullRound"},
    {"label": "Swift", "value": "swift"},
    {"label": "Free", "value": "free"},
    {"label": "Immediate", "value": "immediate"}]'
      ></iconbutton>
      <div
        style="display: flex; gap: 4px; margin-right: 4px; margin-left: auto"
      >
        <iconbutton
          size="sm"
          variant="filled"
          color="primary"
          onclick="useFeat()"
          options='[{"label": "Send to Chat", "icon": "IconSend", "value": "send"}]'
        ></iconbutton>
      </div>
    </div>
  </accordion.control>
  <div style="margin-top: 4px">
    <richtextfield
      disablecontrols="true"
      field="description"
      placeholder="Feat description..."
    ></richtextfield>
  </div>
</accordion>

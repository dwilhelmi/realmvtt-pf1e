<accordion size="xs" field="descriptionOpen">
  <accordion.control>
    <div style="display: flex; gap: 2px; width: 100%; align-items: center">
      <div style="width: 30px; height: 30px; min-width: 30px; min-height: 30px">
        <portrait width="30px" height="30px" field="portrait"></portrait>
      </div>
      <numberfield
        size="xs"
        width="35px"
        editable="false"
        hidecontrols="true"
        textalign="center"
        variant="tooltip"
        field="level"
        label="Level"
        placeholder="1"
      ></numberfield>
      <label field="namefield" size="sm" variant="bold"></label>
      <iconbutton
        field="actions"
        size="sm"
        variant="subtle"
        color="default"
        disabled="true"
        hidden="true"
        width="max-content"
        options='[{"label": "Free Action", "value": "free", "icon": "free-action"},
    {"label": "One Action", "value": "oneAction", "icon": "one-action"},
    {"label": "Two Actions", "value": "twoActions", "icon": "two-actions"},
    {"label": "Three Actions", "value": "threeActions", "icon": "three-actions"},
    {"label": "1 to 2 Actions", "value": "oneToTwoActions", "icon": "1-to-2"},
    {"label": "1 to 3 Actions", "value": "oneToThreeActions", "icon": "1-to-3"},
    {"label": "2 to 3 Actions", "value": "twoToThreeActions", "icon": "2-to-3"},
    {"label": "Reaction", "value": "reaction", "icon": "reaction"}]'
      ></iconbutton>
      <div
        style="display: flex; gap: 4px; margin-right: 4px; margin-left: auto"
      >
        <iconbutton
          size="sm"
          variant="filled"
          color="primary"
          onclick="useFeat()"
          options='[{"label": "Send to Chat", "icon": "IconSend", "value": "send"}]'
        ></iconbutton>
      </div>
    </div>
  </accordion.control>
  <div style="margin-top: 4px">
    <richtextfield
      disablecontrols="true"
      field="description"
      placeholder="Feat description..."
    ></richtextfield>
  </div>
</accordion>

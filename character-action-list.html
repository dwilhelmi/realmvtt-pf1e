<script>
  function onUseAction() {
    // Get the action by path to ensure most up-to-date value
    const actionDataPath = dataPath.replace(".data.useBtn", "");
    const action = api.getValue(actionDataPath);
    useAction(action);
  }
</script>

<accordion
  size="xs"
  field="descriptionOpen"
  label="Description"
  chevronposition="left"
>
  <accordion.control>
    <div style="display: column; gap: 2px; width: 100%">
      <div style="display: flex; gap: 2px; width: 100%">
        <div
          style="width: 30px; height: 30px; min-width: 30px; min-height: 30px"
        >
          <portrait width="30px" height="30px" field="portrait"></portrait>
        </div>
        <namefield
          size="xs"
          width="100%"
          variant="unstyled"
          field="namefield"
          placeholder="Ability Name..."
        ></namefield>
        <div style="margin-left: auto">
          <button
            size="xs"
            radius="xs"
            field="useBtn"
            label="Use"
            variant="light"
            onclick="onUseAction();"
          ></button>
        </div>
      </div>
    </div>
  </accordion.control>
  <richtextfield
    disablecontrols="true"
    field="description"
    placeholder="Enter description..."
  ></richtextfield>
</accordion>

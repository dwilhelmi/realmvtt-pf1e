<script>
  function rollInitiative() {
    // Roll initiative for the character
    performInitiativeRoll(record);
  }

  function onAddSpellcastingEntry() {
    addSpellcastingEntry(record);
    api.closeOpenedPopovers();
  }
</script>

<div style="display: flex; flex-direction: column; gap: 8px">
  <label
    variant="bold"
    field="attackListLabel"
    label="Attacks"
    size="md"
    textalign="center"
  ></label>
  <div
    style="
      width: 100%;
      display: flex;
      justify-content: flex-end;
      gap: 4px;
      align-items: center;
    "
  >
    <label
      size="xs"
      variant="bold"
      label="Initiative Skill"
      textalign="right"
    ></label>
    <dropdown
      field="initiativeSkill"
      size="xs"
      searchable="true"
      defaultvalue="Perception"
      placeholder="Perception"
      options='[{"label": "Perception", "value": "Perception"}, 
      {"label": "Acrobatics", "value": "Acrobatics"},
      {"label": "Arcana", "value": "Arcana"},
      {"label": "Athletics", "value": "Athletics"},
      {"label": "Crafting", "value": "Crafting"},
      {"label": "Deception", "value": "Deception"},
      {"label": "Diplomacy", "value": "Diplomacy"},
      {"label": "Intimidation", "value": "Intimidation"},
      {"label": "Medicine", "value": "Medicine"},
      {"label": "Nature", "value": "Nature"},
      {"label": "Occultism", "value": "Occultism"},
      {"label": "Performance", "value": "Performance"},
      {"label": "Religion", "value": "Religion"},
      {"label": "Society", "value": "Society"},
      {"label": "Stealth", "value": "Stealth"},
      {"label": "Survival", "value": "Survival"},
      {"label": "Thievery", "value": "Thievery"}]'
    >
    </dropdown>
    <button
      field="rollInitBtn"
      size="xs"
      icon="D20"
      label="Initiative"
      variant="outline"
      onclick="rollInitiative();"
    ></button>
  </div>

  <list
    listtype="polymorph_actions_list"
    variant="striped"
    field="attacks"
  ></list>

  <list listtype="attack_list" variant="striped" field="inventory"></list>
  <list
    listtype="attack_stowed_list"
    variant="striped"
    field="inventory"
  ></list>
  <list
    listtype="attack_dropped_list"
    variant="striped"
    field="inventory"
  ></list>
</div>

<div style="margin-top: 8px">
  <label
    variant="bold"
    field="actionsLabel"
    label="Actions"
    size="md"
    textalign="center"
  ></label>
</div>

<div style="width: 100%">
  <list
    listtype="character_action_list"
    field="actions"
    variant="striped"
  ></list>
</div>

<div style="margin-top: 8px">
  <label
    variant="bold"
    field="spellcastingLabel"
    label="Spellcasting"
    size="md"
    textalign="center"
  ></label>
</div>

<div style="width: 100%">
  <list listtype="spellcasting_entry_list" field="spells"></list>
  <popover>
    <popover.target>
      <div style="margin-top: 4px">
        <button
          size="xs"
          variant="outline"
          icon="IconPlus"
          label="Add Spellcasting Entry"
          hideonlocked="true"
        ></button>
      </div>
    </popover.target>
    <popover.dropdown>
      <div
        style="
          display: flex;
          flex-direction: column;
          gap: 4px;
          width: 200px;
          max-width: 200px;
        "
      >
        <label
          size="xs"
          variant="bold"
          label="Spellcasting Entry Settings"
        ></label>
        <dropdown
          size="xs"
          field="addType"
          placeholder="Select Type..."
          defaultvalue="prepared"
          width="100%"
          disablediflocked="false"
          label="Spellcasting Type"
          options='[{"label": "Prepared", "value": "prepared"},
        {"label": "Spontaneous", "value": "spontaneous"},
        {"label": "Innate", "value": "innate"},
        {"label": "Focus", "value": "focus"},
        {"label": "Item Only", "value": "item"}]'
        ></dropdown>
        <divider></divider>
        <dropdown
          size="xs"
          field="addProficiency"
          placeholder="Select Proficiency..."
          width="100%"
          disablediflocked="false"
          defaultvalue="spell"
          label="Proficiency"
          options='[{"label": "Spell Attack Modifiers & DCs", "value": "spell"},
        {"label": "Class DC", "value": "class"}]'
        ></dropdown>
        <dropdown
          size="xs"
          field="addTradition"
          placeholder="Select Magic Tradition..."
          width="100%"
          disablediflocked="false"
          defaultvalue="Arcane"
          label="Magic Tradition"
          options='[{"label": "Arcane", "value": "Arcane"},
            {"label": "Divine", "value": "Divine"},
            {"label": "Occult", "value": "Occult"},
            {"label": "Primal", "value": "Primal"}]'
        ></dropdown>
        <dropdown
          size="xs"
          field="addAttribute"
          placeholder="Select Attribute..."
          defaultvalue="int"
          width="100%"
          label="Key Attribute"
          disablediflocked="false"
          options='[{"label": "Strength", "value": "str"},
      {"label": "Dexterity", "value": "dex"},
      {"label": "Constitution", "value": "con"},
      {"label": "Intelligence", "value": "int"},
      {"label": "Wisdom", "value": "wis"},
      {"label": "Charisma", "value": "cha"}]'
        ></dropdown>
        <button
          size="xs"
          variant="outline"
          label="Add"
          onclick="onAddSpellcastingEntry();"
        ></button>
      </div>
    </popover.dropdown>
  </popover>
</div>

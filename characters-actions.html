<script>
  function rollInitiative() {
    // Roll initiative for the character
    performInitiativeRoll(record);
  }

  function onAddSpellcastingEntry() {
    addSpellcastingEntry(record);
    api.closeOpenedPopovers();
  }

  function onAddAction() {
    api.getRecord("characters", record._id, (updatedRecord) => {
      onAddEditFeature(updatedRecord);
    });
  }
</script>

<div style="display: flex; flex-direction: column; gap: 8px">
  <label
    variant="bold"
    field="attackListLabel"
    label="Attacks"
    size="md"
    textalign="center"
  ></label>
  <list listtype="toggle_list" variant="striped" field="toggles"></list>
  <div
    style="
      width: 100%;
      display: flex;
      justify-content: flex-end;
      gap: 4px;
      align-items: center;
    "
  >
    <button
      field="rollInitBtn"
      size="xs"
      icon="D20"
      label="Initiative"
      variant="outline"
      onclick="rollInitiative();"
    ></button>
  </div>

  <!-- For polymorph attacks -->
  <list
    listtype="polymorph_actions_list"
    variant="striped"
    field="attacks"
  ></list>

  <!-- For effects that grant strikes -->
  <list
    listtype="attack_list"
    variant="striped"
    field="granted_inventory"
  ></list>
  <!-- For actual attacks -->
  <list listtype="attack_list" variant="striped" field="inventory"></list>
  <list
    listtype="attack_stowed_list"
    variant="striped"
    field="inventory"
  ></list>
  <list
    listtype="attack_dropped_list"
    variant="striped"
    field="inventory"
  ></list>
</div>

<div style="margin-top: 8px">
  <label
    variant="bold"
    field="actionsLabel"
    label="Actions"
    size="md"
    textalign="center"
  ></label>
</div>

<div style="width: 100%">
  <list
    listtype="character_action_list"
    field="actions"
    onchange="onAddAction();"
    variant="striped"
  ></list>
</div>

<div style="margin-top: 8px">
  <label
    variant="bold"
    field="spellcastingLabel"
    label="Spellcasting"
    size="md"
    textalign="center"
  ></label>
</div>

<div style="width: 100%">
  <list listtype="spellcasting_entry_list" field="spells"></list>
  <popover>
    <popover.target>
      <div style="margin-top: 4px">
        <button
          size="xs"
          variant="outline"
          icon="IconPlus"
          label="Add Spellcasting Entry"
          hideonlocked="true"
        ></button>
      </div>
    </popover.target>
    <popover.dropdown>
      <div
        style="
          display: flex;
          flex-direction: column;
          gap: 4px;
          width: 200px;
          max-width: 200px;
        "
      >
        <label
          size="xs"
          variant="bold"
          label="Spellcasting Entry Settings"
        ></label>
        <dropdown
          size="xs"
          field="addType"
          placeholder="Select Type..."
          defaultvalue="prepared"
          width="100%"
          disablediflocked="false"
          label="Spellcasting Type"
          options='[{"label": "Prepared", "value": "prepared"},
        {"label": "Spontaneous", "value": "spontaneous"}]'
        ></dropdown>
        <divider></divider>
        <dropdown
          size="xs"
          field="addAttribute"
          placeholder="Select Attribute..."
          defaultvalue="int"
          width="100%"
          label="Casting Ability"
          disablediflocked="false"
          options='[{"label": "Intelligence", "value": "int"},
      {"label": "Wisdom", "value": "wis"},
      {"label": "Charisma", "value": "cha"}]'
        ></dropdown>
        <button
          size="xs"
          variant="outline"
          label="Add"
          onclick="onAddSpellcastingEntry();"
        ></button>
      </div>
    </popover.dropdown>
  </popover>
</div>

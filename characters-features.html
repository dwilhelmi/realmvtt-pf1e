<script>
  function getSlotFilters(slotType) {
    return [{ field: "featSlotType", operator: "equals", value: slotType }];
  }

  function onAddDeleteFeat() {
    // Requery to ensure we get the correct feats
    api.getRecord("characters", record._id, (updatedRecord) => {
      onAddEditFeature(updatedRecord);
    });
  }
</script>

<div>
  <label variant="bold" textalign="center" label="Feats"></label>
</div>

<div style="display: flex; flex-direction: column; width: 100%; gap: 4px">
  <div
    style="
      display: flex;
      flex-direction: row;
      width: 100%;
      gap: 4px;
      background-color: rgb(from var(--mantine-color-blue-filled) r g b / 0.25);
      border-radius: 4px;
      margin-bottom: 4px;
      padding: 0px 4px;
    "
  >
    <label label="Feats" size="sm" variant="bold"></label>
  </div>

  <list
    listtype="feats_list"
    field="feats"
    getfilters="return getSlotFilters('general');"
    emptylisttext="No Feat Slots"
  ></list>

  <div
    style="
      display: flex;
      flex-direction: row;
      width: 100%;
      gap: 4px;
      background-color: rgb(
        from var(--mantine-color-green-filled) r g b / 0.25
      );
      border-radius: 4px;
      margin-bottom: 4px;
      padding: 0px 4px;
    "
  >
    <label label="Class Bonus Feats" size="sm" variant="bold"></label>
  </div>

  <list
    listtype="feats_list"
    field="feats"
    getfilters="return getSlotFilters('classBonus');"
    emptylisttext="No Class Bonus Feat Slots"
  ></list>

  <div
    style="
      display: flex;
      flex-direction: row;
      width: 100%;
      gap: 4px;
      background-color: rgb(
        from var(--mantine-color-orange-filled) r g b / 0.25
      );
      border-radius: 4px;
      margin-bottom: 4px;
      padding: 0px 4px;
    "
  >
    <label label="Bonus Feats" size="sm" variant="bold"></label>
  </div>

  <list
    listtype="bonus_feats_list"
    field="bonusFeats"
    onchange="onAddDeleteFeat();"
  ></list>
</div>

<div style="margin-top: 8px">
  <label variant="bold" textalign="center" label="Features"></label>
</div>

<div style="width: 100%; display: flex; flex-direction: column; gap: 4px">
  <list
    listtype="character_feature_list"
    field="classes"
    emptylisttext="No Class Features"
  ></list>
  <list
    listtype="character_feature_list"
    field="races"
    emptylisttext="No Racial Traits"
  ></list>
</div>

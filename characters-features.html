<script>
  function getSlotFilters(slotType) {
    return [{ field: "featSlotType", operator: "equals", value: slotType }];
  }

  function onAddDeleteFeat() {
    // Requery to ensure we get the correct feats
    api.getRecord("characters", record._id, (updatedRecord) => {
      onAddEditFeature(updatedRecord);
    });
  }
</script>

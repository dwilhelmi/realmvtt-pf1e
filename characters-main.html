<script>
  function onDrop(type, recordLink) {
    if (type === "ancestry") {
      onDropAncestry(recordLink);
    } else if (type === "heritage") {
      onDropHeritage(recordLink);
    } else if (type === "class") {
      onDropClass(recordLink);
    } else if (type === "background") {
      onDropBackground(recordLink);
    }
  }

  function onDropAncestry(recordLink) {
    // Check if already on Character
    const ancestries = record?.data?.ancestries || [];
    const ancestryName = recordLink.tooltip;
    const ancestryObj = { ...recordLink.value };

    // Add all non-rarity traits to the character
    const traits = ancestryObj.data?.traits || [];
    const nonRarityTraits = traits.filter((trait) => !getIsTraitRarity(trait));
    ancestryObj.data.traits = nonRarityTraits;

    // Set traits list
    const traitsObjects = [];
    for (const trait of nonRarityTraits) {
      traitsObjects.push({
        _id: generateUuid(),
        name: trait,
        identified: true,
        data: {},
      });
    }

    const curTraits = record.data?.traits || [];
    // Ensure uniqueness by using a Set for better deduplication
    const newTraits = [...new Set([...curTraits, ...nonRarityTraits])];

    const curTraitsList = record.data?.traitsList || [];
    // Ensure uniqueness by name, keeping the first occurrence of each trait name
    const newTraitsList = [...curTraitsList, ...traitsObjects].filter(
      (trait, index, self) =>
        self.findIndex((t) => t.name === trait.name) === index
    );

    api.setValues(
      {
        "data.ancestries": [ancestryObj],
        "data.ancestryName": ancestryName,
        "data.size": ancestryObj.data?.size,
        "data.senses": ancestryObj.data?.vision,
        "data.speed": ancestryObj.data?.speed,
        "data.traitsList": newTraitsList,
        "data.traits": newTraits,
      },
      (updatedRecord) => {
        // Recalculate ability scores for bonuses and such
        onAddEditFeature(updatedRecord, () => {
          api.setHidden("ancestries", false, () => {
            api.setHidden("ancestryDetailsLabel", true);
          });
        });
      }
    );
  }

  style="

    flex-direction: column;
    gap: 4px;

  "
>
  <divider field="otherDivider" size="sm" color="primary"></divider>

  <div style="display: flex; flex-direction: row; gap: 4px; width: 100%">
    <dropdown
      width="100%"
      size="xs"
      field="size"
      label="Size"
      placeholder="Medium"
      defaultvalue="medium"

            label="Traits"
            onchange="setTraits(value)"
            optionsfunction="return getTraitOptions();"
          ></dropdown>
        </div>
      </popover.dropdown>
    </popover>
  </div>
</div>

<script>
  function onDrop(type, recordLink) {
    if (type === "races") {
      onDropRace(recordLink);
    } else if (type === "class") {
      onDropClass(recordLink);
    } else if (type === "backgrounds") {
      onDropBackground(recordLink);
    }
  }

  function onDropRace(recordLink) {
    const raceName = recordLink.tooltip;
    const raceObj = { ...recordLink.value };

    // Add all non-rarity traits to the character
    const traits = raceObj.data?.traits || [];
    const nonRarityTraits = traits.filter((trait) => !getIsTraitRarity(trait));
    raceObj.data.traits = nonRarityTraits;

    // Set traits list
    const traitsObjects = [];
    for (const trait of nonRarityTraits) {
      traitsObjects.push({
        _id: generateUuid(),
        name: trait,
        identified: true,
        data: {},
      });
    }

    const curTraits = record.data?.traits || [];
    const newTraits = [...new Set([...curTraits, ...nonRarityTraits])];

    const curTraitsList = record.data?.traitsList || [];
    const newTraitsList = [...curTraitsList, ...traitsObjects].filter(
      (trait, index, self) =>
        self.findIndex((t) => t.name === trait.name) === index
    );

    // Apply racial ability modifiers to current ability scores
    const attributes = ["str", "dex", "con", "int", "wis", "cha"];
    const abilityScoreUpdates = {};
    attributes.forEach((attr) => {
      const racialMod = parseInt(raceObj.data?.[attr + "Mod"] || "0", 10);
      if (racialMod !== 0) {
        const curScore = parseInt(record.data?.abilityScores?.[attr] || "10", 10);
        abilityScoreUpdates[`data.abilityScores.${attr}`] = curScore + racialMod;
      }
    });

    api.setValues(
      {
        "data.races": [raceObj],
        "data.raceName": raceName,
        "data.size": raceObj.data?.size,
        "data.senses": raceObj.data?.vision,
        "data.speed": raceObj.data?.speed,
        "data.traitsList": newTraitsList,
        "data.traits": newTraits,
        "data.reach": raceObj.data?.reach,
        ...abilityScoreUpdates,
      },
      (updatedRecord) => {
        api.setHidden("races", false, () => {
          api.setHidden("raceDetailsLabel", true);
        });
        onAddEditFeature(updatedRecord);
      }
    );
  }

  function updateLanguages(value) {
    setLanguages(value);
  }


  function buildClassLabel(classes) {
    return classes
      .map((c) => `${c.name} ${c.data?.classLevel || 1}`)
      .join(" / ");
  }

  function computeTotalLevel(classes) {
    return classes.reduce(
      (sum, c) => sum + (parseInt(c.data?.classLevel, 10) || 1),
      0
    );
  }

  function onDropClass(recordLink) {
    const existingClasses = record?.data?.classes || [];
    const className = recordLink.tooltip;
    const classObj = { ...recordLink.value };
    classObj.data = classObj.data || {};

    // Check if this class already exists
    const existingIndex = existingClasses.findIndex((c) => c.name === className);
    const newClasses = [...existingClasses];
    let classIndex;

    if (existingIndex >= 0) {
      // Class exists — increment its level
      classIndex = existingIndex;
      newClasses[existingIndex] = {
        ...newClasses[existingIndex],
        data: {
          ...newClasses[existingIndex].data,
          classLevel: (parseInt(newClasses[existingIndex].data?.classLevel, 10) || 0) + 1,
        },
      };
    } else {
      // New class
      classIndex = newClasses.length;
      classObj.data.classLevel = 1;

      const traits = classObj.data?.traits || [];
      const nonRarityTraits = traits.filter((trait) => !getIsTraitRarity(trait));
      classObj.data.traits = nonRarityTraits;
      newClasses.push(classObj);
    }

    // Add traits for new classes
    const valuesToSet = {};
    if (existingIndex < 0) {
      const traits = classObj.data?.traits || [];
      const nonRarityTraits = traits.filter((trait) => !getIsTraitRarity(trait));
      const traitsObjects = nonRarityTraits.map((trait) => ({
        _id: generateUuid(),
        name: trait,
        identified: true,
        data: {},
      }));
      const curTraits = record.data?.traits || [];
      valuesToSet["data.traits"] = [...new Set([...curTraits, ...nonRarityTraits])];
      const curTraitsList = record.data?.traitsList || [];
      valuesToSet["data.traitsList"] = [...curTraitsList, ...traitsObjects].filter(
        (trait, index, self) =>
          self.findIndex((t) => t.name === trait.name) === index
      );
    }

    // Create a classLevels entry
    const hitDie = parseInt(newClasses[classIndex]?.data?.hitDie || "8", 10);
    const classLevels = record.data?.classLevels || [];
    const isFirstLevel = classLevels.length === 0;
    const hp = isFirstLevel ? hitDie : Math.floor(hitDie / 2) + 1;

    const newLevelEntry = {
      _id: generateUuid(),
      name: `${className} ${newClasses[classIndex].data.classLevel}`,
      identified: true,
      data: {
        charLevel: classLevels.length + 1,
        className: className,
        classIndex: classIndex,
        hitDie: hitDie,
        hitDieLabel: `d${hitDie}`,
        hp: hp,
        favoredBonus: "none",
      },
    };

    valuesToSet["data.classes"] = newClasses;
    valuesToSet["data.classLevels"] = [...classLevels, newLevelEntry];
    valuesToSet["data.className"] = buildClassLabel(newClasses);
    valuesToSet["data.level"] = classLevels.length + 1;

    api.setValues(valuesToSet, (updatedRecord) => {
      onAddEditFeature(updatedRecord, () => {
        api.setHidden("classDetailsLabel", true);
      });
    });
  }

  function onDropBackground(recordLink) {
    // Check if already on Character
    const backgrounds = record?.data?.backgrounds || [];
    const backgroundName = recordLink.tooltip;
    const backgroundObj = { ...recordLink.value };

    // Add all non-rarity traits to the character
    const traits = backgroundObj.data?.traits || [];
    const nonRarityTraits = traits.filter((trait) => !getIsTraitRarity(trait));
    backgroundObj.data.traits = nonRarityTraits;

    // Set traits list
    const traitsObjects = [];
    for (const trait of nonRarityTraits) {
      traitsObjects.push({
        _id: generateUuid(),
        name: trait,
        identified: true,
        data: {},
      });
    }

    const curTraits = record.data?.traits || [];
    // Ensure uniqueness by using a Set for better deduplication
    const newTraits = [...new Set([...curTraits, ...nonRarityTraits])];

    const curTraitsList = record.data?.traitsList || [];
    // Ensure uniqueness by name, keeping the first occurrence of each trait name
    const newTraitsList = [...curTraitsList, ...traitsObjects].filter(
      (trait, index, self) =>
        self.findIndex((t) => t.name === trait.name) === index
    );

    api.setValues(
      {
        "data.backgrounds": [backgroundObj],
        "data.backgroundName": backgroundName,
        "data.traitsList": newTraitsList,
        "data.traits": newTraits,
      },
      (updatedRecord) => {
        // Recalculate ability scores for bonuses and such
        onAddEditFeature(updatedRecord, () => {
          api.setHidden("backgrounds", false, () => {
            api.setHidden("backgroundDetailsLabel", true);
          });
        });
      }
    );
  }

  function onDeleteRace() {
    // Reverse racial ability modifiers before removing the race
    const races = record.data?.races || [];
    const race = races[0];
    const attributes = ["str", "dex", "con", "int", "wis", "cha"];
    const abilityScoreUpdates = {};
    if (race) {
      attributes.forEach((attr) => {
        const racialMod = parseInt(race.data?.[attr + "Mod"] || "0", 10);
        if (racialMod !== 0) {
          const curScore = parseInt(record.data?.abilityScores?.[attr] || "10", 10);
          abilityScoreUpdates[`data.abilityScores.${attr}`] = curScore - racialMod;
        }
      });
    }

    api.setValues(abilityScoreUpdates, (updatedRecord) => {
      onAddEditFeature(
        updatedRecord,
        () => {
          api.setHidden("races", true, () => {
            api.setHidden("raceDetailsLabel", false);
          });
        },
        true
      );
    });
  }

  function onClassListChanged() {
    // Called when a class is removed via the record_link_list X button
    // The engine has already updated data.classes, so just recalculate
    const classes = record?.data?.classes || [];
    const classNames = classes.map((c) => c.name);

    // Remove classLevels entries for removed classes
    const classLevels = record.data?.classLevels || [];
    const newClassLevels = classLevels.filter(
      (lvl) => classNames.includes(lvl.data?.className)
    );
    // Re-number charLevel
    newClassLevels.forEach((lvl, i) => {
      lvl.data.charLevel = i + 1;
    });

    // Recalculate class levels from remaining classLevels
    classes.forEach((c) => {
      c.data.classLevel = newClassLevels.filter(
        (lvl) => lvl.data?.className === c.name
      ).length;
    });

    // Remove unused feat slots
    const feats = record.data?.feats || [];
    const remainingFeats = feats.filter((feat) => feat.data?.type !== "slot");

    const valuesToSet = {
      "data.classes": classes,
      "data.classLevels": newClassLevels,
      "data.className": classes.length > 0 ? buildClassLabel(classes) : "",
      "data.level": newClassLevels.length,
      "data.feats": remainingFeats,
    };

    api.setValues(valuesToSet, (updatedRecord) => {
      onAddEditFeature(
        updatedRecord,
        () => {
          if (classes.length === 0) {
            api.setHidden("classes", true);
          }
        },
        true
      );
    });
  }

  function onClassLevelChange(index, value) {
    const classes = record?.data?.classes || [];
    const newLevel = Math.max(1, parseInt(value, 10) || 1);
    classes[index].data.classLevel = newLevel;

    const totalLevel = computeTotalLevel(classes);
    api.setValues(
      {
        "data.classes": classes,
        "data.className": buildClassLabel(classes),
        "data.level": totalLevel,
      },
      (updatedRecord) => {
        onAddEditFeature(updatedRecord);
      }
    );
  }

  function editClassLevels() {
    const classes = record?.data?.classes || [];
    if (classes.length === 0) {
      api.showNotification("No classes to edit. Drag and drop a class first.");
      return;
    }

    // Prompt for which class to edit
    const options = classes.map((c, i) => ({
      label: `${c.name} (Level ${c.data?.classLevel || 1})`,
      value: String(i),
    }));
    api.showPrompt("Edit Class Levels", "Select a class to change its level:", options, (selected) => {
      if (selected === undefined || selected === null) return;
      const classIndex = parseInt(selected, 10);
      const classObj = classes[classIndex];
      if (!classObj) return;

      // Prompt for the new level
      const levelOptions = [];
      for (let i = 1; i <= 20; i++) {
        levelOptions.push({ label: String(i), value: String(i) });
      }
      api.showPrompt("Set Level", `Set level for ${classObj.name}:`, levelOptions, (levelSelected) => {
        if (levelSelected === undefined || levelSelected === null) return;
        onClassLevelChange(classIndex, levelSelected);
      });
    });
  }

  function onDeleteBackground() {
    // Recalculate ability scores for bonuses and such
    onAddEditFeature(
      record,
      () => {
        api.setHidden("backgrounds", true, () => {
          api.setHidden("backgroundDetailsLabel", false);
        });
      },
      // Skip choice processing
      true
    );
  }

  function onLoadCharacter() {
    // Check if we need to show/hide the level up button
    // Check if we need to show/hide the level up button
    if (
      record.data?.xp >= 1000 &&
      record.data?.level < 20 &&
      record.fields?.levelUpBtn?.hidden !== false
    ) {
      api.setHidden("levelUpBtn", false);
    } else if (record.fields?.levelUpBtn?.hidden !== true) {
      api.setHidden("levelUpBtn", true);
    }

    // If this is the first time we're loading the character, add the unarmed attack
    if (!record.data?.initialized) {
      api.setValue("data.initialized", true, () => {

          unidentifiedName: "Unarmed Strike",
          fields: {

            },

            },
            backpackProperties: {

            },
            consumableCategory: {
              hidden: true,
            },
            consumableProperties: {
              hidden: true,
            },
            equipmentCategory: {
              hidden: true,
            },
            kitProperties: {
              hidden: true,
            },
            levelLabel: {
              hidden: true,
            },
            otherProperties: {
              hidden: false,
            },
            scrollProperties: {
              hidden: true,
            },
            shieldProperties: {
              hidden: true,
            },
            weaponCategory: {
              hidden: false,
            },
            weaponProperties: {

            },

            },

            },
          },
          data: {

            traits: ["Attack", "Agile", "Finesse", "Nonlethal", "Unarmed"],

            traitsList: [
              {

                identified: true,
                data: {},
              },
              {
                _id: "21c049b5-a20f-4ca0-95de-cc51a6265d27",

                identified: true,
                data: {},
              },
              {
                _id: "cb9e0428-22fe-4baa-930e-1f1d26625f53",
                name: "Finesse",
                identified: true,
                data: {},
              },
              {
                _id: "b988644b-5cbd-4b0a-bf85-c34a040c4a75",
                name: "Nonlethal",
                identified: true,
                data: {},
              },
              {
                _id: "088ba422-e9c7-4885-9661-5a0fca3e47aa",

                identified: true,
                data: {},
              },
            ],
            type: "weapon",
            level: 0,
            bulk: {
              value: 0,
            },
            itemCategory: "Unarmed",
            group: "Brawling",
            damage: {
              dice: 1,
              die: "d4",
              damageType: "bludgeoning",
            },
          },
          locked: true,
        });
      });
    }
  }

  function onLevelChange(value) {
    onAddEditFeature(record);
  }

  function onXPChange(value) {
    if (value >= 1000 && record.data?.level < 20) {
      api.setHidden("levelUpBtn", false);
    } else {
      api.setHidden("levelUpBtn", true);
    }
  }

  function onLevelUp() {
    const classes = record?.data?.classes || [];
    if (classes.length === 0) {
      api.showNotification("Add a class before leveling up.");
      return;
    }

    // If only one class, level it directly
    if (classes.length === 1) {
      applyLevelUp(0);
      return;
    }

    // Multiple classes — prompt for which to level
    const options = classes.map((c, i) => ({
      label: `${c.name} (currently ${c.data?.classLevel || 1})`,
      value: String(i),
    }));
    api.showPrompt("Level Up", "Which class?", options, (selected) => {
      if (selected !== undefined && selected !== null) {
        applyLevelUp(parseInt(selected, 10));
      }
    });
  }

  function applyLevelUp(classIndex) {
    const classes = record?.data?.classes || [];
    const classObj = classes[classIndex];
    if (!classObj) return;

    classObj.data.classLevel = (parseInt(classObj.data?.classLevel, 10) || 1) + 1;

    // Create a classLevels entry
    const hitDie = parseInt(classObj.data?.hitDie || "8", 10);
    const classLevels = record.data?.classLevels || [];
    const isFirstLevel = classLevels.length === 0;
    const hp = isFirstLevel ? hitDie : Math.floor(hitDie / 2) + 1;

    const newLevelEntry = {
      _id: generateUuid(),
      name: `${classObj.name} ${classObj.data.classLevel}`,
      identified: true,
      data: {
        charLevel: classLevels.length + 1,
        className: classObj.name,
        classIndex: classIndex,
        hitDie: hitDie,
        hitDieLabel: `d${hitDie}`,
        hp: hp,
        favoredBonus: "none",
      },
    };

    const newTotalLevel = computeTotalLevel(classes);
    const newXp = Math.max(0, record.data?.xp - 1000);
    const showLevelUpBtn = newXp >= 1000 && newTotalLevel < 20;

    api.setValues(
      {
        "data.classes": classes,
        "data.classLevels": [...classLevels, newLevelEntry],
        "data.className": buildClassLabel(classes),
        "data.level": newTotalLevel,
        "data.xp": newXp,
        "fields.levelUpBtn.hidden": !showLevelUpBtn,
      },
      (recordUpdated) => {
        onAddEditFeature(recordUpdated);
      }
    );
  }


  function updateSaveProficiency(value, save) {
    const valuesToSet = {};
    updateProficiencies(record, valuesToSet);
    api.setValues(valuesToSet);
  }

  function updatePerceptionProficiency(value) {
    const valuesToSet = {};
    updateProficiencies(record, valuesToSet);
    api.setValues(valuesToSet);
  }

  function rollAbilityCheck(ability) {
    const abilityLabels = {
      str: "Strength",
      dex: "Dexterity",
      con: "Constitution",
      int: "Intelligence",
      wis: "Wisdom",
      cha: "Charisma",
    };
    const label = abilityLabels[ability] || ability.toUpperCase();
    const mod = record.data?.[ability + "Mod"] || 0;
    api.promptRoll(
      `${label} Check`,
      "1d20",
      [{ name: `${label} Mod`, type: "", value: String(mod), active: true }],
      {},
      "ability"
    );
  }

  function performSaveRoll(save) {
    rollSave(record, save);
  }

  function rollPerception() {
    rollSkill(record, "perception");
  }

  function rollStabilizationCheck() {
    const conMod = parseInt(record.data?.con || "0", 10);
    api.promptRoll(
      "Stabilization Check",
      "1d20",
      [{ name: "Con Mod", type: "", value: String(conMod), active: true }],
      {},
      "recovery"
    );
  }

  // PF1e: No shield raising mechanic (shields provide passive AC bonus)

  // PF1e rest: recover HP and reset spells
  function rest() {
    const valuesToSet = {};

    // PF1e: recover character level * Constitution modifier HP (minimum 1 per level)
    const level = record.data?.level || 1;
    const constitution = record.data?.con || 0;
    const constitutionModifier = Math.max(1, constitution);
    const curHp = record.data?.curhp || 0;
    const maxHp = record.data?.hitpoints || 0;

    const healedBy = Math.max(1, constitutionModifier * level);
    const newHp = Math.min(curHp + healedBy, maxHp);

    valuesToSet["data.curhp"] = newHp;

    let message = `Resting for 8 hours.`;
    if (healedBy > 0) {
      message += ` Recovered ${healedBy} HP.`;
    }

    // Reset spells
    const spellcastingEntries = record.data?.spells || [];
    spellcastingEntries.forEach((spellcastingEntry, spellListIndex) => {
      const isSpontaneous = spellcastingEntry.data?.type === "spontaneous";
      const isPrepared = spellcastingEntry.data?.type === "prepared" || !isSpontaneous;

      const spellLists = [
        "cantrips",
        "spells1",
        "spells2",
        "spells3",
        "spells4",
        "spells5",
        "spells6",
        "spells7",
        "spells8",
        "spells9",
      ];

      spellLists.forEach((spellList) => {
        const spells =
          api.getValue(`data.spells.${spellListIndex}.data.${spellList}`) ||
          [];
        if (isPrepared) {
          spells.forEach((spell, index) => {
            const dataPathToSpell = `data.spells.${spellListIndex}.data.${spellList}.${index}`;
            valuesToSet[`${dataPathToSpell}.data.used`] = false;
            valuesToSet[`${dataPathToSpell}.fields.nameUsedBox.hidden`] = true;
            valuesToSet[`${dataPathToSpell}.fields.nameBox.hidden`] = false;
          });
        } else if (isSpontaneous && spellList !== "cantrips") {
          const numSpellsField = `num${capitalize(spellList)}`;
          const usedSpellsField = `used${capitalize(spellList)}`;
          const numSpells =
            api.getValue(
              `data.spells.${spellListIndex}.data.${numSpellsField}`
            ) || 0;
          valuesToSet[
            `data.spells.${spellListIndex}.data.${usedSpellsField}`
          ] = numSpells;
        }
      });
    });

    // Remove fatigued condition if present
    const effects = record?.effects || [];
    const fatiguedEffect = effects.find((effect) =>
      effect.name.toLowerCase().startsWith("fatigued")
    );

    api.setValues(valuesToSet, () => {
      if (fatiguedEffect) {
        message += " Lost the fatigued condition.";
        api.deductEffectById(fatiguedEffect._id, record, () => {
          api.sendMessage(message, undefined, [], []);
        });
      } else {
        api.sendMessage(message, undefined, [], []);
      }
    });
  }
</script>

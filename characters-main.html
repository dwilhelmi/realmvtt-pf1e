<script>
  function onDrop(type, recordLink) {
    if (type === "ancestry") {
      onDropAncestry(recordLink);
    } else if (type === "heritage") {
      onDropHeritage(record, recordLink);
    } else if (type === "class") {
      onDropClass(recordLink);
    } else if (type === "backgrounds") {
      onDropBackground(recordLink);
    }
  }

  function onDropAncestry(recordLink) {
    // Check if already on Character
    const ancestries = record?.data?.ancestries || [];
    const ancestryName = recordLink.tooltip;
    const ancestryObj = { ...recordLink.value };

    // Add all non-rarity traits to the character
    const traits = ancestryObj.data?.traits || [];
    const nonRarityTraits = traits.filter((trait) => !getIsTraitRarity(trait));
    ancestryObj.data.traits = nonRarityTraits;

    // Set traits list
    const traitsObjects = [];
    for (const trait of nonRarityTraits) {
      traitsObjects.push({
        _id: generateUuid(),
        name: trait,
        identified: true,
        data: {},
      });
    }

    const curTraits = record.data?.traits || [];
    // Ensure uniqueness by using a Set for better deduplication
    const newTraits = [...new Set([...curTraits, ...nonRarityTraits])];

    const curTraitsList = record.data?.traitsList || [];
    // Ensure uniqueness by name, keeping the first occurrence of each trait name
    const newTraitsList = [...curTraitsList, ...traitsObjects].filter(
      (trait, index, self) =>
        self.findIndex((t) => t.name === trait.name) === index
    );

    api.setValues(
      {
        "data.ancestries": [ancestryObj],
        "data.ancestryName": ancestryName,
        "data.size": ancestryObj.data?.size,
        "data.senses": ancestryObj.data?.vision,
        "data.speed": ancestryObj.data?.speed,
        "data.traitsList": newTraitsList,
        "data.traits": newTraits,
        // Default to false on add of ancestry
        "data.alternateAncestryBoosts": false,
      },
      (updatedRecord) => {
        // Recalculate ability scores for bonuses and such
        onAddEditFeature(updatedRecord, () => {
          api.setHidden("ancestries", false, () => {
            api.setHidden("ancestryDetailsLabel", true);
          });
          promptForHeritage(updatedRecord, ancestryName);
        });
      }
    );
  }

  function updateLanguages(value) {
    setLanguages(value);
  }

  function promptForHeritage(record, ancestryName) {
    const optionsPrompt = {
      type: "heritage",
      query: {
        $or: [{ "data.ancestry": ancestryName }, { "data.versatile": "yes" }],
      },
    };

    const onSelect = (choices) => {
      const choice = choices && choices.length > 0 ? choices[0] : null;
      if (choice) {
        // Add the heritage to the character, then call the callback
        onDropHeritage(record, {
          tooltip: choice.name,
          value: choice,
        });
      }
    };

    api.showPrompt(
      "Heritage",
      "Select a Heritage",
      "Select Heritage...",
      [],
      optionsPrompt,
      onSelect
    );
  }

  function onDropHeritage(record, recordLink) {
    // Check if already on Character
    const heritages = record?.data?.heritages || [];
    const heritageName = recordLink.tooltip;
    const heritageObj = { ...recordLink.value };

    // Add all non-rarity traits to the character
    const traits = heritageObj.data?.traits || [];
    const nonRarityTraits = traits.filter((trait) => !getIsTraitRarity(trait));
    heritageObj.data.traits = nonRarityTraits;

    // Set traits list
    const traitsObjects = [];
    for (const trait of nonRarityTraits) {
      traitsObjects.push({
        _id: generateUuid(),
        name: trait,
        identified: true,
        data: {},
      });
    }

    const curTraits = record.data?.traits || [];
    // Ensure uniqueness by using a Set for better deduplication
    const newTraits = [...new Set([...curTraits, ...nonRarityTraits])];

    const curTraitsList = record.data?.traitsList || [];
    // Ensure uniqueness by name, keeping the first occurrence of each trait name
    const newTraitsList = [...curTraitsList, ...traitsObjects].filter(
      (trait, index, self) =>
        self.findIndex((t) => t.name === trait.name) === index
    );

    api.setValuesOnRecord(
      record,
      {
        "data.heritages": [heritageObj],
        "data.heritageName": heritageName,
        "data.traitsList": newTraitsList,
        "data.traits": newTraits,
      },
      (updatedRecord2) => {
        // Recalculate ability scores for bonuses and such
        onAddEditFeature(updatedRecord2, () => {
          api.setHidden("heritages", false, () => {
            api.setHidden("heritageDetailsLabel", true);
          });
        });
      }
    );
  }

  function onDropClass(recordLink) {
    // Check if already on Character
    const classes = record?.data?.classes || [];
    const className = recordLink.tooltip;
    const classObj = { ...recordLink.value };

    // Add all non-rarity traits to the character
    const traits = classObj.data?.traits || [];
    const nonRarityTraits = traits.filter((trait) => !getIsTraitRarity(trait));
    classObj.data.traits = nonRarityTraits;

    // Set traits list
    const traitsObjects = [];
    for (const trait of nonRarityTraits) {
      traitsObjects.push({
        _id: generateUuid(),
        name: trait,
        identified: true,
        data: {},
      });
    }

    const curTraits = record.data?.traits || [];
    // Ensure uniqueness by using a Set for better deduplication
    const newTraits = [...new Set([...curTraits, ...nonRarityTraits])];

    const curTraitsList = record.data?.traitsList || [];
    // Ensure uniqueness by name, keeping the first occurrence of each trait name
    const newTraitsList = [...curTraitsList, ...traitsObjects].filter(
      (trait, index, self) =>
        self.findIndex((t) => t.name === trait.name) === index
    );

    api.setValues(
      {
        "data.level": record.data?.level || 1, // Set level to 1 if not set
        "data.classes": [classObj],
        "data.className": className,
        "data.traitsList": newTraitsList,
        "data.traits": newTraits,
        "data.keyAbility":
          classObj.data?.keyAbility?.length > 0
            ? classObj.data?.keyAbility[0]
            : "none",
      },
      (updatedRecord) => {
        // Recalculate ability scores for bonuses and such
        onAddEditFeature(updatedRecord, () => {
          api.setHidden("classes", false, () => {
            api.setHidden("classDetailsLabel", true);
          });
        });
      }
    );
  }

  function onDropBackground(recordLink) {
    // Check if already on Character
    const backgrounds = record?.data?.backgrounds || [];
    const backgroundName = recordLink.tooltip;
    const backgroundObj = { ...recordLink.value };

    // Add all non-rarity traits to the character
    const traits = backgroundObj.data?.traits || [];
    const nonRarityTraits = traits.filter((trait) => !getIsTraitRarity(trait));
    backgroundObj.data.traits = nonRarityTraits;

    // Set traits list
    const traitsObjects = [];
    for (const trait of nonRarityTraits) {
      traitsObjects.push({
        _id: generateUuid(),
        name: trait,
        identified: true,
        data: {},
      });
    }

    const curTraits = record.data?.traits || [];
    // Ensure uniqueness by using a Set for better deduplication
    const newTraits = [...new Set([...curTraits, ...nonRarityTraits])];

    const curTraitsList = record.data?.traitsList || [];
    // Ensure uniqueness by name, keeping the first occurrence of each trait name
    const newTraitsList = [...curTraitsList, ...traitsObjects].filter(
      (trait, index, self) =>
        self.findIndex((t) => t.name === trait.name) === index
    );

    const providesFeats = backgroundObj.data?.feats || [];

    api.setValues(
      {
        "data.backgrounds": [backgroundObj],
        "data.backgroundName": backgroundName,
        "data.traitsList": newTraitsList,
        "data.traits": newTraits,
      },
      (updatedRecord) => {
        // Recalculate ability scores for bonuses and such
        // Add the feats to the character
        addFeatsToCharacter(updatedRecord, providesFeats, () => {
          // Then recalculate features
          onAddEditFeature(updatedRecord, () => {
            api.setHidden("backgrounds", false, () => {
              api.setHidden("backgroundDetailsLabel", true);
            });
          });
        });
      }
    );
  }

  function onDeleteAncestry() {
    // Recalculate ability scores for bonuses and such
    onAddEditFeature(
      record,
      () => {
        api.setHidden("ancestries", true, () => {
          api.setHidden("ancestryDetailsLabel", false);
        });
      },
      // Skip choice processing
      true
    );
  }

  function onDeleteHeritage() {
    // Recalculate ability scores for bonuses and such
    onAddEditFeature(
      record,
      () => {
        api.setHidden("heritages", true, () => {
          api.setHidden("heritageDetailsLabel", false);
        });
      },
      // Skip choice processing
      true
    );
  }

  function onDeleteClass() {
    // Remove all unused feat slots
    const feats = record.data?.feats || [];
    const remainingFeats = feats.filter((feat) => feat.data?.type !== "slot");
    api.setValues(
      {
        "data.feats": remainingFeats,
      },
      (updatedRecord) => {
        // Recalculate ability scores for bonuses and such
        onAddEditFeature(
          updatedRecord,
          () => {
            api.setHidden("classes", true, () => {
              api.setHidden("classDetailsLabel", false);
            });
          },
          // Skip choice processing
          true
        );
      }
    );
  }

  function onDeleteBackground() {
    // Recalculate ability scores for bonuses and such
    onAddEditFeature(
      record,
      () => {
        api.setHidden("backgrounds", true, () => {
          api.setHidden("backgroundDetailsLabel", false);
        });
      },
      // Skip choice processing
      true
    );
  }

  function onLoadCharacter() {
    // Check if we need to show/hide the level up button
    // If we're not doing a change to boost fields, check if we need to show/hide the level up button
    if (
      record.data?.xp >= 1000 &&
      record.data?.level < 20 &&
      record.fields?.levelUpBtn?.hidden !== false
    ) {
      api.setHidden("levelUpBtn", false);
    } else if (record.fields?.levelUpBtn?.hidden !== true) {
      api.setHidden("levelUpBtn", true);
    }
  }

  function onLevelChange(value) {
    const valuesToSet = {
      "fields.freeBoostsLevel5.hidden": true,
      "fields.freeBoostsLevel10.hidden": true,
      "fields.freeBoostsLevel15.hidden": true,
      "fields.freeBoostsLevel20.hidden": true,
    };

    if (value >= 5) {
      valuesToSet["fields.freeBoostsLevel5.hidden"] = false;
    } else {
      valuesToSet["data.freeBoostsLevel5"] = [];
    }
    if (value >= 10) {
      valuesToSet["fields.freeBoostsLevel10.hidden"] = false;
    } else {
      valuesToSet["data.freeBoostsLevel10"] = [];
    }
    if (value >= 15) {
      valuesToSet["fields.freeBoostsLevel15.hidden"] = false;
    } else {
      valuesToSet["data.freeBoostsLevel15"] = [];
    }
    if (value >= 20) {
      valuesToSet["fields.freeBoostsLevel20.hidden"] = false;
    } else {
      valuesToSet["data.freeBoostsLevel20"] = [];
    }

    api.setValues(valuesToSet, (updatedRecord) => {
      // Update everything using the new level, prompting for choices if
      // needed
      onAddEditFeature(updatedRecord);
    });
  }

  function onXPChange(value) {
    if (value >= 1000 && record.data?.level < 20) {
      api.setHidden("levelUpBtn", false);
    } else {
      api.setHidden("levelUpBtn", true);
    }
  }

  function onLevelUp() {
    // Increase level by 1, max 20
    const newLevel = Math.min(20, record.data?.level + 1);
    const newXp = Math.max(0, record.data?.xp - 1000);
    const showLevelUpBtn = newXp >= 1000 && newLevel < 20;
    api.setValues(
      {
        "data.level": newLevel,
        // Decrease XP by 1000
        "data.xp": newXp,
        // Hide the level up button if XP needed
        "fields.levelUpBtn.hidden": !showLevelUpBtn,
      },
      (recordUpdated) => {
        // Recalculate features including any choices we need to now make
        onAddEditFeature(recordUpdated);
      }
    );
  }

  function updateAbilityBoosts(value, field) {
    const boosts = {
      ancestryBoost1: record.data?.ancestryBoost1,
      ancestryBoost2: record.data?.ancestryBoost2,
      backgroundBoost1: record.data?.backgroundBoost1,
      backgroundBoost2: record.data?.backgroundBoost2,
      classBoost: record.data?.keyAbility,
      freeBoosts: record.data?.freeBoosts || [],
      freeBoostsLevel5: record.data?.freeBoostsLevel5 || [],
      freeBoostsLevel10: record.data?.freeBoostsLevel10 || [],
      freeBoostsLevel15: record.data?.freeBoostsLevel15 || [],
      freeBoostsLevel20: record.data?.freeBoostsLevel20 || [],
    };

    if (boosts[field]) {
      boosts[field] = value;
    }

    const valuesToSet = {
      "fields.ancestryBoostError.hidden": true,
      "fields.backgroundBoostError.hidden": true,
    };

    // Check for invalid ancestry/background boosts
    if (
      boosts.ancestryBoost1 &&
      boosts.ancestryBoost2 &&
      boosts.ancestryBoost1 === boosts.ancestryBoost2
    ) {
      valuesToSet["fields.ancestryBoostError.hidden"] = false;
    }

    if (
      boosts.backgroundBoost1 &&
      boosts.backgroundBoost2 &&
      boosts.backgroundBoost1 === boosts.backgroundBoost2
    ) {
      valuesToSet["fields.backgroundBoostError.hidden"] = false;
    }

    api.setValues(valuesToSet, () => {
      onAddEditFeature(record, undefined, true);
    });
  }

  function updateSaveProficiency(value, save) {
    const valuesToSet = {};
    updateProficiencies(record, valuesToSet);
    api.setValues(valuesToSet);
  }

  function updatePerceptionProficiency(value) {
    const valuesToSet = {};
    updateProficiencies(record, valuesToSet);
    api.setValues(valuesToSet);
  }

  function performSaveRoll(save) {
    rollSave(record, save);
  }

  function rollPerception() {
    rollSkill(record, "perception");
  }

  function rollRecoveryCheck() {
    api.promptRoll("Recovery Check", "1d20", [], {}, "recovery");
  }

  function raiseShield(value) {
    if (value === "raiseShield") {
      const ourToken = api.getToken();
      if (ourToken) {
        api.floatText(ourToken, "Raising a Shield", "#0000ff");
      }
      api.sendMessage(
        "**[center]Raising a Shield[/center]**",
        undefined,
        [],
        [],
        ourToken
      );
    }
    if (value === "lowerShield") {
      const ourToken = api.getToken();
      if (ourToken) {
        api.floatText(ourToken, "Lowering a Shield", "#0000ff");
      }
      api.sendMessage(
        "**[center]Lowering a Shield[/center]**",
        undefined,
        [],
        [],
        ourToken
      );
    }
  }

  function rest() {
    // Implemen when spells/other things that reset on rest are added
    // Reset all things, and add HP per rules
    console.log("TODO REST");
  }

  function onAlternateAncestryBoostsChange(value) {
    setAncestryBoostFields(value, true);
  }

  function setAncestryBoostFields(
    overrideAlternateAncestryBoosts,
    updateStats = false
  ) {
    // If alternateAncestryBoosts is true, or if we're human, we show ancestryBoost2
    let alternateAncestryBoosts =
      overrideAlternateAncestryBoosts || record.data?.alternateAncestryBoosts;

    const ancestry = record.data?.ancestries || [];
    const ancestryName = ancestry[0]?.data?.name || record.data?.ancestryName;
    let showAlternateAncestryBoostOptions = true;
    if (ancestryName && ancestryName.toLowerCase().startsWith("human")) {
      showAlternateAncestryBoostOptions = false;
    }
    // We can also check if they have two free ability boosts already
    if (Object.keys(ancestry[0]?.data?.boosts || {}).length >= 2) {
      const boosts = Object.values(ancestry[0]?.data?.boosts || {});
      const freeBoosts = boosts.filter((boost) => boost.length === 6);
      if (freeBoosts.length >= 2) {
        showAlternateAncestryBoostOptions = false;
      }
    }

    const valuesToSet = {};

    if (!showAlternateAncestryBoostOptions) {
      alternateAncestryBoosts = false;
    }

    if (!overrideAlternateAncestryBoosts && record.data?.ancestryBoost2) {
      valuesToSet["data.ancestryBoost2"] = "";
    }

    if (
      showAlternateAncestryBoostOptions &&
      record.fields?.alternateAncestryBoosts?.hidden !== false
    ) {
      valuesToSet["fields.alternateAncestryBoosts.hidden"] = false;
    } else if (
      !showAlternateAncestryBoostOptions &&
      record.fields?.alternateAncestryBoosts?.hidden !== true
    ) {
      valuesToSet["fields.alternateAncestryBoosts.hidden"] = true;
    }

    // Check if we need to show ancestryBoost2
    if (
      (alternateAncestryBoosts || !showAlternateAncestryBoostOptions) &&
      record.fields?.ancestryBoost2?.hidden !== false
    ) {
      valuesToSet["fields.ancestryBoost2.hidden"] = false;
    } else if (
      !alternateAncestryBoosts &&
      showAlternateAncestryBoostOptions &&
      record.fields?.ancestryBoost2?.hidden !== true
    ) {
      valuesToSet["fields.ancestryBoost2.hidden"] = true;
    }

    // Get the provided boosts flaws from ancestry which we show unless using alternate boosts
    let ancestryBoosts = "";
    let ancestryFlaws = "";
    if (!alternateAncestryBoosts && showAlternateAncestryBoostOptions) {
      // Get the boosts/flaws from ancestry
      let allBoosts = [];
      let allFlaws = [];
      const boosts = ancestry[0]?.data?.boosts || {};
      const flaws = ancestry[0]?.data?.flaws || {};
      // Assume that arrays of 1 are boosts that are provided to us
      for (const boost of Object.values(boosts)) {
        if (boost.length === 1) {
          allBoosts.push(getLabelForAbility(boost[0]));
        }
      }
      for (const flaw of Object.values(flaws)) {
        if (flaw.length === 1) {
          allFlaws.push(getLabelForAbility(flaw[0]));
        }
      }

      ancestryBoosts = `Boosts: ${allBoosts.join(", ")}`;
      ancestryFlaws = `Flaws: ${allFlaws.join(", ")}`;

      if (record.fields?.ancestryBoostLabel?.hidden !== false) {
        valuesToSet["fields.ancestryBoostLabel.hidden"] = false;
      }
      if (record.fields?.ancestryFlawLabel?.hidden !== false) {
        valuesToSet["fields.ancestryFlawLabel.hidden"] = false;
      }

      if (record.data?.ancestryBoostLabel !== ancestryBoosts) {
        valuesToSet["data.ancestryBoostLabel"] = ancestryBoosts;
      }
      if (record.data?.ancestryFlawLabel !== ancestryFlaws) {
        valuesToSet["data.ancestryFlawLabel"] = ancestryFlaws;
      }
    } else {
      if (record.fields?.ancestryBoostLabel?.hidden !== true) {
        valuesToSet["fields.ancestryBoostLabel.hidden"] = true;
      }
      if (record.fields?.ancestryFlawLabel?.hidden !== true) {
        valuesToSet["fields.ancestryFlawLabel.hidden"] = true;
      }
    }

    if (Object.keys(valuesToSet).length > 0) {
      const callback = updateStats
        ? () => {
            onAddEditFeature(record, undefined, true);
          }
        : undefined;

      api.setValues(valuesToSet, callback);
    }
  }

  function getAncestryBoostOptions(field) {
    // For ancestries we will assume they always have at least 1 free ability boost
    // and that the second if, using alternate boosts, is free as well
    return [
      { label: "Strength", value: "str" },
      { label: "Dexterity", value: "dex" },
      { label: "Constitution", value: "con" },
      { label: "Intelligence", value: "int" },
      { label: "Wisdom", value: "wis" },
      { label: "Charisma", value: "cha" },
    ];
  }

  function getClassBoostOptions() {
    const results = [];

    // Look at class
    const classes = record.data?.classes || [];
    for (const classObj of classes) {
      const keyAbility = classObj.data?.keyAbility || [];
      for (const ability of keyAbility) {
        results.push({
          label: getLabelForAbility(ability),
          value: ability,
        });
      }
      // Look for class features
      const features = classObj.data?.features || [];
      for (const feature of features) {
        const keyAbility = feature.data?.keyOptions || [];
        for (const ability of keyAbility) {
          results.push({
            label: getLabelForAbility(ability),
            value: ability,
          });
        }
      }
    }

    if (results.length === 0) {
      // Just return the default boosts
      return [
        { label: "Strength", value: "str" },
        { label: "Dexterity", value: "dex" },
        { label: "Constitution", value: "con" },
        { label: "Intelligence", value: "int" },
        { label: "Wisdom", value: "wis" },
        { label: "Charisma", value: "cha" },
      ];
    }

    return results;
  }

  function getBackgroundBoostOptions(field) {
    // Get the boosts already provided by the background and return the default less those
    // Or if none, return the default
    let boosts = [
      { label: "Strength", value: "str" },
      { label: "Dexterity", value: "dex" },
      { label: "Constitution", value: "con" },
      { label: "Intelligence", value: "int" },
      { label: "Wisdom", value: "wis" },
      { label: "Charisma", value: "cha" },
    ];

    const background = record.data?.backgrounds?.[0]?.data;
    const backgroundBoosts = background?.boosts || {};

    if (field === "backgroundBoost1") {
      // Took at boosts.0 from background
      if (backgroundBoosts?.["0"] && backgroundBoosts["0"].length > 0) {
        boosts = backgroundBoosts?.["0"].map((boost) => ({
          label: getLabelForAbility(boost),
          value: boost,
        }));
      }
    } else if (field === "backgroundBoost2") {
      // Took at boosts.1 from background
      if (backgroundBoosts?.["1"] && backgroundBoosts["1"].length > 0) {
        boosts = backgroundBoosts?.["1"].map((boost) => ({
          label: getLabelForAbility(boost),
          value: boost,
        }));
      }
    }

    return boosts;
  }
</script>

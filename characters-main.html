<script>
  function onDrop(type, recordLink) {
    if (type === "races") {
      onDropRace(recordLink);
    } else if (type === "class") {
      onDropClass(recordLink);
    } else if (type === "backgrounds") {
      onDropBackground(recordLink);
    }
  }

  function onDropRace(recordLink) {
    const raceName = recordLink.tooltip;
    const raceObj = { ...recordLink.value };

    // Add all non-rarity traits to the character
    const traits = raceObj.data?.traits || [];
    const nonRarityTraits = traits.filter((trait) => !getIsTraitRarity(trait));
    raceObj.data.traits = nonRarityTraits;

    // Set traits list
    const traitsObjects = [];
    for (const trait of nonRarityTraits) {
      traitsObjects.push({
        _id: generateUuid(),
        name: trait,
        identified: true,
        data: {},
      });
    }

    const curTraits = record.data?.traits || [];
    const newTraits = [...new Set([...curTraits, ...nonRarityTraits])];

    const curTraitsList = record.data?.traitsList || [];
    const newTraitsList = [...curTraitsList, ...traitsObjects].filter(
      (trait, index, self) =>
        self.findIndex((t) => t.name === trait.name) === index
    );

    api.setValues(
      {
        "data.races": [raceObj],
        "data.raceName": raceName,
        "data.size": raceObj.data?.size,
        "data.senses": raceObj.data?.vision,
        "data.speed": raceObj.data?.speed,
        "data.traitsList": newTraitsList,
        "data.traits": newTraits,
        "data.reach": raceObj.data?.reach,
      },
      (updatedRecord) => {
        api.setHidden("races", false, () => {
          api.setHidden("raceDetailsLabel", true);
        });
        onAddEditFeature(updatedRecord);
      }
    );
  }

  function updateLanguages(value) {
    setLanguages(value);
  }


  function onDropClass(recordLink) {
    // Check if already on Character
    const classes = record?.data?.classes || [];
    const className = recordLink.tooltip;
    const classObj = { ...recordLink.value };

    // Add all non-rarity traits to the character
    const traits = classObj.data?.traits || [];
    const nonRarityTraits = traits.filter((trait) => !getIsTraitRarity(trait));
    classObj.data.traits = nonRarityTraits;

    // Set traits list
    const traitsObjects = [];
    for (const trait of nonRarityTraits) {
      traitsObjects.push({
        _id: generateUuid(),
        name: trait,
        identified: true,
        data: {},
      });
    }

    const curTraits = record.data?.traits || [];
    // Ensure uniqueness by using a Set for better deduplication
    const newTraits = [...new Set([...curTraits, ...nonRarityTraits])];

    const curTraitsList = record.data?.traitsList || [];
    // Ensure uniqueness by name, keeping the first occurrence of each trait name
    const newTraitsList = [...curTraitsList, ...traitsObjects].filter(
      (trait, index, self) =>
        self.findIndex((t) => t.name === trait.name) === index
    );

    api.setValues(
      {
        "data.level": record.data?.level || 1, // Set level to 1 if not set
        "data.classes": [classObj],
        "data.className": className,
        "data.traitsList": newTraitsList,
        "data.traits": newTraits,
      },
      (updatedRecord) => {
        // Recalculate ability scores for bonuses and such
        onAddEditFeature(updatedRecord, () => {
          api.setHidden("classes", false, () => {
            api.setHidden("classDetailsLabel", true);
          });
        });
      }
    );
  }

  function onDropBackground(recordLink) {
    // Check if already on Character
    const backgrounds = record?.data?.backgrounds || [];
    const backgroundName = recordLink.tooltip;
    const backgroundObj = { ...recordLink.value };

    // Add all non-rarity traits to the character
    const traits = backgroundObj.data?.traits || [];
    const nonRarityTraits = traits.filter((trait) => !getIsTraitRarity(trait));
    backgroundObj.data.traits = nonRarityTraits;

    // Set traits list
    const traitsObjects = [];
    for (const trait of nonRarityTraits) {
      traitsObjects.push({
        _id: generateUuid(),
        name: trait,
        identified: true,
        data: {},
      });
    }

    const curTraits = record.data?.traits || [];
    // Ensure uniqueness by using a Set for better deduplication
    const newTraits = [...new Set([...curTraits, ...nonRarityTraits])];

    const curTraitsList = record.data?.traitsList || [];
    // Ensure uniqueness by name, keeping the first occurrence of each trait name
    const newTraitsList = [...curTraitsList, ...traitsObjects].filter(
      (trait, index, self) =>
        self.findIndex((t) => t.name === trait.name) === index
    );

    api.setValues(
      {
        "data.backgrounds": [backgroundObj],
        "data.backgroundName": backgroundName,
        "data.traitsList": newTraitsList,
        "data.traits": newTraits,
      },
      (updatedRecord) => {
        // Recalculate ability scores for bonuses and such
        onAddEditFeature(updatedRecord, () => {
          api.setHidden("backgrounds", false, () => {
            api.setHidden("backgroundDetailsLabel", true);
          });
        });
      }
    );
  }

  function onDeleteRace() {
    onAddEditFeature(
      record,
      () => {
        api.setHidden("races", true, () => {
          api.setHidden("raceDetailsLabel", false);
        });
      },
      true
    );
  }

  function onDeleteClass() {
    // Remove all unused feat slots
    const feats = record.data?.feats || [];
    const remainingFeats = feats.filter((feat) => feat.data?.type !== "slot");
    api.setValues(
      {
        "data.feats": remainingFeats,
      },
      (updatedRecord) => {
        // Recalculate ability scores for bonuses and such
        onAddEditFeature(
          updatedRecord,
          () => {
            api.setHidden("classes", true, () => {
              api.setHidden("classDetailsLabel", false);
            });
          },
          // Skip choice processing
          true
        );
      }
    );
  }

  function onDeleteBackground() {
    // Recalculate ability scores for bonuses and such
    onAddEditFeature(
      record,
      () => {
        api.setHidden("backgrounds", true, () => {
          api.setHidden("backgroundDetailsLabel", false);
        });
      },
      // Skip choice processing
      true
    );
  }

    // Check if we need to show/hide the level up button

      record.fields?.levelUpBtn?.hidden !== false
    ) {

    } else if (record.fields?.levelUpBtn?.hidden !== true) {
      api.setHidden("levelUpBtn", true);
    }

    // If this is the first time we're loading the character, add the unarmed attack
    if (!record.data?.initialized) {

          portrait: "/images/bc390eaa-d17a-4022-a1ca-fa388c12e498_29.webp",

          identified: true,
          unidentifiedName: "Unarmed Strike",
          fields: {

            armorProperties: {

            },
            backpackProperties: {

            },
            consumableCategory: {

            },
            consumableProperties: {

            },
            equipmentCategory: {

            },
            kitProperties: {

            },
            levelLabel: {

            otherProperties: {

            traitsList: [
              {

                name: "Attack",

                data: {},
              },
              {
                _id: "21c049b5-a20f-4ca0-95de-cc51a6265d27",
                name: "Agile",
                identified: true,
                data: {},
              },
              {
                _id: "cb9e0428-22fe-4baa-930e-1f1d26625f53",
                name: "Finesse",
                identified: true,
                data: {},
              },
              {
                _id: "b988644b-5cbd-4b0a-bf85-c34a040c4a75",
                name: "Nonlethal",
                identified: true,
                data: {},
              },
              {
                _id: "088ba422-e9c7-4885-9661-5a0fca3e47aa",
                name: "Unarmed",
                identified: true,
                data: {},
              },
            ],
            type: "weapon",
            level: 0,
            bulk: {
              value: 0,
            },
            itemCategory: "Unarmed",
            group: "Brawling",
            damage: {
              dice: 1,
              die: "d4",
              damageType: "bludgeoning",
            },
          },
          locked: true,
        });
      });
    }
  }

  function onLevelChange(value) {
    onAddEditFeature(record);
  }

  function onXPChange(value) {
    if (value >= 1000 && record.data?.level < 20) {
      api.setHidden("levelUpBtn", false);
    } else {
      api.setHidden("levelUpBtn", true);
    }
  }

  function onLevelUp() {
    // Increase level by 1, max 20
    const newLevel = Math.min(20, record.data?.level + 1);
    const newXp = Math.max(0, record.data?.xp - 1000);
    const showLevelUpBtn = newXp >= 1000 && newLevel < 20;
    api.setValues(
      {
        "data.level": newLevel,
        // Decrease XP by 1000
        "data.xp": newXp,
        // Hide the level up button if XP needed
        "fields.levelUpBtn.hidden": !showLevelUpBtn,
      },
      (recordUpdated) => {
        // Recalculate features including any choices we need to now make
        onAddEditFeature(recordUpdated);
      }
    );
  }


  function updateSaveProficiency(value, save) {
    const valuesToSet = {};
    updateProficiencies(record, valuesToSet);
    api.setValues(valuesToSet);
  }

  function updatePerceptionProficiency(value) {
    const valuesToSet = {};
    updateProficiencies(record, valuesToSet);
    api.setValues(valuesToSet);
  }

  function rollAbilityCheck(ability) {
    const abilityLabels = {
      str: "Strength",
      dex: "Dexterity",
      con: "Constitution",
      int: "Intelligence",
      wis: "Wisdom",
      cha: "Charisma",
    };
    const label = abilityLabels[ability] || ability.toUpperCase();
    const mod = record.data?.[ability + "Mod"] || 0;
    api.promptRoll(
      `${label} Check`,
      "1d20",
      [{ name: `${label} Mod`, type: "", value: String(mod), active: true }],
      {},
      "ability"
    );
  }

  function performSaveRoll(save) {
    rollSave(record, save);
  }

  function rollPerception() {
    rollSkill(record, "perception");
  }

  function rollRecoveryCheck() {
    api.promptRoll("Recovery Check", "1d20", [], {}, "recovery");
  }

  function raiseShield(value) {
    if (value === "true") {
      const ourToken = api.getToken();
      if (ourToken) {
        api.floatText(ourToken, "Raising a Shield", "#0000ff");
      }
      api.sendMessage(
        "**[center]Raising a Shield[/center]**",
        undefined,
        [],
        [],
        ourToken
      );
    }
    if (value === "false") {
      const ourToken = api.getToken();
      if (ourToken) {
        api.floatText(ourToken, "Lowering a Shield", "#0000ff");
      }
      api.sendMessage(
        "**[center]Lowering a Shield[/center]**",
        undefined,
        [],
        [],
        ourToken
      );
    }

    onAddEditFeature(record, undefined, true);
  }

  function shortRest() {
    // Recover 1 focus point for all focus spellcasting entries
    const valuesToSet = {};
    let focusPointsRecovered = 0;

    const spellcastingEntries = record.data?.spells || [];
    spellcastingEntries.forEach((spellcastingEntry, spellListIndex) => {
      const isFocus = spellcastingEntry.data?.type === "focus";

      if (isFocus) {
        const currentFocusPool = spellcastingEntry.data?.focusPool || 0;
        // Reduce focus pool by 1 (minimum 0)
        const newFocusPool = Math.max(0, currentFocusPool - 1);
        if (newFocusPool < currentFocusPool) {
          valuesToSet[`data.spells.${spellListIndex}.data.focusPool`] =
            newFocusPool;
          focusPointsRecovered++;
        }
      }
    });

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet, () => {
        api.sendMessage(
          `Refocusing (10 minutes). Recovered ${focusPointsRecovered} Focus Point${
            focusPointsRecovered !== 1 ? "s" : ""
          }.`,
          undefined,
          [],
          []
        );
      });
    } else {
      api.sendMessage(
        "Refocusing (10 minutes). No Focus Points to recover.",
        undefined,
        [],
        []
      );
    }
  }

  // Resets spells, alchemy for alchemists, and provides healing
  function rest() {
    const valuesToSet = {};

    // Add HP per resting rules
    // - The character regains Hit Points equal to their Constitution modifier (minimum 1) multiplied by their level.
    const level = record.data?.level || 0;
    const constitution = record.data?.con || 0;
    const constitutionModifier = Math.max(1, constitution);
    const curHp = record.data?.curhp || 0;
    const maxHp = record.data?.hitpoints || 0;

    const healedBy = Math.max(1, constitutionModifier * level);
    const newHp = Math.min(curHp + healedBy, maxHp);

    valuesToSet["data.curhp"] = newHp;

    let message = `Resting for the day.`;
    if (healedBy > 0) {
      message += ` Recovered ${healedBy} HP.`;
    }

    // Detemine if any spells need to be reset
    const spellcastingEntries = record.data?.spells || [];
    spellcastingEntries.forEach((spellcastingEntry, spellListIndex) => {
      const isInnate =
        spellcastingEntry.data?.type === "innate" ||
        spellcastingEntry.data?.type === "item";
      const isFocus = spellcastingEntry.data?.type === "focus";
      const isSpontaneous = spellcastingEntry.data?.type === "spontaneous";
      const isPrepared =
        spellcastingEntry.data?.type === "prepared" ||
        (!isInnate && !isFocus && !isSpontaneous);

      const spellLists = [
        "cantrips",
        "spells1",
        "spells2",
        "spells3",
        "spells4",
        "spells5",
        "spells6",
        "spells7",
        "spells8",
        "spells9",
      ];

      // If it's not a focus spell entry we go through each spell list of the entry
      if (!isFocus) {
        spellLists.forEach((spellList) => {
          const spells =
            api.getValue(`data.spells.${spellListIndex}.data.${spellList}`) ||
            [];
          // Go through each spell if it's innate or praepared
          if (isInnate || isPrepared) {
            spells.forEach((spell, index) => {
              const dataPathToSpell = `data.spells.${spellListIndex}.data.${spellList}.${index}`;
              if (isInnate) {
                // If this is innate, we reset uses of the spell
                const maxUses = spell.data?.maxUses || 0;
                valuesToSet[`${dataPathToSpell}.data.uses`] = maxUses;
              } else if (isPrepared) {
                // If it's a prepared spell, we need to mark the spell as not used
                valuesToSet[`${dataPathToSpell}.data.used`] = false;
                valuesToSet[
                  `${dataPathToSpell}.fields.nameUsedBox.hidden`
                ] = true;
                valuesToSet[`${dataPathToSpell}.fields.nameBox.hidden`] = false;
              }
            });
          } else if (isSpontaneous && spellList !== "cantrips") {
            // If this is a spontaneous spell, we need to reset the used spells
            const numSpellsField = `num${capitalize(spellList)}`;
            const usedSpellsField = `used${capitalize(spellList)}`;
            const numSpells =
              api.getValue(
                `data.spells.${spellListIndex}.data.${numSpellsField}`
              ) || 0;
            valuesToSet[
              `data.spells.${spellListIndex}.data.${usedSpellsField}`
            ] = numSpells;
          }
        });
      } else {
        // If this is a focus spell entry we just reset the focus pool
        valuesToSet[`data.spells.${spellListIndex}.data.focusPool`] = 0;
      }
    });

    // Reset advanced alchemy items (for Alchemist class)
    const advancedAlchemyItems = record.data?.advancedAlchemyItems || [];
    advancedAlchemyItems.forEach((item, index) => {
      const itemFieldsPath = `data.advancedAlchemyItems.${index}.fields`;
      const itemDataPath = `data.advancedAlchemyItems.${index}.data`;
      valuesToSet[`${itemDataPath}.craftingDeleteBtn`] = "markCrafted";
      valuesToSet[`${itemFieldsPath}.markedNameBox.hidden`] = true;
      valuesToSet[`${itemFieldsPath}.unmarkedNameBox.hidden`] = false;
    });

    let hasAlchemistClass = false;
    const classObjs = record.data?.classes || [];
    for (const classObj of classObjs) {
      if (classObj?.name.toLowerCase().startsWith("alchemist")) {
        hasAlchemistClass = true;
      }
    }

    // Remove all infused items
    const inventory = record.data?.inventory || [];
    const itemsToRemove = [];
    inventory.forEach((item, index) => {
      // Ignore versatile vials since we handle it separately
      const traits = item?.data?.traits || [];
      const hasInfusedTrait = traits
        .map((trait) => trait.toLowerCase())
        .includes("infused");
      if (
        hasInfusedTrait &&
        !item?.name.toLowerCase().startsWith("versatile vial")
      ) {
        itemsToRemove.push(item._id);
      }
    });
    if (itemsToRemove.length > 0) {
      message += " Removed all infused items.";
    }

    let needToAddVials = false;
    let numVersatileVials = 0;
    if (hasAlchemistClass) {
      // Make sure versatilie vials is refreshed
      // During your daily preparations, you can create a number of versatile vials up to 2 + your Intelligence modifier
      const int = record.data?.int || 0;
      numVersatileVials = 2 + int;
      const versatileVials = inventory.find((item) =>
        item?.name.toLowerCase().startsWith("versatile vial")
      );
      if (versatileVials) {
        const versatileVialsIndex = inventory.findIndex(
          (item) => item._id === versatileVials._id
        );
        const itemDataPath = `data.inventory.${versatileVialsIndex}.data`;
        valuesToSet[`${itemDataPath}.count`] = numVersatileVials;
      } else {
        needToAddVials = true;
      }
      message += " Refreshed Versatile Vials.";
    }

    // Find effects that need to be modified
    const effects = record?.effects || [];
    const fatiguedEffect = effects.find((effect) =>
      effect.name.toLowerCase().startsWith("fatigued")
    );
    const doomedEffect = effects.find((effect) =>
      effect.name.toLowerCase().startsWith("doomed")
    );
    const drainedEffect = effects.find((effect) =>
      effect.name.toLowerCase().startsWith("drained")
    );

    // Process effects after all item operations complete
    const processEffects = () => {
      // The character loses the fatigued condition
      if (fatiguedEffect) {
        message += " Lost the fatigued condition.";
        api.deductEffectById(fatiguedEffect._id, record, () => {
          // The character reduces the severity of the doomed condition by 1
          if (doomedEffect) {
            message += " Doomed condition reduced by 1.";
            api.deductEffectById(doomedEffect._id, record, () => {
              // The character reduces the severity of the drained condition by 1
              if (drainedEffect) {
                message += " Drained condition reduced by 1.";
                api.deductEffectById(drainedEffect._id, record, () => {
                  api.sendMessage(message, undefined, [], []);
                });
              } else {
                api.sendMessage(message, undefined, [], []);
              }
            });
          } else if (drainedEffect) {
            message += " Drained condition reduced by 1.";
            api.deductEffectById(drainedEffect._id, record, () => {
              api.sendMessage(message, undefined, [], []);
            });
          } else {
            api.sendMessage(message, undefined, [], []);
          }
        });
      } else {
        // No fatigued effect, check for doomed
        if (doomedEffect) {
          message += " Doomed condition reduced by 1.";
          api.deductEffectById(doomedEffect._id, record, () => {
            if (drainedEffect) {
              message += " Drained condition reduced by 1.";
              api.deductEffectById(drainedEffect._id, record, () => {
                api.sendMessage(message, undefined, [], []);
              });
            } else {
              api.sendMessage(message, undefined, [], []);
            }
          });
        } else if (drainedEffect) {
          message += " Drained condition reduced by 1.";
          api.deductEffectById(drainedEffect._id, record, () => {
            api.sendMessage(message, undefined, [], []);
          });
        } else {
          api.sendMessage(message, undefined, [], []);
        }
      }
    };

    const queryAndAddVials = () => {
      // Look for an item call "Versatile Vial"
      api.getRecordByTypeAndName("items", "Versatile Vial", (item) => {
        if (item) {
          api.addValue(
            "data.inventory",
            {
              ...item,
              data: {
                ...item.data,
                carried: "carried",
                ammo: numVersatileVials,
                count: numVersatileVials,
              },
              fields: {
                ...(item.fields || {}),
                ...getItemFields(item),
              },
            },
            () => {
              if (itemsToRemove.length > 0) {
                removeValuesSequentially(itemsToRemove, processEffects);
              } else {
                processEffects();
              }
            }
          );
        } else if (itemsToRemove.length > 0) {
          removeValuesSequentially(itemsToRemove, processEffects);
        } else {
          processEffects();
        }
      });
    };

    // Chain effect changes synchronously through callbacks
    api.setValues(valuesToSet, () => {
      if (needToAddVials) {
        queryAndAddVials();
      } else {
        if (itemsToRemove.length > 0) {
          removeValuesSequentially(itemsToRemove, processEffects);
        } else {
          processEffects();
        }
      }
    });
  }

  function removeValuesSequentially(itemIds, callback) {
    // Remove items by ID using removeValueFromRecord to maintain updated record state
    // Start by getting the initial record
    api.getRecord(record.recordType, record._id, (currentRecord) => {
      function removeNext(idIndex, workingRecord) {
        if (idIndex >= itemIds.length) {
          // All items removed, call the callback
          if (callback) {
            callback();
          }
          return;
        }

        const itemIdToRemove = itemIds[idIndex];
        const currentInventory = workingRecord.data?.inventory || [];
        const itemIndex = currentInventory.findIndex(
          (item) => item._id === itemIdToRemove
        );

        if (itemIndex === -1) {
          // Item not found, move to next
          removeNext(idIndex + 1, workingRecord);
          return;
        }

        api.removeValueFromRecord(
          workingRecord,
          `data.inventory`,
          itemIndex,
          (updatedRecord) => {
            // Move to the next item with the updated record
            removeNext(idIndex + 1, updatedRecord);
          }
        );
      }

      // Start removing from the first item
      if (itemIds.length === 0) {
        if (callback) {
          callback();
        }
        return;
      }

      removeNext(0, currentRecord);
    });
  }
</script>

<div style="display: flex; flex-direction: row">
  <!-- PORTAIT, HP, AC, Level, XP, Hero Points -->
  <div style="display: flex; flex-direction: column">
    <div
      style="
        width: 130px;
        min-width: 130px;
        max-width: 130px;
        min-height: 130px;
        max-height: 130px;
      "
    >
      <portrait width="130px" height="130px"></portrait>
    </div>
  </div>

  <div
    style="
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%;
      margin-left: 4px;
    "
  >
    <div style="width: 100%; display: flex; gap: 4px; align-items: flex-end">
      <numberfield
        width="60px"
        placeholder="0"
        size="xs"
        field="level"
        label="Level"
        minvalue="0"
        defaultvalue="0"
        onchange="onLevelChange(value)"
      >
      </numberfield>

      <numberfield
        placeholder="0"
        width="100px"
        size="xs"
        field="xp"
        label="XP"
        maxvalue="1000"
        minvalue="0"
        onchange="onXPChange(value)"
      >
      </numberfield>

      <div
        style="
          display: flex;
          flex-direction: row;
          gap: 8px;
          margin-left: auto;
          align-items: center;
        "
      >
        <numberfield
          placeholder="0"
          width="60px"
          size="xs"
          field="classDC"
          label="Class DC"
          minvalue="0"
          defaultvalue="0"
        >
        </numberfield>

        <div>
          <label
            size="xs"
            variant="bold"
            field="heroPtsLabel"
            label="Hero Points"
          ></label>
          <counter
            field="heroPoints"
            size="md"
            icon="IconCrown"
            maxvalue="3"
            minvalue="0"
          ></counter>
        </div>
      </div>
    </div>

    <div style="width: 100%">
      <progressbar
        field="nextLevelProgress"
        label=""
        width="100%"
        maxvalue="1000"
        currentvaluefield="xp"
        color="primary"
      ></progressbar>
    </div>

    <div style="width: 100%; display: flex; gap: 4px">
      <numberfield
        icon="IconHeart"
        width="50%"
        placeholder="0"
        field="curhp"
        label="Current HP"
        color="pink"
      >
      </numberfield>

      <numberfield
        icon="IconHeartFilled"
        width="50%"
        placeholder="0"
        field="hitpoints"
        label="Max HP"
        color="green"
      ></numberfield>

      <numberfield
        width="50%"
        placeholder="0"
        field="tempHp"
        label="Temp HP"
        color="blue"
      >
      </numberfield>
    </div>
  </div>
</div>

<divider
  field="attributes"
  label="Attribute Modifiers"
  size="md"
  color="primary"
></divider>

<!-- STATS -->

  style="
    display: flex;
    flex-direction: row;
    gap: 8px;
    margin-top: 4px;
    justify-content: center;
    width: 100%;
    margin-bottom: 4px;
  "
>
  <numberfield
    placeholder="0"

    placeholder="0"

    width="70px"

    textalign="center"
  ></numberfield>

  <numberfield
    placeholder="0"
    size="md"
    width="70px"
    field="constitution"

    showsign="true"

    textalign="center"

  <numberfield
    placeholder="0"
    size="md"
    width="70px"
    field="intelligence"
    label="INT"
    showsign="true"
    onchange="updateStat(value, 'intelligence')"
    textalign="center"

  <numberfield
    placeholder="0"
    size="md"
    width="70px"
    field="wisdom"

  <numberfield

<!-- SAVING THROWS -->

></divider>

<div

    display: flex;
    flex-direction: row;
    gap: 8px;
    margin-top: 4px;
    width: 100%;
    justify-content: center;
    align-items: flex-end;
  "
>
  <div
    style="display: flex; flex-direction: column; gap: 2px; text-align: center"
  >
    <label field="fortLabel" size="xs" variant="bold" label="Fortitude"></label>

      style="

  <div

    ></dropdown>
  </div>

  <div
    style="display: flex; flex-direction: column; gap: 2px; text-align: center"
  >

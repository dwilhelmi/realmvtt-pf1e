<div style="display: flex; flex-direction: row">
  <!-- PORTAIT, HP, Level, XP, Hero Points -->
  <div style="display: flex; flex-direction: column">
    <div
      style="
        width: 130px;
        min-width: 130px;
        max-width: 130px;
        min-height: 130px;
        max-height: 130px;
      "
    >
      <portrait width="130px" height="130px"></portrait>
    </div>
  </div>

  <div
    style="
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%;
      margin-left: 4px;
    "
  >
    <div style="width: 100%; display: flex; gap: 4px; align-items: flex-end">
      <numberfield
        width="60px"
        placeholder="0"
        size="xs"
        field="level"
        label="Level"
        minvalue="0"
        defaultvalue="0"
        onchange="onLevelChange(value)"
      >
      </numberfield>

      <numberfield
        placeholder="0"
        width="100px"
        size="xs"
        field="xp"
        label="XP"
        maxvalue="1000"
        minvalue="0"
        onchange="onXPChange(value)"
      >
      </numberfield>

      <div
        style="
          display: flex;
          flex-direction: row;
          gap: 8px;
          margin-left: auto;
          align-items: center;
        "
      >
        <numberfield
          placeholder="0"
          width="60px"
          size="xs"
          field="classDC"
          label="Class DC"
          minvalue="0"
          defaultvalue="0"
        >
        </numberfield>

        <div>
          <label
            size="xs"
            variant="bold"
            field="heroPtsLabel"
            textalign="center"
            label="Hero Points"
          ></label>
          <counter
            field="heroPoints"
            size="md"
            icon="IconCrown"
            maxvalue="3"
            minvalue="0"
          ></counter>
        </div>
      </div>
    </div>

    <div style="width: 100%">
      <progressbar
        field="nextLevelProgress"
        label=""
        width="100%"
        maxvalue="1000"
        currentvaluefield="xp"
        color="primary"
      ></progressbar>
    </div>

    <div style="width: 100%; display: flex; gap: 4px">
      <numberfield
        icon="IconHeart"
        width="50%"
        placeholder="0"
        field="curhp"
        label="Current HP"
        color="pink"
      >
      </numberfield>

      <numberfield
        icon="IconHeartFilled"
        width="50%"
        placeholder="0"
        field="hitpoints"
        label="Max HP"
        color="green"
      ></numberfield>

      <numberfield
        width="50%"
        placeholder="0"
        field="tempHp"
        label="Temp HP"
        color="blue"
      >
      </numberfield>
    </div>
  </div>
</div>

<!-- Armor, Shield, Dying / Wounded / Recovery Check and Rest -->

    ;
  >

      variant="light"

<!-- STATS -->
<div
  style="
    display: flex;
    flex-direction: row;
    gap: 8px;

    placeholder="0"
    size="md"

    field="dexterity"
    label="DEX"

    textalign="center"

  <numberfield
    placeholder="0"
    size="md"
    width="70px"

    field="intelligence"

    placeholder="0"
    size="md"
    width="70px"

  <popover
    position="bottom"
    offset="4"
    witharrow="true"
    onclose="updateAbilityBoosts()"
  >
    <popover.target>
      <iconbutton
        size="md"
        variant="light"
        hideonlocked="true"
        options='[{"icon": "IconEdit", "label": "Edit Ability Boosts", "value": "abilityBonus"}]'
        field="Edit Ability Boosts"
      ></iconbutton>
    </popover.target>
    <popover.dropdown>
      <div style="display: flex; flex-direction: column; gap: 4px">
        <label size="xs" variant="bold" label="Ancestry Boosts"></label>
        <checkbox
          field="alternateAncestryBoosts"
          label="Use Alternate Ability Selection"
          size="xs"
          color="primary"
          onchange="onAlternateAncestryBoostsChange(value)"
        ></checkbox>
        <div style="display: flex; flex-direction: row; gap: 4px">
          <dropdown
            size="xs"
            field="ancestryBoost1"
            placeholder="Choose Ability"
            optionsfunction="return getAncestryBoostOptions('ancestryBoost1');"
          ></dropdown>
          <dropdown
            size="xs"
            field="ancestryBoost2"
            placeholder="Choose Ability"
            hidden="true"
            onload="isAncestryBoost2Disabled()"
            optionsfunction="return getAncestryBoostOptions('ancestryBoost2');"
          ></dropdown>
        </div>
      </div>
      <div style="display: flex; flex-direction: column; gap: 4px">
        <label size="xs" variant="bold" label="Background Boosts"></label>
      </div>
      <div style="display: flex; flex-direction: column; gap: 4px">
        <label size="xs" variant="bold" label="Class Boosts"></label>
      </div>
      <div style="display: flex; flex-direction: column; gap: 4px">
        <label size="xs" variant="bold" label="Free Boosts"></label>
      </div>
    </popover.dropdown>
  </popover>
</div>

<div>
  <label variant="bold" textalign="center" label="Notes and Backstory"></label>
</div>

<div style="display: flex; flex-direction: row; gap: 4px">
  <stringfield
    width="100%"
    field="deity"
    label="Deity or Patron"
    placeholder="None"
  ></stringfield>
</div>

<div style="margin-top: 8px; display: flex; flex-direction: row; gap: 4px">
  <stringfield
    width="33%"
    field="age"
    label="Age"
    placeholder="Enter your Age..."
  ></stringfield>
  <stringfield
    width="33%"
    field="height"
    label="Height"
    placeholder="Enter your Height..."
  ></stringfield>
  <stringfield
    width="33%"
    field="weight"
    label="Weight"
    placeholder="Enter your Weight..."
  ></stringfield>
</div>

<div style="margin-top: 8px; display: flex; flex-direction: row; gap: 4px">
  <stringfield
    width="50%"
    field="gender"
    label="Gender"
    placeholder="Enter your Gender..."
  ></stringfield>
  <stringfield
    width="50%"
    field="pronouns"
    label="Pronouns"
    placeholder="Enter your Pronouns..."
  ></stringfield>
</div>

<div style="margin-top: 8px">
  <label textalign="center" label="Notes" variant="bold"></label>
  <richtextfield
    field="notes"
    placeholder="Enter additional details..."
  ></richtextfield>
</div>

<script>
  function performSkillCheck(skill) {
    rollSkill(record, skill);
  }

  function onRanksChange() {
    onAddEditFeature(record);
  }

  function onMiscChange() {
    onAddEditFeature(record);
  }

  function onClassSkillChange() {
    onAddEditFeature(record);
  }

  function rollSubcategorySkill(fieldPath) {
    const skillData = api.getValue(fieldPath);
    const name = skillData.name;
    const mod = parseInt(skillData.data?.mod || "0", 10);
    const rank = parseInt(skillData.data?.ranks || "0", 10);
    const ability = skillData.data?.ability || "int";
    rollSkill(record, name, null, true, mod, rank, ability);
  }
</script>

<script>
  // Show or hide relevant values on load or change of type
  function showHideFields() {
    const classDataPath = getNearestParentDataPath(dataPath);
    const classObj = classDataPath ? api.getValue(classDataPath) : record;
    const dataPrefix = classDataPath ? `${classDataPath}.data` : "data";
    const fieldsPath = classDataPath ? `${classDataPath}.fields` : "fields";

    const valuesToSet = {};

    // Check if traits is set
    if (
      classObj.data?.traits &&
      classObj.data?.traits.length > 0 &&
      !classObj.data?.traitsList
    ) {
      const traitsObjects = [];
      for (const trait of classObj.data.traits) {
        traitsObjects.push({
          _id: generateUuid(),
          name: trait,
          identified: true,
          data: {},
        });
      }

      valuesToSet[`${dataPrefix}.traitsList`] = traitsObjects;
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }
</script>

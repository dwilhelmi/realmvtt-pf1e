<div
  style="
    display: flex;
    gap: 4px;
    flex-direction: column;
    width: 100%;
    margin-bottom: 4px;
  "

    size="md"
    textalign="center"
    variant="bold"
    label="Class Rules"

      width: 100%;

      padding: 0px 4px;
      margin-top: 4px;
    "

  </div>

<script>
  function onCraftItem() {
    const itemDataPath = getNearestParentDataPath(dataPath);
    const item = api.getValue(itemDataPath);
    const dc = item.data?.craftingDC || 0;

    const craftingOutcomes = {
      criticalSuccess:
        "**Critical Success** Your attempt is successful. Each additional day spent Crafting reduces the materials needed to complete the item by an amount based on your level + 1 and your proficiency rank in Crafting.",
      success:
        "**Success** Your attempt is successful. Each additional day spent Crafting reduces the materials needed to complete the item by an amount based on your level and your proficiency rank.",
      failure:
        "**Failure** You fail to complete the item. You can salvage the raw materials you supplied for their full value. If you want to try again, you must start over.",
      criticalFailure:
        "**Critical Failure** You fail to complete the item. You ruin 10% of the raw materials you supplied, but you can salvage the rest. If you want to try again, you must start over.",
    };
    rollSkill(
      record,
      "crafting",
      dc,
      false,
      0,
      1,
      "int",
      false,
      false,
      undefined,
      {
        itemDataPath: itemDataPath,
        criticalSuccessMessage: craftingOutcomes.criticalSuccess,
        successMessage: craftingOutcomes.success,
        failureMessage: craftingOutcomes.failure,
        criticalFailureMessage: craftingOutcomes.criticalFailure,
      }
    );
  }

  function convertCurrencyToString(totalCp) {
    // Convert copper pieces to gold pieces (100 cp = 1 gp)
    const gp = totalCp / 100;

    // If it's a whole number, show no decimals
    if (gp % 1 === 0) {
      return `${gp} gp`;
    }

    // Otherwise show up to 2 decimal places
    return `${gp.toFixed(2)} gp`;
  }

  function onQuantityChange() {
    const itemDataPath = getNearestParentDataPath(dataPath);
    const item = api.getValue(itemDataPath);
    const quantity = item.data?.craftingQuantity || 1;

    // Calculate crafting cost based on new quantity
    const price = item.data?.price?.value || {};
    const cpPerItem =
      (price.pp || 0) * 1000 +
      (price.gp || 0) * 100 +
      (price.sp || 0) * 10 +
      (price.cp || 0);
    const totalCp = cpPerItem * quantity;
    const craftingCost = convertCurrencyToString(totalCp);

    // Update the crafting cost
    api.setValues({
      [`${itemDataPath}.data.craftingCost`]: craftingCost,
    });
  }
</script>

<div style="height: 30px; display: flex; gap: 4px; align-items: center">
  <div style="width: 30px; min-width: 30px">
    <portrait width="30px" height="30px" name="portrait"></portrait>
  </div>
  <div style="flex-grow: 1">
    <namefield
      size="xs"
      variant="standard"
      placeholder="Item"
      field="namefield"
    ></namefield>
  </div>
  <div
    style="
      width: 40px;
      border-bottom: 1px solid var(--mantine-color-default-border);
    "
  >
    <numberfield
      size="xs"
      width="100%"
      variant="unstyled"
      textalign="center"
      field="craftingDC"
      hidecontrols="true"
      placeholder="0"
    >
    </numberfield>
  </div>
  <div style="width: 60px">
    <stringfield
      size="xs"
      width="100%"
      variant="tooltip-underline"
      textalign="center"
      label="Cost"
      field="craftingCost"
      editable="false"
      placeholder="0 gp"
    >
    </stringfield>
  </div>
  <div style="width: 50px">
    <numberfield
      size="xs"
      width="100%"
      variant="tooltip"
      label="Quantity"
      minvalue="1"
      field="craftingQuantity"
      onchange="onQuantityChange()"
      placeholder="0"
    >
    </numberfield>
  </div>
  <div style="width: 90px">
    <button
      size="xs"
      variant="light"
      color="tertiary"
      field="craftingDeleteBtn"
      icon="IconHammer"
      label="Craft"
      onclick="onCraftItem()"
    ></button>
  </div>
</div>

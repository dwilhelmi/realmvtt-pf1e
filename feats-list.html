<script>
  function onDrop(value, recordLink) {
    const dataPathToFeat = getNearestParentDataPath(dataPath);
    const featSlot = api.getValue(dataPathToFeat);
    const feat = recordLink?.value;

    if (value === "feats") {
      // Requery the record to get the latest record
      api.getRecord(record.recordType, record._id, (updatedRecord) => {
        onDropFeat(updatedRecord, value, recordLink);
      });
    }
  }

  function onDropFeat(updatedRecord, value, recordLink) {
    const dataPathToFeat = getNearestParentDataPath(dataPath);
    const featSlot = api.getValueOnRecord(updatedRecord, dataPathToFeat);
    const feat = recordLink?.value;

    // If this is a feat slot, we set it
    const valuesToSet = {};

    // Make sure it matches the LEVEL of the slots and the featSlotType else
    // notify error
    const featLevel = parseInt(feat?.data?.level || "0", 10);
    const slotLevel = parseInt(featSlot?.data?.level || "0", 10);
    const featSlotType = featSlot?.data?.featSlotType;
    const featType = feat?.data?.type;

    // Check if feat level is too high for the slot
    if (featLevel > slotLevel) {
      api.showNotification(
        `This slot requires a level of ${slotLevel} or lower.`,
        "red",
        "Feat Level Mismatch"
      );
      return;
    }

    // Check if feat type matches slot type
    // PF1e slot types: "general" accepts any feat, "classBonus" accepts combat feats for fighters etc.
    if (featSlotType === "classBonus") {
      // Class bonus feat slots — typically accept combat feats but we allow any for flexibility
      // GMs can enforce restrictions via feat type field
    }

    if (featSlot.data?.type === "slot") {
      valuesToSet[`${dataPathToFeat}`] = {
        ...feat,
        _id: featSlot?._id,
        data: {
          ...feat?.data,
          level: featSlot?.data?.level,
          featSlotType: featSlot?.data?.featSlotType,
          slotOrder: featSlot?.data?.slotOrder,
        },
        fields: {
          ...(feat?.fields || {}),
          featDetails: { hidden: false },
          featSlot: { hidden: true },
        },
      };

      api.setValuesOnRecord(updatedRecord, valuesToSet, (updatedRecord2) => {
        onAddEditFeature(updatedRecord2);
      });
    }
  }

  function clearFeat() {
    const dataPathToFeat = getNearestParentDataPath(dataPath);
    const featSlot = api.getValue(dataPathToFeat);

    onDeleteFeat = () => {
      if (featSlot.data?.type !== "slot") {
        const slotType = featSlot?.data?.featSlotType || "general";
        const slotLabel = slotType === "classBonus" ? "Class Bonus" : capitalize(slotType);
        const valuesToSet = {};
        valuesToSet[`${dataPathToFeat}`] = {
          name: slotLabel + " Feat Slot",
          unidentifiedName: slotLabel + " Feat Slot",
          _id: featSlot?._id,
          data: {
            type: "slot",
            description: "",
            benefit: "",
            special: "",
            level: featSlot?.data?.level,
            featSlotType: featSlot?.data?.featSlotType,
            slotOrder: featSlot?.data?.slotOrder,
            prerequisites: "",
            traitsList: [],
            traits: [],
            modifiers: [],
            item: [],
            choices: [],
            providesItems: [],
          },
          fields: {
            featDetails: { hidden: true },
            featSlot: { hidden: false },
          },
        };
        api.setValues(valuesToSet, (updatedRecord) => {
          onAddEditFeature(updatedRecord);
        });
      }
    };

    api.showConfirm(
      "Remove Feat",
      `Are you sure you want to remove ${featSlot.name}?`,
      "Yes",
      "No",
      onDeleteFeat
    );
  }

  function showFeatSlotOptions() {
    const dataPathToFeat = getNearestParentDataPath(dataPath);
    const featSlot = api.getValue(dataPathToFeat);

    const featSlotType = featSlot?.data?.featSlotType;
    const featSlotLevel = parseInt(featSlot?.data?.level || "0", 10);

    const optionSelection = (values) => {
      if (values.length > 0) {
        const feat = values[0];
        onDrop("feats", { value: feat, tooltip: feat.name });
      }
    };

    // PF1e: general slots accept any feat, classBonus slots show combat feats by default
    const optionsQuery = {
      type: "feats",
      query: {
        ...(featSlotType === "classBonus"
          ? { "data.type": "combat" }
          : {}),
      },
    };

    const slotLabel = featSlotType === "classBonus" ? "Class Bonus" : capitalize(featSlotType);

    api.showPrompt(
      `Select a ${slotLabel} Feat for Level ${featSlotLevel}`,
      "Select Feat",
      `Select a Feat...`,
      null,
      optionsQuery,
      optionSelection
    );
  }
</script>

    "
  >

      <div
        style="
          width: 30px;

          min-width: 30px;
          min-height: 30px;
          border: 1px solid var(--mantine-color-default-border);
        "
      >
        <iconbutton

  </div>
</box>

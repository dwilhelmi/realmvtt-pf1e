<script>
  function onDrop(value, recordLink) {
    const dataPathToFeat = getNearestParentDataPath(dataPath);
    const featSlot = api.getValue(dataPathToFeat);
    const feat = recordLink?.value;

    if (value === "feats") {
      // If this is a feat slot, we set it
      const valuesToSet = {};

      // Make sure it matches the LEVEL of the slots and the featSlotType else
      // notify error
      const featLevel = parseInt(feat?.data?.level || "0", 10);
      const slotLevel = parseInt(featSlot?.data?.level || "0", 10);
      const featSlotType = featSlot?.data?.featSlotType;
      const featType = feat?.data?.type;

      // Check if feat level is too high for the slot
      if (featLevel > slotLevel) {
        api.showNotification(
          `This slot requires a level of ${slotLevel} or lower.`,
          "red",
          "Feat Level Mismatch"
        );
        return;
      }

      // Check if feat type matches slot type
      if (featSlotType === "ancestry" && featType !== "ancestry") {
        api.showNotification(
          `This slot only accepts Ancestry feats.`,
          "red",
          "Feat Type Mismatch"
        );
        return;
      }

      if (featSlotType === "class" && featType !== "class") {
        api.showNotification(
          `This slot only accepts Class feats.`,
          "red",
          "Feat Type Mismatch"
        );
        return;
      }

      if (
        featSlotType === "general" &&
        featType !== "general" &&
        featType !== "skill"
      ) {
        api.showNotification(
          `This slot only accepts General or Skill feats.`,
          "red",
          "Feat Type Mismatch"
        );
        return;
      }

      if (featSlotType === "skill" && featType !== "skill") {
        api.showNotification(
          `This slot only accepts Skill feats.`,
          "red",
          "Feat Type Mismatch"
        );
        return;
      }

      if (featSlot.data?.type === "slot") {
        valuesToSet[`${dataPathToFeat}`] = {
          ...feat,
          _id: featSlot?._id,
          data: {
            ...feat?.data,
            level: featSlot?.data?.level,
            featSlotType: featSlot?.data?.featSlotType,
            slotOrder: featSlot?.data?.slotOrder,
          },
          fields: {
            ...(feat?.fields || {}),
            featDetails: { hidden: false },
            featSlot: { hidden: true },
          },
        };
        api.setValues(valuesToSet, (updatedRecord) => {
          onAddEditFeature(updatedRecord);
        });
      }
    }
  }

  function clearFeat() {
    const dataPathToFeat = getNearestParentDataPath(dataPath);
    const featSlot = api.getValue(dataPathToFeat);

    onDeleteFeat = () => {
      if (featSlot.data?.type !== "slot") {
        const valuesToSet = {};
        valuesToSet[`${dataPathToFeat}`] = {
          name: capitalize(featSlot?.data?.featSlotType) + " Feat Slot",
          unidentifiedName:
            capitalize(featSlot?.data?.featSlotType) + " Feat Slot",
          _id: featSlot?._id,
          data: {
            type: "slot",
            description: "",
            level: featSlot?.data?.level,
            featSlotType: featSlot?.data?.featSlotType,
            slotOrder: featSlot?.data?.slotOrder,
            actionType: "",
            type: "",
            prerequisites: "",
            actions: [],
            levelLabel: "",
            traitsList: [],
            traits: [],
            modifiers: [],
            item: [],
            choices: [],
            proficiencies: [],
            providesAttacks: [],
            providesActions: [],
          },
          fields: {
            featDetails: { hidden: true },
            featSlot: { hidden: false },
          },
        };
        api.setValues(valuesToSet, (updatedRecord) => {
          onAddEditFeature(updatedRecord);
        });
      }
    };

    api.showConfirm(
      "Remove Feat",
      `Are you sure you want to remove ${featSlot.name}?`,
      "Yes",
      "No",
      onDeleteFeat
    );
  }

  function showFeatSlotOptions() {
    const dataPathToFeat = getNearestParentDataPath(dataPath);
    const featSlot = api.getValue(dataPathToFeat);

    const featSlotType = featSlot?.data?.featSlotType;
    const featSlotLevel = parseInt(featSlot?.data?.level || "0", 10);

    const classes = record?.data?.classes || [];
    const className = classes?.[0]?.name || record?.data?.className || "";
    const ancestries = record?.data?.ancestries || [];
    const ancestryName =
      ancestries?.[0]?.name || record?.data?.ancestryName || "";
    const heritage = record?.data?.heritages || [];
    const heritageName =
      heritage?.[0]?.name || record?.data?.heritageName || "";
    const ourTraits = record?.data?.traits || [];

    const options = [];

    if (featSlotType === "ancestry") {
      options.push({ label: "Ancestry Feat", value: "ancestry" });
    }

    const optionSelection = (values) => {
      if (values.length > 0) {
        const feat = values[0];
        onDrop("feats", { value: feat, tooltip: feat.name });
      }
    };

    // Collect all traits for ancestry feats and remove duplicates (case insensitive)
    const ancestryTraits = [];
    if (ancestryName) ancestryTraits.push(ancestryName);
    if (heritageName) ancestryTraits.push(heritageName);
    ancestryTraits.push(...ourTraits);

    // Remove duplicates case-insensitively
    const seen = new Set();
    const uniqueAncestryTraits = ancestryTraits
      .filter((trait) => trait && trait.trim())
      .filter((trait) => {
        const lowerTrait = trait.toLowerCase();
        if (seen.has(lowerTrait)) {
          return false;
        }
        seen.add(lowerTrait);
        return true;
      });

    const optionsQuery = {
      type: "feats",
      query: {
        $or: [
          { "data.level": { $lte: featSlotLevel } },
          { "data.level": { $exists: false } },
          { "data.level": null },
        ],
        ...(featSlotType === "general"
          ? { "data.type": { $in: ["general", "skill"] } }
          : { "data.type": featSlotType }),
        ...(featSlotType === "class" && className
          ? {
              "data.traits": {
                $elemMatch: { $regex: `^${className}$`, $options: "i" },
              },
            }
          : featSlotType === "ancestry" && uniqueAncestryTraits.length > 0
          ? {
              "data.traits": {
                $elemMatch: {
                  $regex: `^(${uniqueAncestryTraits.join("|")})$`,
                  $options: "i",
                },
              },
            }
          : {}),
      },
    };

    api.showPrompt(
      `Select a ${capitalize(featSlotType)} Feat for Level ${featSlotLevel}`,
      "Select Feat",
      `Select a Feat...`,
      null,
      optionsQuery,
      optionSelection
    );
  }
</script>

    "
  >

      <div
        style="
          width: 30px;

          min-width: 30px;
          min-height: 30px;
          border: 1px solid var(--mantine-color-default-border);
        "
      >
        <iconbutton
          size="md"
          variant="subtle"
          color="default"
          onclick="showFeatSlotOptions()"
          options='[{"label": "Select Feat", "icon": "IconRosetteDiscountCheck", "value": "selectFeat"}]'
        ></iconbutton>
      </div>
      <numberfield
        size="xs"

        field="level"

      <div style="display: flex; flex-direction: column; gap: 2px">

        <label size="xs" color="dimmed" label="Drag a Feat Here"></label>
      </div>
    </div>
  </div>
</box>

      <div style="display: flex; gap: 2px; width: 100%; align-items: center">

        >
          <portrait width="30px" height="30px" field="portrait"></portrait>
        </div>
        <numberfield
          size="xs"

          textalign="center"

        <div style="min-width: 100px; flex-grow: 1">

    <div

      "
    >
      <label

      ></label>
      <iconbutton
        field="actions"
        size="sm"
        variant="subtle"
        color="default"
        disablediflocked="true"
        hidden="true"
        width="max-content"
        options='[{"label": "Free Action", "value": "free", "icon": "free-action"},
  {"label": "One Action", "value": "oneAction", "icon": "one-action"},
  {"label": "Two Actions", "value": "twoActions", "icon": "two-actions"},
  {"label": "Three Actions", "value": "threeActions", "icon": "three-actions"},
  {"label": "1 to 2 Actions", "value": "oneToTwoActions", "icon": "1-to-2"},
  {"label": "1 to 3 Actions", "value": "oneToThreeActions", "icon": "1-to-3"},
  {"label": "Reaction", "value": "reaction", "icon": "reaction"}]'
      ></iconbutton>
      <div style="margin-left: auto">
        <label
          hidden="true"
          field="levelLabel"
          size="sm"
          variant="bold"
        ></label>
      </div>
    </div>

    <div
      style="
        display: flex;
        gap: 4px;
        flex-direction: column;
        width: 100%;
        margin-bottom: 4px;
      "
    >
      <div style="display: flex; flex-direction: row; width: 100%; gap: 4px">
        <list
          width="100%"
          hidewhenidentified="false"
          listtype="traits_list"
          field="traitsList"
        ></list>
      </div>

      <richtextfield
        disablecontrols="true"
        field="description"
        placeholder="Feat description..."
      ></richtextfield>
    </div>
  </accordion>

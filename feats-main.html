<script>
  // Show or hide relevant values on load or change of type
  function showHideFields() {
    const featDataPath = getNearestParentDataPath(dataPath);
    const feat = featDataPath ? api.getValue(featDataPath) : record;
    const dataPrefix = featDataPath ? `${featDataPath}.data` : "data";
    const fieldsPath = featDataPath ? `${featDataPath}.fields` : "fields";

    const valuesToSet = {};

    // Check if traits is set
    if (
      feat.data?.traits &&
      feat.data?.traits.length > 0 &&
      !feat.data?.traitsList
    ) {
      const traitsObjects = [];
      for (const trait of feat.data.traits) {
        traitsObjects.push({
          _id: generateUuid(),
          name: trait,
          identified: true,
          data: {},
        });
      }

      valuesToSet[`${dataPrefix}.traitsList`] = traitsObjects;
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }
</script>

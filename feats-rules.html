<div style="display: flex; flex-direction: column; gap: 4px">
  <label label="Settings" size="md" textalign="center" variant="bold"></label>
  <checkbox
    field="toggleable"
    label="Toggleable"
    description="Show a toggle on the Actions tab for a character with this Feature."
    size="sm"
    textalign="right"
  ></checkbox>

  <div style="display: flex; flex-direction: row; gap: 4px; margin-top: 4px">
    <div style="display: flex; flex-direction: column; gap: 4px">
      <label
        label="Provides Attack"
        size="sm"
        textalign="left"
        variant="bold"
      ></label>
      <label
        label="Add an Item here if this Feature provides an attack."
        size="sm"
        textalign="left"
        color="dimmed"
        variant="standard"
      ></label>
    </div>
    <list
      field="providesAttacks"
      variant="outline"
      listtype="attached_item_list"
    ></list>
  </div>

  <div style="display: flex; flex-direction: column; gap: 4px; margin-top: 4px">
    <dropdown
      width="100%"
      field="providesActions"
      label="Provides Actions"
      placeholder="Select Actions..."
      multiselect="10"
      optionsquery='{"type": "actions", "query": {}}'
    ></dropdown>
  </div>

  <div style="display: flex; flex-direction: column; gap: 4px; margin-top: 4px">
    <label
      label="Provides Choices"
      size="sm"
      textalign="left"
      variant="bold"
    ></label>
    <list
      field="choices"
      listtype="feature_choice_list"
      variant="striped"
    ></list>
  </div>

  <div style="display: flex; flex-direction: column; gap: 4px; margin-top: 4px">
    <label
      label="Proficiencies"
      size="sm"
      textalign="left"
      variant="bold"
    ></label>
    <list
      field="proficiencies"
      listtype="feature_proficiency_list"
      variant="striped"
    ></list>
  </div>

  <label label="Modifiers" size="md" textalign="center" variant="bold"></label>

  <list field="modifiers" listtype="modifier_list" variant="striped"></list>
</div>

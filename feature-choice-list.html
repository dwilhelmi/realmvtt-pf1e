<script>
  function showHideChoices() {
    const choiceDataPath = getNearestParentDataPath(dataPath);
    const choice = api.getValue(choiceDataPath);

    const valuesToSet = {};

    if (
      choice.data?.itemType === "feat" &&
      choice.fields?.filter?.hidden !== false
    ) {
      valuesToSet[`${choiceDataPath}.fields.filter.hidden`] = false;
      valuesToSet[`${choiceDataPath}.fields.choices.hidden`] = true;
    } else if (
      choice.data?.itemType === "feature" &&
      choice.fields?.choices?.hidden !== false
    ) {
      valuesToSet[`${choiceDataPath}.fields.choices.hidden`] = false;
      valuesToSet[`${choiceDataPath}.fields.filter.hidden`] = true;
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }
</script>

<!-- Represents a list of choices this character is prompted with, when they obtain the feature -->
<div style="display: flex; flex-direction: column; width: 100%">
  <namefield
    field="name"
    label="Prompt Name"
    size="xs"
    placeholder="Enter Prompt Name..."
    width="100%"
  ></namefield>
  <stringfield
    field="description"
    label="Prompt Description"
    size="xs"
    placeholder="Enter Prompt Description..."
    width="100%"
  ></stringfield>
  <stringfield
    size="xs"
    label="Predicate"
    placeholder="Enter predicate..."
    description="If this predicate is true, the choice will be shown to the player."
    multiline="true"
    field="predicate"
  ></stringfield>
  <stringfield
    size="xs"
    label="Roll Option Prefix"
    placeholder="e.g., kinetic-gate:first-element"
    description="If set, adds {prefix}:{selected-slug} as a roll option when choice is made."
    field="rollOption"
  ></stringfield>
  <stringfield
    size="xs"
    label="Flag"
    placeholder="e.g., weaponLegend"
    description="If set, stores selection in record.data.flags.{flag}.{selected-slug}"
    field="flag"
  ></stringfield>
  <div style="margin-top: 4px">
    <checkbox
      field="isTextInput"
      label="Simple Text Input"
      size="xs"
      textalign="right"
      description="If checked, prompts the user for text input instead of selecting from options or query."
    ></checkbox>
  </div>
  <stringfield
    field="query"
    label="Choice Query"
    size="xs"
    multiline="true"
    placeholder='{"type": "feats", "query": {}}'
    width="100%"
  ></stringfield>
  <divider label="or"></divider>
  <div style="display: flex; flex-direction: column; gap: 4px; margin-top: 4px">
    <label label="Options" size="xs" textalign="left" variant="bold"></label>
    <list
      field="options"
      listtype="feature_choice_option_list"
      variant="striped"
    ></list>
  </div>
</div>

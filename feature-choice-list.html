<!-- Represents a list of choices this character is prompted with, when they obtain the feature -->
<div style="display: flex; flex-direction: column; width: 100%">
  <namefield
    field="name"
    label="Choice Name"
    size="xs"
    placeholder="Enter Prompt Name..."
    width="100%"
  ></namefield>
  <stringfield
    field="description"
    label="Choice Description"
    size="xs"
    placeholder="Enter Prompt Description..."
    width="100%"
  ></stringfield>
  <div style="display: flex; flex-direction: column; gap: 4px; margin-top: 4px">
    <label label="Options" size="xs" textalign="left" variant="bold"></label>
    <list
      field="options"
      listtype="feature_choice_option_list"
      variant="striped"
    ></list>
  </div>
</div>

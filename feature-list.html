<accordion field="descriptionAcc" size="xs" variant="minimal">
  <accordion.control>
    <div style="height: 30px; display: flex; gap: 4px; align-items: center">
      <div style="width: 30px; min-width: 30px">
        <portrait width="30px" height="30px" name="portrait"></portrait>
      </div>
      <label field="level" size="xs"></label>
      <div style="flex-grow: 1">
        <label size="xs" variant="bold" field="namefield"></label>
      </div>
    </div>
  </accordion.control>
  <div>
    <richtextfield
      field="description"
      placeholder="Enter Feature Description..."
      disablecontrols="true"
    ></richtextfield>
  </div>
</accordion>

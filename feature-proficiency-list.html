<!-- Represents a list of proficiencies this character gains from the feature -->
<div style="display: flex; flex-direction: row; width: 100%; gap: 4px">
  <div style="display: flex; flex-direction: column; min-width: 50px; flex: 1">
    <dropdown
      field="name"
      label="Proficiency Name"
      size="xs"
      width="100%"
      combo="true"
      placeholder="Select or Enter Proficiency..."
      options='[{"label": "Simple Weapons", "value": "simple"},
        {"label": "Martial Weapons", "value": "martial"},
        {"label": "Exotic Weapons", "value": "exotic"},
        {"label": "Light Armor", "value": "light"},
        {"label": "Medium Armor", "value": "medium"},
        {"label": "Heavy Armor", "value": "heavy"},
        {"label": "Shields", "value": "shield"}]'
    >
    </dropdown>
    <stringfield
      field="field"
      name="Field"
      size="xs"
      label="Field"
      description="Additional field if applicable (e.g. specific weapon name, armor type, etc.)"
      placeholder="Enter field..."
    ></stringfield>
  </div>
  <dropdown
    field="rank"
    label="Proficient"
    placeholder="No"
    width="115px"
    size="xs"
    defaultvalue="0"
    options='[{
      "label": "Not Proficient",
      "value": "0"
      }, {
      "label": "Proficient",
      "value": "1"
      }]'
  ></dropdown>
</div>

<script>
  // Sets the traits for the feature
  function setTraits(traits) {
    const featureDataPath = getNearestParentDataPath(dataPath);
    const feature = featureDataPath ? api.getValue(featureDataPath) : record;

    // Set the traits list to the values within traitsList
    const traitsObjects = [];
    for (const trait of traits) {
      traitsObjects.push({
        _id: generateUuid(),
        name: trait,
        identified: true,
        data: {},
      });
    }

    const valuesToSet = {
      [`${featureDataPath}${featureDataPath ? "." : ""}data.traitsList`]:
        traitsObjects,
    };

    api.setValuesOnRecord(feature, valuesToSet);
  }

  // Show or hide relevant values on load or change of type
  function showHideFields() {
    const featureDataPath = getNearestParentDataPath(dataPath);
    const feature = featureDataPath ? api.getValue(featureDataPath) : record;
    const dataPrefix = featureDataPath ? `${featureDataPath}.data` : "data";

    const valuesToSet = {};

    // Check if traits is set
    if (
      feature.data?.traits &&
      feature.data?.traits.length > 0 &&
      !feature.data?.traitsList
    ) {
      const traitsObjects = [];
      for (const trait of feature.data.traits) {
        traitsObjects.push({
          _id: generateUuid(),
          name: trait,
          identified: true,
          data: {},
        });
      }

      valuesToSet[`${dataPrefix}.traitsList`] = traitsObjects;
    }

    const showActions = feature.data?.type === "active";
    if (showActions && feature.fields?.actions?.hidden !== false) {
      valuesToSet["fields.actions.hidden"] = false;
    } else if (!showActions && feature.fields?.actions?.hidden !== true) {
      valuesToSet["fields.actions.hidden"] = true;
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValuesOnRecord(feature, valuesToSet);
    }
  }
</script>

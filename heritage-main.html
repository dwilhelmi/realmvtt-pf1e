<script>
  // Show or hide relevant values on load or change of type
  function showHideFields() {
    const ancestryDataPath = getNearestParentDataPath(dataPath);
    const ancestry = ancestryDataPath ? api.getValue(ancestryDataPath) : record;
    const dataPrefix = ancestryDataPath ? `${ancestryDataPath}.data` : "data";
    const fieldsPath = ancestryDataPath
      ? `${ancestryDataPath}.fields`
      : "fields";

    const valuesToSet = {};

    // Check if traits is set
    if (
      ancestry.data?.traits &&
      ancestry.data?.traits.length > 0 &&
      !ancestry.data?.traitsList
    ) {
      const traitsObjects = [];
      for (const trait of ancestry.data.traits) {
        traitsObjects.push({
          _id: generateUuid(),
          name: trait,
          identified: true,
          data: {},
        });
      }

      valuesToSet[`${dataPrefix}.traitsList`] = traitsObjects;
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }
</script>

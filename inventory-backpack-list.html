<script>
  function setTotalBulk(setValues = true) {
    const itemDataPath = getNearestParentDataPath(dataPath);
    const containerDataPath = getNearestParentDataPath(itemDataPath);
    const container = api.getValue(containerDataPath);
    const items = container.data?.items || [];
    let totalBulk = 0;
    items.forEach((item) => {
      let weight = parseFloat(item.data?.bulk?.value || "0");
      // If heldOrStowed is set, and it's not dropped or carried
      if (item.data?.bulk?.heldOrStowed) {
        weight = item.data?.bulk?.heldOrStowed;
      }
      let count = parseFloat(item.data?.count || "0");
      if (count === undefined || isNaN(count)) {
        count = 0;
      }
      if (weight !== undefined && !isNaN(weight)) {
        totalBulk += weight * count;
      }
    });

    totalBulk = Math.round(totalBulk * 100) / 100;

    if (setValues) {
      api.setValues(
        {
          [`${containerDataPath}.data.bulkUsed`]: totalBulk,
        },
        (recordUpdated) => {
          updateTotalBulk(recordUpdated);
        }
      );
    } else {
      return totalBulk;
    }
  }

  function onRemoveFromContainer() {
    const itemDataPath = getNearestParentDataPath(dataPath);
    const item = api.getValue(itemDataPath);

    const containerDataPath = getNearestParentDataPath(itemDataPath);
    const container = api.getValue(containerDataPath);

    const items = container.data?.items || [];
    const index = items.findIndex((i) => i?._id === item?._id);
    items.splice(index, 1);

    let totalBulk = setTotalBulk(false);

    // First remove the item from the container
    api.setValues(
      {
        [`${containerDataPath}.data.items`]: items,
        [`${containerDataPath}.data.bulkUsed`]:
          totalBulk - (item.data?.bulk?.value || 0),
      },
      (recordUpdated) => {
        // Then add the item to the inventory
        const inventory = [...(recordUpdated?.data?.inventory || [])];
        inventory.push(item);
        api.setValues(
          {
            [`data.inventory`]: inventory,
          },
          (recordUpdated2) => {
            updateTotalBulk(recordUpdated2);
          }
        );
      }
    );
  }
</script>

<div
  style="
    height: 30px;
    display: flex;
    gap: 4px;
    align-items: center;
    width: 100%;
  "
>
  <div style="width: 30px; min-width: 30px">
    <portrait width="30px" height="30px" name="portrait"></portrait>
  </div>
  <div style="width: 60px">
    <numberfield
      size="xs"
      variant="tooltip"
      label="Count"
      width="100%"
      field="count"
      placeholder="0"
      onchange="setTotalBulk();"
    ></numberfield>
  </div>
  <div style="min-width: 50px; flex-grow: 1">
    <namefield
      size="xs"
      variant="standard"
      width="100%"
      placeholder="Item"
      field="namefield"
      updateonblur="true"
    />
  </div>
  <iconbutton
    size="sm"
    field="removeBtn"
    variant="default"
    options='[{"icon": "IconArrowUp", "label": "Remove from Container", "value": "remove"}]'
    disablediflocked="false"
    onclick="onRemoveFromContainer();"
  ></iconbutton>
</div>

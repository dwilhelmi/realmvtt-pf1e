<script>
  function onItemsChanged() {
    // Requuery the record first to prevent race conditions when transferring items to containers
    const recordId = record?._id;
    const recordType = record?.recordType;
    const containerDataPath = getNearestParentDataPath(dataPath);
    const itemsPath = `${containerDataPath}.data.items`;
    const items = api.getValue(itemsPath) || [];
    let totalBulk = 0;

    items.forEach((item) => {
      let weight = parseFloat(item.data?.bulk?.value || "0");
      // If heldOrStowed is set, and it's not dropped or carried
      if (item.data?.bulk?.heldOrStowed) {
        weight = item.data?.bulk?.heldOrStowed;
      }
      // If it's armor, it's 1 bulk more when not equipped
      if (item.data?.type === "armor") {
        weight += 1;
      }
      let count = parseFloat(item.data?.count || "0");
      if (count === undefined || isNaN(count)) {
        count = 0;
      }
      if (weight !== undefined && !isNaN(weight)) {
        totalBulk += weight * count;
      }
    });

    totalBulk = Math.round(totalBulk * 100) / 100;

    api.setValues(
      {
        [`${containerDataPath}.data.bulkUsed`]: totalBulk,
      },
      () => {
        // Requery the record to get the latest data
        api.getRecord(recordType, recordId, (recordRetrieved) => {
          updateTotalBulk(recordRetrieved);
        });
      }
    );
  }
</script>

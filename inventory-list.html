<script>
  function onCountChange(value) {
    const itemDataPath = getNearestParentDataPath(dataPath);
    const item = api.getValue(itemDataPath);
    const isAmmo = item?.data?.itemCategory?.toLowerCase() === "ammo";
    const isThrown = item?.data?.traits?.some((trait) =>
      trait.toLowerCase().includes("thrown")
    );
    const isBomb = item?.data?.group?.toLowerCase() === "bomb";

    const totalBulk = updateTotalBulk(record, false);
    let valuesToSet = {
      "data.totalBulk": totalBulk,
    };

    // Determine if any ammo values need adjusting (if it's ammo, a thrown weapon, or a bomb)
    if (isAmmo) {
      const inventory = record?.data?.inventory || [];
      inventory.forEach((inventoryItem, index) => {
        if (inventoryItem.data?.ammoSelect === item._id) {
          valuesToSet[`data.inventory.${index}.data.ammo`] = value;
        }
      });
    } else if (isThrown || isBomb) {
      valuesToSet[`${itemDataPath}.data.ammo`] = value;
    }

    api.setValues(valuesToSet);
  }
</script>

<div
  style="
    height: 30px;
    display: flex;
    gap: 4px;
    align-items: center;
    width: 100%;
  "
>
  <div style="width: 30px; min-width: 30px">
    <portrait width="30px" height="30px" name="portrait"></portrait>
  </div>
  <div style="width: 60px">
    <numberfield
      size="xs"
      variant="tooltip"
      label="Count"
      width="100%"
      field="count"
      placeholder="0"
      onchange="onCountChange(value);"
    ></numberfield>
  </div>
  <div style="min-width: 50px; flex-grow: 1">
    <namefield
      size="xs"
      variant="standard"
      width="100%"
      placeholder="Item"
      field="namefield"
      updateonblur="true"
    />
  </div>
  <iconbutton
    hidden="true"
    size="sm"
    field="invested"
    variant="default"
    options='[{"icon": "IconDiamondOff", "label": "Not Invested", "value": "false"}, {"icon": "IconDiamond", "label": "Invested", "value": "true"}]'
    onchange="onItemInvested();"
    onclick=""
  ></iconbutton>
  <div style="max-width: 60px">
    <button
      hidden="true"
      size="xs"
      radius="xs"
      width="60px"
      field="useBtn"
      variant="light"
      onclick="useItem();"

    ></button>
  </div>
  <div style="width: 95px; min-width: 95px">

      field="carried"

      onchange="onItemEquipped();"
    ></dropdown>
  </div>

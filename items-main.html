<script>
  // Show or hide relevant values on load or change of type
  function showHideFields() {
    const itemDataPath = getNearestParentDataPath(dataPath);
    const item = itemDataPath ? api.getValue(itemDataPath) : record;
    const dataPrefix = itemDataPath ? `${itemDataPath}.data` : "data";
    const fieldsPath = itemDataPath ? `${itemDataPath}.fields` : "fields";

    const valuesToSet = {};

    // Check if traits is set
    if (
      item.data?.traits &&
      item.data?.traits.length > 0 &&
      !item.data?.traitsList
    ) {
      const traitsObjects = [];
      for (const trait of item.data.traits) {
        traitsObjects.push({
          _id: generateUuid(),
          name: trait,
          identified: true,
          data: {},
        });
      }

      valuesToSet[`${dataPrefix}.traitsList`] = traitsObjects;
    }

    const levelLabel = item.data?.level ? `Item ${item.data?.level}` : "";
    if (levelLabel && item.fields?.levelLabel?.hidden !== false) {
      valuesToSet[`${fieldsPath}.levelLabel.hidden`] = false;
    } else if (!levelLabel && item.fields?.levelLabel?.hidden !== true) {
      valuesToSet[`${fieldsPath}.levelLabel.hidden`] = true;
    }

    if (levelLabel && item.data?.levelLabel !== levelLabel) {
      valuesToSet[`${dataPrefix}.levelLabel`] = levelLabel;
    }

    // Show/hide kit properties when category is "kit"
    if (
      item.data?.type === "kit" &&
      item.fields?.kitProperties?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.kitProperties.hidden`] = false;
    } else if (
      item.data?.type !== "kit" &&
      item.fields?.kitProperties?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.kitProperties.hidden`] = true;
    }

    // Show/hide weapon properties based on item type
    if (
      item.data?.type === "weapon" &&
      item.fields?.weaponProperties?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.weaponProperties.hidden`] = false;
    } else if (
      item.data?.type !== "weapon" &&
      item.fields?.weaponProperties?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.weaponProperties.hidden`] = true;
    }

    // Show/hide armor properties based on item type
    if (
      item.data?.type === "armor" &&
      item.fields?.armorProperties?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.armorProperties.hidden`] = false;
    } else if (
      item.data?.type !== "armor" &&
      item.fields?.armorProperties?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.armorProperties.hidden`] = true;
    }

    // Show/hide other properties for weapons and armor
    if (
      (item.data?.type === "weapon" || item.data?.type === "armor") &&
      item.fields?.otherProperties?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.otherProperties.hidden`] = false;
    } else if (
      item.data?.type !== "weapon" &&
      item.data?.type !== "armor" &&
      item.fields?.otherProperties?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.otherProperties.hidden`] = true;
    }

    // Show/hide weapon and consumable properties for weapons and consumables
    if (
      (item.data?.type === "weapon" || item.data?.type === "consumable") &&
      item.fields?.weaponAndConsumableProperties?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.weaponAndConsumableProperties.hidden`] = false;
    } else if (
      item.data?.type !== "weapon" &&
      item.data?.type !== "consumable" &&
      item.fields?.weaponAndConsumableProperties?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.weaponAndConsumableProperties.hidden`] = true;
    }

    // Show/hide weapon category for weapons
    if (
      item.data?.type === "weapon" &&
      item.fields?.weaponCategory?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.weaponCategory.hidden`] = false;
    } else if (
      item.data?.type !== "weapon" &&
      item.fields?.weaponCategory?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.weaponCategory.hidden`] = true;
    }

    // Show/hide armor category for armor
    if (
      item.data?.type === "armor" &&
      item.fields?.armorCategory?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.armorCategory.hidden`] = false;
    } else if (
      item.data?.type !== "armor" &&
      item.fields?.armorCategory?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.armorCategory.hidden`] = true;
    }

    // Show/hide consumable category for consumables
    if (
      item.data?.type === "consumable" &&
      item.fields?.consumableCategory?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.consumableCategory.hidden`] = false;
    } else if (
      item.data?.type !== "consumable" &&
      item.fields?.consumableCategory?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.consumableCategory.hidden`] = true;
    }

    // Show/hide equipment category for equipment, kit, backpack, treasure, and shield
    if (
      (item.data?.type === "equipment" ||
        item.data?.type === "kit" ||
        item.data?.type === "backpack" ||
        item.data?.type === "treasure" ||
        item.data?.type === "shield") &&
      item.fields?.equipmentCategory?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.equipmentCategory.hidden`] = false;
    } else if (
      item.data?.type !== "equipment" &&
      item.data?.type !== "kit" &&
      item.data?.type !== "backpack" &&
      item.data?.type !== "treasure" &&
      item.data?.type !== "shield" &&
      item.fields?.equipmentCategory?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.equipmentCategory.hidden`] = true;
    }

    // Show/hide scroll properties when category is "scroll"
    if (
      item.data?.itemCategory === "Scroll" &&
      item.fields?.scrollProperties?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.scrollProperties.hidden`] = false;
    } else if (
      item.data?.itemCategory !== "Scroll" &&
      item.fields?.scrollProperties?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.scrollProperties.hidden`] = true;
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }
</script>

<script>
  function onTraitsChange(traits) {
    setTraits(traits, (recordUpdated) => {
      showHideFields(recordUpdated);
    });
  }

  // Show or hide relevant values on load or change of type
  function showHideFields(recordOverride = undefined) {
    record = recordOverride || record;
    const itemDataPath = getNearestParentDataPath(dataPath);
    const item = itemDataPath ? api.getValue(itemDataPath) : record;
    const dataPrefix = itemDataPath ? `${itemDataPath}.data` : "data";
    const fieldsPath = itemDataPath ? `${itemDataPath}.fields` : "fields";

    const valuesToSet = {};

    // Check if traits is set
    if (
      item.data?.traits &&
      item.data?.traits.length > 0 &&
      !item.data?.traitsList
    ) {
      const traitsObjects = [];
      for (const trait of item.data.traits) {
        traitsObjects.push({
          _id: generateUuid(),
          name: trait,
          identified: true,
          data: {},
        });
      }

      valuesToSet[`${dataPrefix}.traitsList`] = traitsObjects;
    }

    const levelLabel = item.data?.level ? `Item ${item.data?.level}` : "";
    if (levelLabel && item.fields?.levelLabel?.hidden !== false) {
      valuesToSet[`${fieldsPath}.levelLabel.hidden`] = false;
    } else if (!levelLabel && item.fields?.levelLabel?.hidden !== true) {
      valuesToSet[`${fieldsPath}.levelLabel.hidden`] = true;
    }

    if (levelLabel && item.data?.levelLabel !== levelLabel) {
      valuesToSet[`${dataPrefix}.levelLabel`] = levelLabel;
    }

    // Show/hide kit properties when category is "kit"
    if (
      item.data?.type === "kit" &&
      item.fields?.kitProperties?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.kitProperties.hidden`] = false;
    } else if (
      item.data?.type !== "kit" &&
      item.fields?.kitProperties?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.kitProperties.hidden`] = true;
    }

    // Show/hide weapon properties based on item type
    if (
      item.data?.type === "weapon" &&
      item.fields?.weaponProperties?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.weaponProperties.hidden`] = false;
    } else if (
      item.data?.type !== "weapon" &&
      item.fields?.weaponProperties?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.weaponProperties.hidden`] = true;
    }

    // Show/hide armor properties based on item type
    if (
      item.data?.type === "armor" &&
      item.fields?.armorProperties?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.armorProperties.hidden`] = false;
    } else if (
      item.data?.type !== "armor" &&
      item.fields?.armorProperties?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.armorProperties.hidden`] = true;
    }

    // Show/hide shield properties based on item type
    if (
      item.data?.type === "shield" &&
      item.fields?.shieldProperties?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.shieldProperties.hidden`] = false;
    } else if (
      item.data?.type !== "shield" &&
      item.fields?.shieldProperties?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.shieldProperties.hidden`] = true;
    }

    // Show/hide other properties for weapons and armor
    if (
      (item.data?.type === "weapon" || item.data?.type === "armor") &&
      item.fields?.otherProperties?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.otherProperties.hidden`] = false;
    } else if (
      item.data?.type !== "weapon" &&
      item.data?.type !== "armor" &&
      item.fields?.otherProperties?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.otherProperties.hidden`] = true;
    }

    // Show/hide consumable properties for consumable type items or items
    // that have the consumable trait (but NOT weapons)
    const hasConsumableTrait =
      item.data?.traits &&
      Array.isArray(item.data.traits) &&
      item.data.traits.some(
        (trait) => trait && trait.toString().toLowerCase() === "consumable"
      );
    const isWeapon = item.data?.type === "weapon";

    if (
      (item.data?.type === "consumable" || (!isWeapon && hasConsumableTrait)) &&
      item.fields?.consumableProperties?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.consumableProperties.hidden`] = false;
    } else if (
      item.data?.type !== "consumable" &&
      (isWeapon || !hasConsumableTrait) &&
      item.fields?.consumableProperties?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.consumableProperties.hidden`] = true;
    }

    // Show/hide weapon category for weapons
    if (
      item.data?.type === "weapon" &&
      item.fields?.weaponCategory?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.weaponCategory.hidden`] = false;
    } else if (
      item.data?.type !== "weapon" &&
      item.fields?.weaponCategory?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.weaponCategory.hidden`] = true;
    }

    // Show/hide armor category for armor
    if (
      item.data?.type === "armor" &&
      item.fields?.armorCategory?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.armorCategory.hidden`] = false;
    } else if (
      item.data?.type !== "armor" &&
      item.fields?.armorCategory?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.armorCategory.hidden`] = true;
    }

    // Show/hide consumable category for consumables
    if (
      item.data?.type === "consumable" &&
      item.fields?.consumableCategory?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.consumableCategory.hidden`] = false;
    } else if (
      item.data?.type !== "consumable" &&
      item.fields?.consumableCategory?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.consumableCategory.hidden`] = true;
    }

    // Show/hide backpack properties for backpack type
    if (
      item.data?.type === "backpack" &&
      item.fields?.backpackProperties?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.backpackProperties.hidden`] = false;
    } else if (
      item.data?.type !== "backpack" &&
      item.fields?.backpackProperties?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.backpackProperties.hidden`] = true;
    }

    // Show/hide equipment category for equipment, kit, backpack, treasure, and shield
    if (
      (item.data?.type === "equipment" ||
        item.data?.type === "kit" ||
        item.data?.type === "backpack" ||
        item.data?.type === "treasure" ||
        item.data?.type === "shield") &&
      item.fields?.equipmentCategory?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.equipmentCategory.hidden`] = false;
    } else if (
      item.data?.type !== "equipment" &&
      item.data?.type !== "kit" &&
      item.data?.type !== "backpack" &&
      item.data?.type !== "treasure" &&
      item.data?.type !== "shield" &&
      item.fields?.equipmentCategory?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.equipmentCategory.hidden`] = true;
    }

    // Show/hide scroll properties when category is "scroll"
    if (
      item.data?.itemCategory === "Scroll" &&
      item.fields?.scrollProperties?.hidden !== false
    ) {
      valuesToSet[`${fieldsPath}.scrollProperties.hidden`] = false;
    } else if (
      item.data?.itemCategory !== "Scroll" &&
      item.fields?.scrollProperties?.hidden !== true
    ) {
      valuesToSet[`${fieldsPath}.scrollProperties.hidden`] = true;
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }
</script>

        width="100px"
        field="uses.value"
        label="Uses"
        placeholder="1"
        minvalue="0"
      ></numberfield>
      <numberfield
        width="100px"
        field="splashDamage"
        label="Splash Damage"
        placeholder="0"
        minvalue="0"
      ></numberfield>
      <checkbox
        size="sm"
        field="uses.autoDestroy"
        label="Auto Destroy"
      ></checkbox>
    </div>
    <div style="display: flex; flex-direction: row; width: 100%; gap: 8px">
      <div style="min-width: 120px">
        <numberfield
          width="100%"
          field="damage.persistent.number"
          label="Persistent Dice"
          placeholder="0"
          minvalue="0"
        ></numberfield>
      </div>
      <div style="min-width: 120px">
        <dropdown
          width="100%"
          field="damage.persistent.faces"
          label="Die Type"
          placeholder="Select..."
          options='[
          {"label": "d4", "value": "4"},
          {"label": "d6", "value": "6"},
          {"label": "d8", "value": "8"},
          {"label": "d10", "value": "10"},
          {"label": "d12", "value": "12"},
          {"label": "d20", "value": "20"}
        ]'
        >
        </dropdown>
      </div>
      <dropdown
        width="100%"
        field="damage.persistent.type"
        label="Persistent Type"
        placeholder="Select Type..."
        options='[
          {"label": "Bludgeoning", "value": "bludgeoning"},
          {"label": "Piercing", "value": "piercing"},
          {"label": "Slashing", "value": "slashing"},
          {"label": "Acid", "value": "acid"},
          {"label": "Bleed", "value": "bleed"},
          {"label": "Cold", "value": "cold"},
          {"label": "Electricity", "value": "electricity"},
          {"label": "Fire", "value": "fire"},
          {"label": "Force", "value": "force"},
          {"label": "Mental", "value": "mental"},
          {"label": "Poison", "value": "poison"},
          {"label": "Sonic", "value": "sonic"},
          {"label": "Spirit", "value": "spirit"},
          {"label": "Vitality", "value": "vitality"},
          {"label": "Void", "value": "void"}
        ]'
      >
      </dropdown>
    </div>
  </box>

  <!-- Backpack Properties -->
  <box field="backpackProperties" hidden="true" hidewhenidentified="false">
    <div style="display: flex; flex-direction: row; width: 100%; gap: 8px">
      <numberfield
        width="100%"
        field="bulk.capacity"
        label="Bulk Capacity"
        placeholder="0"
        minvalue="0"
      ></numberfield>
      <numberfield
        width="100%"
        field="bulk.ignored"
        label="Bulk Ignored"
        placeholder="0"
        minvalue="0"
      ></numberfield>
      <numberfield
        width="100%"
        field="bulk.heldOrStowed"
        label="Held/Stowed"
        placeholder="0"
        minvalue="0"
      ></numberfield>
    </div>
  </box>

  <!-- Magic Item (Scroll) Properties -->
  <box field="scrollProperties" hidden="true" hidewhenidentified="false">
    <div style="display: flex; flex-direction: row; width: 100%; gap: 8px">
      <dropdown
        width="100%"
        field="spell"
        label="Spell"
        placeholder="Select Spell..."
        optionsquery='{"type": "spells", "query": {}}'
      >
      </dropdown>
      <numberfield
        width="100%"
        field="spellLevel"
        label="Level"
        placeholder="Enter Level..."
      ></numberfield>
    </div>
  </box>

  <!-- Pack Properties -->
  <box field="kitProperties" hidden="true" hidewhenidentified="false">
    <div>
      <label
        field="itemListLabel"
        label="Items"
        size="sm"
        variant="bold"
      ></label>
    </div>

    <div>
      <list
        listtype="item_list"
        field="items"
        variant="striped"
        allowadd=""
      ></list>
    </div>

    <div style="display: flex; flex-direction: row; gap: 4px">
      <numberfield placeholder="0" field="cp" label="CP"></numberfield>
      <numberfield placeholder="0" field="sp" label="SP"></numberfield>
      <numberfield placeholder="0" field="gp" label="GP"></numberfield>
      <numberfield placeholder="0" field="pp" label="PP"></numberfield>
    </div>
  </box>

  <!-- Description -->

  <div>
    <divider label="Description"></divider>
  </div>

  <div>
    <richtextfield
      field="description"
      label="Description"
      placeholder="Enter Item description..."
      hidewhenidentified="false"
    >
    </richtextfield>
  </div>

  <stringfield
    field="unidentifiedDescription"
    label="Unidentified Description"
    placeholder="Enter description..."
    multiline="true"
    hidewhenidentified="true"
  >
  </stringfield>
</div>

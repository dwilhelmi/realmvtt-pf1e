<script>
  function onAbilityChange(value) {
    onAddEditFeature(record);
  }

  function onRanksChange(value) {
    onAddEditFeature(record);
  }

  function onMiscChange(value) {
    onAddEditFeature(record);
  }

  function onClassSkillChange(value) {
    onAddEditFeature(record);
  }

  function rollCheck() {
    const skillPath = getNearestParentDataPath(dataPath);
    const skill = api.getValue(skillPath);
    const name = skill.name;
    const mod = parseInt(skill.data?.mod || "0", 10);
    const ranks = parseInt(skill.data?.ranks || "0", 10);
    const ability = skill.data?.ability || "int";
    rollSkill(record, name, null, true, mod, ranks, ability);
  }
</script>

<div style="display: flex; flex-direction: row; gap: 4px; align-items: center">
  <iconbutton
    size="xs"
    variant="light"
    options='[{"icon": "D20", "label": "Roll Check", "value": "roll"}]'
    onclick="rollCheck();"
  ></iconbutton>

  <div style="min-width: 80px; flex: 1">
    <namefield
      width="100%"
      size="xs"
      placeholder="Skill Name..."
      field="namefield"
    ></namefield>
  </div>

  <dropdown
    field="ability"
    placeholder="Intelligence"
    defaultvalue="int"
    size="xs"
    width="90px"
    onchange="onAbilityChange(value);"
    options='[{"label": "STR", "value": "str"}, {"label": "DEX", "value": "dex"}, {"label": "CON", "value": "con"}, {"label": "INT", "value": "int"}, {"label": "WIS", "value": "wis"}, {"label": "CHA", "value": "cha"}]'
  ></dropdown>

  <checkbox
    field="classSkill"
    size="xs"
    onchange="onClassSkillChange(value);"
  ></checkbox>

  <numberfield
    size="xs"
    width="45px"
    textalign="center"
    placeholder="0"
    field="ranks"
    defaultvalue="0"
    onchange="onRanksChange(value);"
  ></numberfield>

  <numberfield
    size="xs"
    width="45px"
    textalign="center"
    placeholder="0"
    field="misc"
    defaultvalue="0"
    showsign="true"
    onchange="onMiscChange(value);"
  ></numberfield>

  <numberfield
    size="xs"
    width="45px"
    textalign="center"
    field="mod"
    showsign="true"
    variant="tooltip"
  ></numberfield>
</div>

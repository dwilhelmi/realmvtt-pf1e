<script>
  function showHideFields() {
    const modPath = dataPath.replace(".data.type", "");
    const modifier = api.getValue(modPath);
    const typeValue = modifier?.data?.type || "";

    const valuesToSet = {};

    if (
      (typeValue.includes("Bonus") || typeValue.includes("Penalty")) &&
      modifier.fields?.modifierType?.hidden !== false
    ) {
      valuesToSet[`${modPath}.fields.modifierType.hidden`] = false;
    } else if (
      !typeValue.includes("Bonus") &&
      !typeValue.includes("Penalty") &&
      modifier.fields?.modifierType?.hidden !== true
    ) {
      valuesToSet[`${modPath}.fields.modifierType.hidden`] = true;
    }

    let showFieldField = true;
    let showAttributeField = false;
    let showSkillField = false;
    let showAttackField = false;
    let showSaveField = false;
    let showAllChecksField = false;
    let showValueField = true;
    let showAdjustModifierField = false;
    let showActiveEffectField = false;
    let showRollOptionField = false;

    if (typeValue === "attributeBonus") {
      showAttributeField = true;
      showFieldField = false;
    } else if (typeValue === "attributePenalty") {
      showAttributeField = true;
      showFieldField = false;
    } else if (typeValue === "attackBonus") {
      showFieldField = false;
      showAttackField = true;
    } else if (typeValue === "attackPenalty") {
      showFieldField = false;
      showAttackField = true;
    } else if (typeValue === "damageBonus") {
      showFieldField = false;
      showAttackField = true;
    } else if (typeValue === "damagePenalty") {
      showAttackField = true;
      showFieldField = false;
    } else if (typeValue === "skillBonus") {
      showFieldField = false;
      showSkillField = true;
    } else if (typeValue === "skillPenalty") {
      showFieldField = false;
      showSkillField = true;
    } else if (typeValue === "saveBonus") {
      showFieldField = false;
      showSaveField = true;
    } else if (typeValue === "savePenalty") {
      showFieldField = false;
      showSaveField = true;
    } else if (typeValue === "allBonus") {
      showAllChecksField = true;
      showFieldField = false;
    } else if (typeValue === "allPenalty") {
      showAllChecksField = true;
      showFieldField = false;
    } else if (typeValue === "adjustModifier") {
      showFieldField = false;
      showAdjustModifierField = true;
      showValueField = true;
    } else if (typeValue === "activeEffect") {
      showFieldField = false;
      showValueField = false;
      showActiveEffectField = true;
    } else if (typeValue === "rollOption") {
      // Roll option adds a trait to the character if predicate passes
      showFieldField = false;
      showValueField = false;
      showRollOptionField = true;
    }

    if (modifier.fields?.value?.hidden !== !showValueField) {
      valuesToSet[`${modPath}.fields.value.hidden`] = !showValueField;
      valuesToSet[`${modPath}.fields.valueType.hidden`] = !showValueField;
    }
    if (modifier.fields?.field?.hidden !== !showFieldField) {
      valuesToSet[`${modPath}.fields.field.hidden`] = !showFieldField;
    }
    if (modifier.fields?.fieldAttribute?.hidden !== !showAttributeField) {
      valuesToSet[`${modPath}.fields.fieldAttribute.hidden`] =
        !showAttributeField;
    }
    if (modifier.fields?.fieldSkill?.hidden !== !showSkillField) {
      valuesToSet[`${modPath}.fields.fieldSkill.hidden`] = !showSkillField;
    }
    if (modifier.fields?.fieldAttack?.hidden !== !showAttackField) {
      valuesToSet[`${modPath}.fields.fieldAttack.hidden`] = !showAttackField;
    }
    if (modifier.fields?.fieldSave?.hidden !== !showSaveField) {
      valuesToSet[`${modPath}.fields.fieldSave.hidden`] = !showSaveField;
    }
    if (modifier.fields?.fieldAllChecks?.hidden !== !showAllChecksField) {
      valuesToSet[`${modPath}.fields.fieldAllChecks.hidden`] =
        !showAllChecksField;
    }
    if (modifier.fields?.value?.hidden !== !showValueField) {
      valuesToSet[`${modPath}.fields.value.hidden`] = !showValueField;
    }
    if (
      modifier.fields?.adjustModifierBox?.hidden !== !showAdjustModifierField
    ) {
      valuesToSet[`${modPath}.fields.adjustModifierBox.hidden`] =
        !showAdjustModifierField;
    }
    if (modifier.fields?.activeEffectBox?.hidden !== !showActiveEffectField) {
      valuesToSet[`${modPath}.fields.activeEffectBox.hidden`] =
        !showActiveEffectField;
    }
    if (modifier.fields?.rollOptionBox?.hidden !== !showRollOptionField) {
      valuesToSet[`${modPath}.fields.rollOptionBox.hidden`] =
        !showRollOptionField;
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }

  function setField(value) {
    const modPath = getNearestParentDataPath(dataPath);
    const modifier = api.getValue(modPath);
    const typeValue = modifier?.data?.type || "";

    const valuesToSet = {
      [`${modPath}.data.field`]: value,
    };

    api.setValues(valuesToSet);
  }
</script>

<script>
  // Show or hide relevant values on load or change of type
  function showHideFields() {
    const actionDataPath = getNearestParentDataPath(dataPath);
    const action = actionDataPath ? api.getValue(actionDataPath) : record;
    const dataPrefix = actionDataPath ? `${actionDataPath}.data` : "data";
    const fieldsPath = actionDataPath ? `${actionDataPath}.fields` : "fields";

    const valuesToSet = {};

    // Map attack effect values to display names
    const effectToName = {
      grab: "Grab",
      "improved-grab": "Improved Grab",
      constrict: "Constrict",
      "greater-constrict": "Greater Constrict",
      knockdown: "Knockdown",
      "improved-knockdown": "Improved Knockdown",
      push: "Push",
      "improved-push": "Improved Push",
      trip: "Trip",
    };

    const attackEffects = action.data?.attackEffects || [];
    let attackEffectsString = "";
    if (attackEffects.length > 0) {
      const effectNames = attackEffects.map(
        (effect) => effectToName[effect] || effect
      );

      if (effectNames.length === 1) {
        attackEffectsString = `(plus ${effectNames[0]})`;
      } else if (effectNames.length === 2) {
        attackEffectsString = `(plus ${effectNames[0]} and ${effectNames[1]})`;
      } else {
        const allButLast = effectNames.slice(0, -1).join(", ");
        const last = effectNames[effectNames.length - 1];
        attackEffectsString = `(plus ${allButLast}, and ${last})`;
      }
    }

    if (action.data?.attackEffectsLabel !== attackEffectsString) {
      valuesToSet[`${dataPrefix}.attackEffectsLabel`] = attackEffectsString;
    }

    // Calculate strike values with PF1e iterative attacks (-5/-10)
    const hasAttackBonus =
      action.data?.bonus !== undefined &&
      action.data?.bonus !== null &&
      action.data?.bonus !== "";

    if (hasAttackBonus) {
      const attackBonus = parseInt(action.data.bonus, 10);
      const bonusString =
        attackBonus >= 0 ? `+${attackBonus}` : `${attackBonus}`;

      const strike1 = `Strike ${bonusString}`;
      const strike2Bonus = attackBonus - 5;
      const strike2BonusString =
        strike2Bonus >= 0 ? `+${strike2Bonus}` : `${strike2Bonus}`;
      const strike2 = `${strike2BonusString} (iterative -5)`;
      const strike3Bonus = attackBonus - 10;
      const strike3BonusString =
        strike3Bonus >= 0 ? `+${strike3Bonus}` : `${strike3Bonus}`;
      const strike3 = `${strike3BonusString} (iterative -10)`;

      if (action.data?.strike1 !== strike1) {
        valuesToSet[`${dataPrefix}.strike1`] = strike1;
      }
      if (action.data?.strike2 !== strike2) {
        valuesToSet[`${dataPrefix}.strike2`] = strike2;
      }
      if (action.data?.strike3 !== strike3) {
        valuesToSet[`${dataPrefix}.strike3`] = strike3;
      }

      // Show strike fields
      if (action.fields?.strike1?.hidden !== false) {
        valuesToSet[`${fieldsPath}.strike1.hidden`] = false;
      }
      if (action.fields?.strike2?.hidden !== false) {
        valuesToSet[`${fieldsPath}.strike2.hidden`] = false;
      }
      if (action.fields?.strike3?.hidden !== false) {
        valuesToSet[`${fieldsPath}.strike3.hidden`] = false;
      }
    } else {
      // Hide strike fields when no attack bonus
      if (action.fields?.strike1?.hidden !== true) {
        valuesToSet[`${fieldsPath}.strike1.hidden`] = true;
      }
      if (action.fields?.strike2?.hidden !== true) {
        valuesToSet[`${fieldsPath}.strike2.hidden`] = true;
      }
      if (action.fields?.strike3?.hidden !== true) {
        valuesToSet[`${fieldsPath}.strike3.hidden`] = true;
      }
    }

    // Check if traits is set
    if (
      action.data?.traits &&
      action.data?.traits.length > 0 &&
      !action.data?.traitsList
    ) {
      const traitsObjects = [];
      for (const trait of action.data.traits) {
        traitsObjects.push({
          _id: generateUuid(),
          name: trait,
          identified: true,
          data: {},
        });
      }

      valuesToSet[`${dataPrefix}.traitsList`] = traitsObjects;
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }

  function onDamageChange(value) {
    setNPCDamageFields(record);
  }
</script>

    <div

  <list

  <dropdown
    size="sm"
    field="attackEffects"
    width="100%"
    label="Additional Attack Effects"
    onchange="showHideFields();"
    searchable="true"
    multiselect="20"
    combo="true"
    placeholder="Select Additional Attack Effects..."
    options='[{"label": "Grab", "value": "grab"},
    {"label": "Improved Grab", "value": "improved-grab"},
    {"label": "Constrict", "value": "constrict"},
    {"label": "Greater Constrict", "value": "greater-constrict"},
    {"label": "Knockdown", "value": "knockdown"},
    {"label": "Improved Knockdown", "value": "improved-knockdown"},
    {"label": "Push", "value": "push"},
    {"label": "Improved Push", "value": "improved-push"},
    {"label": "Trip", "value": "trip"}]'
  >
  </dropdown>

  <div style="margin-top: 8px; margin-bottom: 8px">
    <divider label="Description"></divider>
  </div>

  <richtextfield
    field="description"
    label="Description"
    placeholder="Enter Attack description..."
  ></richtextfield>
</div>

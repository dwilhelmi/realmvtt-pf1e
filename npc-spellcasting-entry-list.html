<script>
  function onAddSpell(spellListName) {
    const spellcastingEntryDataPath = getNearestParentDataPath(dataPath);
    addSpell(`${spellcastingEntryDataPath}.data.${spellListName}`);
  }

  function deleteSpellcastingEntry() {
    const spellcastingEntryDataPath = getNearestParentDataPath(dataPath);
    const spellcastingEntry = api.getValue(spellcastingEntryDataPath);
    const indexValue = parseInt(spellcastingEntryDataPath.split(".").pop(), 10);

    if (isNaN(indexValue) || indexValue < 0) {
      return;
    }

    api.showConfirm(
      "Delete Spellcasting Entry",
      `Are you sure you want to delete the "${spellcastingEntry.name}" entry?`,
      "Yes",
      "No",
      () => {
        const allSpellcastingEntries = [...(record.data?.spells || [])];

        // Remove the entry
        allSpellcastingEntries.splice(indexValue, 1);

        // If we deleted the first entry and there are remaining entries,
        // ensure the new first entry has its move up button hidden
        if (indexValue === 0 && allSpellcastingEntries.length > 0) {
          allSpellcastingEntries[0].fields =
            allSpellcastingEntries[0].fields || {};
          allSpellcastingEntries[0].fields.moveUpBtn =
            allSpellcastingEntries[0].fields.moveUpBtn || {};
          allSpellcastingEntries[0].fields.moveUpBtn.hidden = true;
        }

        api.setValues({
          "data.spells": allSpellcastingEntries,
        });
      }
    );
  }

  function onChangeValue() {
    const spellcastingEntryDataPath = getNearestParentDataPath(dataPath);
    const spellcastingEntry = api.getValue(spellcastingEntryDataPath);

    updateSpellcastingEntry(
      record,
      spellcastingEntry,
      spellcastingEntryDataPath
    );
  }
</script>

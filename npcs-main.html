<script>
  // Show or hide fields based on the type of NPC
  function showHideFields(recordOverride, recordsToSet = undefined) {
    record = recordOverride || record;
    const npcDataPath = getNearestParentDataPath(dataPath);
    const npc = npcDataPath ? api.getValue(npcDataPath) : record;
    const dataPrefix = npcDataPath ? `${npcDataPath}.data` : "data";
    const fieldsPath = npcDataPath ? `${npcDataPath}.fields` : "fields";
    const tabsPath = npcDataPath ? `${npcDataPath}.tabs` : "tabs";

    const valuesToSet = {};

    // Set default initiative skill to Perception if not set
    if (!npc.data?.initiativeSkill) {
      valuesToSet[`${dataPrefix}.initiativeSkill`] = "Perception";
      const perceptionMod = parseInt(npc.data?.perceptionMod || "0", 10);
      valuesToSet[`${dataPrefix}.initiativeMod`] = perceptionMod;
    }

    // Check if traits is set
    if (
      npc.data?.traits &&
      npc.data?.traits.length > 0 &&
      !npc.data?.traitsList
    ) {
      const traitsObjects = [];
      for (const trait of npc.data.traits) {
        traitsObjects.push({
          _id: generateUuid(),
          name: trait,
          identified: true,
          data: {},
        });
      }

      valuesToSet[`${dataPrefix}.traitsList`] = traitsObjects;
    }

    const type = !npc.data?.type ? "npc" : npc.data?.type;
    const isNPC = type === "npc";
    const typeLabel = type === "npc" ? "Creature" : capitalize(type);
    const levelLabel = `${typeLabel}`;

    // Only npc types have the Spells tab
    if (type !== "npc" && npc.tabs?.Spells?.hidden !== true) {
      valuesToSet[`${tabsPath}.Spells.hidden`] = true;
    } else if (type === "npc" && npc.tabs?.Spells?.hidden !== false) {
      valuesToSet[`${tabsPath}.Spells.hidden`] = false;
    }

    if (npc.data?.levelLabel !== levelLabel) {
      valuesToSet[`${dataPrefix}.levelLabel`] = levelLabel;
    }

    // Default values for adjustment tags
    if (npc.data?.setElite !== "elite") {
      valuesToSet[`${dataPrefix}.setElite`] = "elite";
    }
    if (npc.data?.setWeak !== "weak") {
      valuesToSet[`${dataPrefix}.setWeak`] = "weak";
    }
    if (npc.data?.elite !== "elite") {
      valuesToSet[`${dataPrefix}.elite`] = "elite";
    }
    if (npc.data?.weak !== "weak") {
      valuesToSet[`${dataPrefix}.weak`] = "weak";
    }

    // Hide/unhide NPC props
    if (type !== "npc" && npc.fields?.skills?.hidden !== true) {
      valuesToSet[`${fieldsPath}.npcProperties.hidden`] = true;
    } else if (type === "npc" && npc.fields?.skills?.hidden !== false) {
      valuesToSet[`${fieldsPath}.npcProperties.hidden`] = false;
    }

    const isVehicle = type === "vehicle";
    const vehicleFieldsToShow = ["vehicleProperties", "Object Immunities"];

    if (isVehicle) {
      vehicleFieldsToShow.forEach((field) => {
        if (npc.fields?.[field]?.hidden !== false) {
          valuesToSet[`${fieldsPath}.${field}.hidden`] = false;
        }
      });
      // Set BT if not set
      const hitpoints = npc.data?.hitpoints || 0;
      const brokenThreshold = Math.floor(hitpoints / 2);
      if (npc.data?.brokenThreshold !== brokenThreshold) {
        valuesToSet[`${dataPrefix}.brokenThreshold`] = brokenThreshold;
      }
    } else {
      vehicleFieldsToShow.forEach((field) => {
        if (npc.fields?.[field]?.hidden !== true) {
          valuesToSet[`${fieldsPath}.${field}.hidden`] = true;
        }
      });
    }

    const isHazard = type === "hazard";
    const hazardFieldsToShow = ["hazardProperties"];
    if (isHazard) {
      hazardFieldsToShow.forEach((field) => {
        if (npc.fields?.[field]?.hidden !== false) {
          valuesToSet[`${fieldsPath}.${field}.hidden`] = false;
        }
      });
    } else {
      hazardFieldsToShow.forEach((field) => {
        if (npc.fields?.[field]?.hidden !== true) {
          valuesToSet[`${fieldsPath}.${field}.hidden`] = true;
        }
      });
    }

    // Shared properties
    const sharedProperties = ["sharedProperties"];
    // Hazards and NPCs both have sharedProperties box
    if (isHazard || isNPC) {
      sharedProperties.forEach((property) => {
        if (npc.fields?.[property]?.hidden !== false) {
          valuesToSet[`${fieldsPath}.${property}.hidden`] = false;
        }
      });
    } else {
      sharedProperties.forEach((property) => {
        if (npc.fields?.[property]?.hidden !== true) {
          valuesToSet[`${fieldsPath}.${property}.hidden`] = true;
        }
      });
    }

    // Set skills list
    // Check if adjustment is set
    const adjustment =
      recordsToSet &&
      Object.keys(recordsToSet).includes(`${dataPrefix}.adjustment`)
        ? recordsToSet[`${dataPrefix}.adjustment`]
        : npc.data?.adjustment || "";
    if (adjustment === "elite" && npc.fields?.elite?.hidden !== false) {
      valuesToSet[`${fieldsPath}.setElite.hidden`] = true;
      valuesToSet[`${fieldsPath}.elite.hidden`] = false;
      valuesToSet[`${fieldsPath}.setWeak.hidden`] = false;
      valuesToSet[`${fieldsPath}.weak.hidden`] = true;
    }
    if (adjustment === "weak" && npc.fields?.weak?.hidden !== false) {
      valuesToSet[`${fieldsPath}.setWeak.hidden`] = true;
      valuesToSet[`${fieldsPath}.weak.hidden`] = false;
      valuesToSet[`${fieldsPath}.setElite.hidden`] = false;
      valuesToSet[`${fieldsPath}.elite.hidden`] = true;
    }
    if (adjustment === "" && npc.fields?.setElite?.hidden !== false) {
      valuesToSet[`${fieldsPath}.setElite.hidden`] = false;
      valuesToSet[`${fieldsPath}.elite.hidden`] = true;
    }
    if (adjustment === "" && npc.fields?.setWeak?.hidden !== false) {
      valuesToSet[`${fieldsPath}.setWeak.hidden`] = false;
      valuesToSet[`${fieldsPath}.weak.hidden`] = true;
    }

    if (recordsToSet) {
      for (const key of Object.keys(valuesToSet)) {
        recordsToSet[key] = valuesToSet[key];
      }
    } else if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }

  function onAddRemoveAttack(value) {
    const npcDataPath = getNearestParentDataPath(dataPath);
    const npc = npcDataPath ? api.getValue(npcDataPath) : record;
    const dataPrefix = npcDataPath ? `${npcDataPath}.data` : "data";
    const fieldsPath = npcDataPath ? `${npcDataPath}.fields` : "fields";

    const valuesToSet = {};

    const attacks = npc.data?.attacks || [];
    // For any attacks with no type set, set to Melee
    attacks.forEach((attack, index) => {
      if (!attack.data?.weaponType) {
        valuesToSet[`${dataPrefix}.attacks.${index}.data.weaponType`] = "Melee";
      }
    });

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }

  function applyAdjustment(adjustmentType) {
    const npcDataPath = getNearestParentDataPath(dataPath);
    const npc = npcDataPath ? api.getValue(npcDataPath) : record;
    const dataPrefix = npcDataPath ? `${npcDataPath}.data` : "data";

    const valuesToSet = {};

    if (adjustmentType === "remove") {
      // Removing adjustment - restore from base values and clear them
      valuesToSet[`${dataPrefix}.adjustment`] = "";

      if (npc.data?.baseLevel !== undefined && npc.data?.baseLevel !== null) {
        valuesToSet[`${dataPrefix}.level`] = npc.data.baseLevel;
        valuesToSet[`${dataPrefix}.baseLevel`] = null;
      }
      if (npc.data?.baseAC !== undefined && npc.data?.baseAC !== null) {
        valuesToSet[`${dataPrefix}.ac`] = npc.data.baseAC;
        valuesToSet[`${dataPrefix}.baseAC`] = null;
      }
      if (
        npc.data?.basePerceptionMod !== undefined &&
        npc.data?.basePerceptionMod !== null
      ) {
        valuesToSet[`${dataPrefix}.perceptionMod`] = npc.data.basePerceptionMod;
        valuesToSet[`${dataPrefix}.basePerceptionMod`] = null;
      }
      if (
        npc.data?.baseFortitudeMod !== undefined &&
        npc.data?.baseFortitudeMod !== null
      ) {
        valuesToSet[`${dataPrefix}.fortitudeMod`] = npc.data.baseFortitudeMod;
        valuesToSet[`${dataPrefix}.baseFortitudeMod`] = null;
      }
      if (
        npc.data?.baseReflexMod !== undefined &&
        npc.data?.baseReflexMod !== null
      ) {
        valuesToSet[`${dataPrefix}.reflexMod`] = npc.data.baseReflexMod;
        valuesToSet[`${dataPrefix}.baseReflexMod`] = null;
      }
      if (
        npc.data?.baseWillMod !== undefined &&
        npc.data?.baseWillMod !== null
      ) {
        valuesToSet[`${dataPrefix}.willMod`] = npc.data.baseWillMod;
        valuesToSet[`${dataPrefix}.baseWillMod`] = null;
      }
      if (npc.data?.baseHP !== undefined && npc.data?.baseHP !== null) {
        valuesToSet[`${dataPrefix}.hitpoints`] = npc.data.baseHP;
        valuesToSet[`${dataPrefix}.baseHP`] = null;
      }
      if (npc.data?.baseCurHP !== undefined && npc.data?.baseCurHP !== null) {
        valuesToSet[`${dataPrefix}.curhp`] = npc.data.baseCurHP;
        valuesToSet[`${dataPrefix}.baseCurHP`] = null;
      }
      if (
        npc.data?.baseInitiativeMod !== undefined &&
        npc.data?.baseInitiativeMod !== null
      ) {
        valuesToSet[`${dataPrefix}.initiativeMod`] = npc.data.baseInitiativeMod;
        valuesToSet[`${dataPrefix}.baseInitiativeMod`] = null;
      }

      // Restore skills
      (npc.data?.skills || []).forEach((skill, idx) => {
        if (skill.data?.baseMod !== undefined && skill.data?.baseMod !== null) {
          const restoredMod = skill.data.baseMod;
          valuesToSet[`${dataPrefix}.skills.${idx}.data.mod`] = restoredMod;
          valuesToSet[`${dataPrefix}.skills.${idx}.data.baseMod`] = null;
          const modString =
            restoredMod >= 0 ? `+${restoredMod}` : `${restoredMod}`;
          valuesToSet[
            `${dataPrefix}.skills.${idx}.data.skillWithMod`
          ] = `${skill.name} ${modString}`;
        }
      });

      // Restore attacks
      (npc.data?.attacks || []).forEach((attack, idx) => {
        let restoredBonus = attack.data?.bonus;
        if (
          attack.data?.baseBonus !== undefined &&
          attack.data?.baseBonus !== null
        ) {
          restoredBonus = attack.data.baseBonus;
          valuesToSet[`${dataPrefix}.attacks.${idx}.data.bonus`] =
            attack.data.baseBonus;
          valuesToSet[`${dataPrefix}.attacks.${idx}.data.baseBonus`] = null;
        }
        // Only restore the first damage formula
        const damageRolls = attack.data?.damageRolls || [];
        if (
          damageRolls.length > 0 &&
          damageRolls[0].data?.baseFormula !== undefined &&
          damageRolls[0].data?.baseFormula !== null
        ) {
          valuesToSet[
            `${dataPrefix}.attacks.${idx}.data.damageRolls.0.data.formula`
          ] = damageRolls[0].data.baseFormula;
          valuesToSet[
            `${dataPrefix}.attacks.${idx}.data.damageRolls.0.data.baseFormula`
          ] = null;
        }
        // Update strike fields with restored bonus
        updateAttackStrikeFields(
          attack,
          idx,
          restoredBonus,
          dataPrefix,
          valuesToSet
        );
      });

      // Restore spellcasting entries
      (npc.data?.spells || []).forEach((spellEntry, idx) => {
        if (
          spellEntry.data?.baseDC !== undefined &&
          spellEntry.data?.baseDC !== null
        ) {
          valuesToSet[`${dataPrefix}.spells.${idx}.data.dc`] =
            spellEntry.data.baseDC;
          valuesToSet[`${dataPrefix}.spells.${idx}.data.baseDC`] = null;
        }
        if (
          spellEntry.data?.baseMod !== undefined &&
          spellEntry.data?.baseMod !== null
        ) {
          valuesToSet[`${dataPrefix}.spells.${idx}.data.mod`] =
            spellEntry.data.baseMod;
          valuesToSet[`${dataPrefix}.spells.${idx}.data.baseMod`] = null;
        }
      });
    } else {
      // Applying weak or elite - save base values and apply adjustments
      const isElite = adjustmentType === "elite";
      const modifier = isElite ? 2 : -2;

      valuesToSet[`${dataPrefix}.adjustment`] = adjustmentType;

      // Use base values if they exist (from previous adjustment), otherwise use current values
      const baseLevel =
        npc.data?.baseLevel !== undefined && npc.data?.baseLevel !== null
          ? npc.data.baseLevel
          : parseInt(npc.data?.level || "1");
      const baseAC =
        npc.data?.baseAC !== undefined && npc.data?.baseAC !== null
          ? npc.data.baseAC
          : parseInt(npc.data?.ac || "0");
      const basePerception =
        npc.data?.basePerceptionMod !== undefined &&
        npc.data?.basePerceptionMod !== null
          ? npc.data.basePerceptionMod
          : parseInt(npc.data?.perceptionMod || "0");
      const baseFortitude =
        npc.data?.baseFortitudeMod !== undefined &&
        npc.data?.baseFortitudeMod !== null
          ? npc.data.baseFortitudeMod
          : parseInt(npc.data?.fortitudeMod || "0");
      const baseReflex =
        npc.data?.baseReflexMod !== undefined &&
        npc.data?.baseReflexMod !== null
          ? npc.data.baseReflexMod
          : parseInt(npc.data?.reflexMod || "0");
      const baseWill =
        npc.data?.baseWillMod !== undefined && npc.data?.baseWillMod !== null
          ? npc.data.baseWillMod
          : parseInt(npc.data?.willMod || "0");
      const baseHP =
        npc.data?.baseHP !== undefined && npc.data?.baseHP !== null
          ? npc.data.baseHP
          : parseInt(npc.data?.hitpoints || "0");
      const baseCurHP =
        npc.data?.baseCurHP !== undefined && npc.data?.baseCurHP !== null
          ? npc.data.baseCurHP
          : parseInt(npc.data?.curhp || "0");

      // Save base values if not already saved
      if (npc.data?.baseLevel === undefined || npc.data?.baseLevel === null) {
        valuesToSet[`${dataPrefix}.baseLevel`] = baseLevel;
      }
      if (npc.data?.baseAC === undefined || npc.data?.baseAC === null) {
        valuesToSet[`${dataPrefix}.baseAC`] = baseAC;
      }
      if (
        npc.data?.basePerceptionMod === undefined ||
        npc.data?.basePerceptionMod === null
      ) {
        valuesToSet[`${dataPrefix}.basePerceptionMod`] = basePerception;
      }
      if (
        npc.data?.baseFortitudeMod === undefined ||
        npc.data?.baseFortitudeMod === null
      ) {
        valuesToSet[`${dataPrefix}.baseFortitudeMod`] = baseFortitude;
      }
      if (
        npc.data?.baseReflexMod === undefined ||
        npc.data?.baseReflexMod === null
      ) {
        valuesToSet[`${dataPrefix}.baseReflexMod`] = baseReflex;
      }
      if (
        npc.data?.baseWillMod === undefined ||
        npc.data?.baseWillMod === null
      ) {
        valuesToSet[`${dataPrefix}.baseWillMod`] = baseWill;
      }
      if (npc.data?.baseHP === undefined || npc.data?.baseHP === null) {
        valuesToSet[`${dataPrefix}.baseHP`] = baseHP;
      }
      if (npc.data?.baseCurHP === undefined || npc.data?.baseCurHP === null) {
        valuesToSet[`${dataPrefix}.baseCurHP`] = baseCurHP;
      }

      // Apply adjustments from base values
      // Level: for weak decrease by 1 (or 2 if level 1), for elite increase by 1 (or 2 if level <=0)
      let levelChange;
      if (isElite) {
        levelChange = baseLevel <= 0 ? 2 : 1;
      } else {
        levelChange = baseLevel === 1 ? -2 : -1;
      }
      valuesToSet[`${dataPrefix}.level`] = Math.max(
        baseLevel + levelChange,
        -1
      );

      // Stats: increase/decrease by 2
      valuesToSet[`${dataPrefix}.ac`] = baseAC + modifier;
      valuesToSet[`${dataPrefix}.perceptionMod`] = basePerception + modifier;
      valuesToSet[`${dataPrefix}.fortitudeMod`] = baseFortitude + modifier;
      valuesToSet[`${dataPrefix}.reflexMod`] = baseReflex + modifier;
      valuesToSet[`${dataPrefix}.willMod`] = baseWill + modifier;

      // HP: increase/decrease based on starting level
      let hpChange;
      if (baseLevel <= 1) hpChange = 10;
      else if (baseLevel <= 4) hpChange = 15;
      else if (baseLevel <= 19) hpChange = 20;
      else hpChange = 30;

      if (!isElite) hpChange = -hpChange; // Weak decreases HP

      const newMaxHP = Math.max(baseHP + hpChange, 1);
      const newCurHP = Math.max(baseCurHP + hpChange, 1);
      valuesToSet[`${dataPrefix}.hitpoints`] = newMaxHP;
      valuesToSet[`${dataPrefix}.curhp`] = newCurHP;

      // Adjust skills
      (npc.data?.skills || []).forEach((skill, idx) => {
        const baseMod =
          skill.data?.baseMod !== undefined && skill.data?.baseMod !== null
            ? skill.data.baseMod
            : parseInt(skill.data?.mod || "0");
        if (skill.data?.baseMod === undefined || skill.data?.baseMod === null) {
          valuesToSet[`${dataPrefix}.skills.${idx}.data.baseMod`] = baseMod;
        }
        const adjustedMod = baseMod + modifier;
        valuesToSet[`${dataPrefix}.skills.${idx}.data.mod`] = adjustedMod;
        const modString =
          adjustedMod >= 0 ? `+${adjustedMod}` : `${adjustedMod}`;
        valuesToSet[
          `${dataPrefix}.skills.${idx}.data.skillWithMod`
        ] = `${skill.name} ${modString}`;
      });

      // Adjust initiative modifier based on selected initiative skill
      const initiativeSkill = npc.data?.initiativeSkill;
      const baseInitiativeMod =
        npc.data?.baseInitiativeMod !== undefined &&
        npc.data?.baseInitiativeMod !== null
          ? npc.data.baseInitiativeMod
          : parseInt(npc.data?.initiativeMod || "0");

      if (
        npc.data?.baseInitiativeMod === undefined ||
        npc.data?.baseInitiativeMod === null
      ) {
        valuesToSet[`${dataPrefix}.baseInitiativeMod`] = baseInitiativeMod;
      }

      // Calculate new initiative mod based on which skill is selected
      let newInitiativeMod = 0;
      if (initiativeSkill?.toLowerCase() === "perception") {
        // Use the adjusted perception mod
        newInitiativeMod = basePerception + modifier;
      } else if (initiativeSkill) {
        // Find the skill and use its adjusted mod
        const initSkill = (npc.data?.skills || []).find(
          (s) => s.name?.toLowerCase() === initiativeSkill.toLowerCase()
        );
        if (initSkill) {
          const skillBaseMod =
            initSkill.data?.baseMod !== undefined &&
            initSkill.data?.baseMod !== null
              ? initSkill.data.baseMod
              : parseInt(initSkill.data?.mod || "0");
          newInitiativeMod = skillBaseMod + modifier;
        }
      }
      valuesToSet[`${dataPrefix}.initiativeMod`] = newInitiativeMod;

      // Adjust attacks
      (npc.data?.attacks || []).forEach((attack, idx) => {
        const baseBonus =
          attack.data?.baseBonus !== undefined &&
          attack.data?.baseBonus !== null
            ? attack.data.baseBonus
            : parseInt(attack.data?.bonus || "0");
        if (
          attack.data?.baseBonus === undefined ||
          attack.data?.baseBonus === null
        ) {
          valuesToSet[`${dataPrefix}.attacks.${idx}.data.baseBonus`] =
            baseBonus;
        }
        const adjustedBonus = baseBonus + modifier;
        valuesToSet[`${dataPrefix}.attacks.${idx}.data.bonus`] = adjustedBonus;

        // Adjust damage - only the FIRST damage roll
        const damageRolls = attack.data?.damageRolls || [];
        if (damageRolls.length > 0) {
          const firstRoll = damageRolls[0];
          const baseFormula =
            firstRoll.data?.baseFormula !== undefined &&
            firstRoll.data?.baseFormula !== null
              ? firstRoll.data.baseFormula
              : firstRoll.data?.formula || "0";
          if (
            firstRoll.data?.baseFormula === undefined ||
            firstRoll.data?.baseFormula === null
          ) {
            valuesToSet[
              `${dataPrefix}.attacks.${idx}.data.damageRolls.0.data.baseFormula`
            ] = baseFormula;
          }
          valuesToSet[
            `${dataPrefix}.attacks.${idx}.data.damageRolls.0.data.formula`
          ] = adjustDamageFormula(baseFormula, modifier);
        }

        // Update strike fields with adjusted bonus
        updateAttackStrikeFields(
          attack,
          idx,
          adjustedBonus,
          dataPrefix,
          valuesToSet
        );
      });

      // Adjust spellcasting entries
      (npc.data?.spells || []).forEach((spellEntry, idx) => {
        // Get current DC value
        let currentDC = 0;
        if (
          spellEntry.data?.dc !== undefined &&
          spellEntry.data.dc !== null &&
          spellEntry.data.dc !== ""
        ) {
          currentDC =
            typeof spellEntry.data.dc === "number"
              ? spellEntry.data.dc
              : parseInt(spellEntry.data.dc);
        }

        // Get current Mod value
        let currentMod = 0;
        if (
          spellEntry.data?.mod !== undefined &&
          spellEntry.data.mod !== null &&
          spellEntry.data.mod !== ""
        ) {
          currentMod =
            typeof spellEntry.data.mod === "number"
              ? spellEntry.data.mod
              : parseInt(spellEntry.data.mod);
        }

        const baseDC =
          spellEntry.data?.baseDC !== undefined &&
          spellEntry.data?.baseDC !== null
            ? spellEntry.data.baseDC
            : currentDC;
        const baseMod =
          spellEntry.data?.baseMod !== undefined &&
          spellEntry.data?.baseMod !== null
            ? spellEntry.data.baseMod
            : currentMod;

        // Only adjust if we have actual values to work with
        if (baseDC !== 0 || baseMod !== 0) {
          if (
            spellEntry.data?.baseDC === undefined ||
            spellEntry.data?.baseDC === null
          ) {
            valuesToSet[`${dataPrefix}.spells.${idx}.data.baseDC`] = baseDC;
          }
          if (
            spellEntry.data?.baseMod === undefined ||
            spellEntry.data?.baseMod === null
          ) {
            valuesToSet[`${dataPrefix}.spells.${idx}.data.baseMod`] = baseMod;
          }
          valuesToSet[`${dataPrefix}.spells.${idx}.data.dc`] =
            baseDC + modifier;
          valuesToSet[`${dataPrefix}.spells.${idx}.data.mod`] =
            baseMod + modifier;
        }
      });
    }

    showHideFields(record, valuesToSet);

    api.setValues(valuesToSet, () => {
      // Update damage fields after adjusting formulas
      setNPCDamageFields(api.getValue(npcDataPath || ""));
    });
  }

  function onAddRemoveElite(value) {
    const adjustment = record.data?.adjustment || "";

    if (adjustment === "elite") {
      applyAdjustment("remove");
    } else {
      applyAdjustment("elite");
    }
  }

  function onAddRemoveWeak(value) {
    const adjustment = record.data?.adjustment || "";

    if (adjustment === "weak") {
      applyAdjustment("remove");
    } else {
      applyAdjustment("weak");
    }
  }

  function adjustDamageFormula(formula, adjustment) {
    // Parse formulas like "1d6", "2d8+3", "1d6+1d4"
    // Adjust the static bonus by the adjustment amount
    // If there's no static bonus, add one

    if (!formula || formula === "0") return "0";

    // Match pattern like "XdY+Z" or "XdY-Z" or just "XdY" or just "Z"
    const dicePattern = /(\d+d\d+)/g;
    const bonusPattern = /([+-]\d+)/g;

    const dice = formula.match(dicePattern) || [];
    const bonuses = formula.match(bonusPattern) || [];

    // Calculate total current bonus
    let totalBonus = bonuses.reduce((sum, b) => sum + parseInt(b), 0);
    totalBonus += adjustment;

    // Reconstruct formula
    let result = dice.join("+");
    if (totalBonus !== 0) {
      result += (totalBonus > 0 ? "+" : "") + totalBonus;
    }

    return result || "0";
  }

  function updateAttackStrikeFields(
    attack,
    attackIndex,
    newBonus,
    dataPrefix,
    valuesToSet
  ) {
    // Update strike1, strike2, strike3 fields based on attack bonus and traits
    if (newBonus === undefined || newBonus === null || newBonus === "") {
      return;
    }

    const attackBonus = parseInt(newBonus, 10);
    const bonusString = attackBonus >= 0 ? `+${attackBonus}` : `${attackBonus}`;

    // Check if attack has agile trait
    const traits = attack.data?.traits || [];
    const isAgile = traits.some((trait) => trait.toLowerCase() === "agile");
    const mapPenalty1 = isAgile ? 4 : 5;
    const mapPenalty2 = isAgile ? 8 : 10;

    const strike1 = `Strike ${bonusString}`;
    const strike2Bonus = attackBonus - mapPenalty1;
    const strike2BonusString =
      strike2Bonus >= 0 ? `+${strike2Bonus}` : `${strike2Bonus}`;
    const strike2 = `${strike2BonusString} (MAP -${mapPenalty1})`;
    const strike3Bonus = attackBonus - mapPenalty2;
    const strike3BonusString =
      strike3Bonus >= 0 ? `+${strike3Bonus}` : `${strike3Bonus}`;
    const strike3 = `${strike3BonusString} (MAP -${mapPenalty2})`;

    if (attack.data?.strike1 !== strike1) {
      valuesToSet[`${dataPrefix}.attacks.${attackIndex}.data.strike1`] =
        strike1;
    }
    if (attack.data?.strike2 !== strike2) {
      valuesToSet[`${dataPrefix}.attacks.${attackIndex}.data.strike2`] =
        strike2;
    }
    if (attack.data?.strike3 !== strike3) {
      valuesToSet[`${dataPrefix}.attacks.${attackIndex}.data.strike3`] =
        strike3;
    }
  }

  function onTraitsChange(traits) {
    setTraits(traits, (recordUpdated) => {
      showHideFields(recordUpdated);
    });
  }

  function getEliteAdjustmentTooltip() {
    const adjustment = record.data?.adjustment || "";
    if (adjustment === "elite") {
      return "Remove Elite Adjustment";
    }
    return "Apply Elite Adjustment";
  }

  function getWeakAdjustmentTooltip() {
    const adjustment = record.data?.adjustment || "";
    if (adjustment === "weak") {
      return "Remove Weak Adjustment";
    }
    return "Apply Weak Adjustment";
  }

  function updateInitiativeSkill(skillName) {
    // Get the skill modifier for the selected skill
    const valuesToSet = {};

    if (skillName?.toLowerCase() === "perception") {
      valuesToSet["data.initiativeMod"] = parseInt(
        record.data?.perceptionMod || "0",
        10
      );
    } else {
      const skills = record.data?.skills || [];
      const skill = skills.find(
        (s) => s.name?.toLowerCase() === skillName?.toLowerCase()
      );
      if (skill) {
        valuesToSet["data.initiativeMod"] = skill.data?.mod || 0;
      } else {
        valuesToSet["data.initiativeMod"] = 0;
      }
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }

  function onAddSkill(value) {
    const skillToAdd = record.data?.skillToAdd;
    if (!skillToAdd) {
      return;
    }

    // Add the skill to the skills list
    const newSkill = {
      _id: generateUuid(),
      name: skillToAdd,
      unidentifiedName: skillToAdd,
      identified: true,
      data: {
        mod: 0,
        skillWithMod: `${skillToAdd} +0`,
        rollTooltip: `Roll ${skillToAdd} Check`,
        note: "",
      },
    };

    api.addValue("data.skills", newSkill, () => {
      // Clear the dropdown
      api.setValue("data.skillToAdd", "");
    });
  }

  function onAddLoreSkill(value) {
    const loreSkillToAdd = record.data?.loreSkillToAdd;
    if (!loreSkillToAdd) {
      return;
    }

    // Add the lore skill to the skills list
    const newSkill = {
      _id: generateUuid(),
      name: loreSkillToAdd,
      unidentifiedName: loreSkillToAdd,
      identified: true,
      data: {
        mod: 0,
        skillWithMod: `${loreSkillToAdd} +0`,
        rollTooltip: `Roll ${loreSkillToAdd} Check`,
        note: "",
      },
    };

    api.addValue("data.skills", newSkill, () => {
      // Clear the text field
      api.setValue("data.loreSkillToAdd", "");
    });
  }

  function updateLanguages(value) {
    setLanguages(value);
  }

  function onAddImmunity() {
    const immunities = record?.data?.immunities;
    const valuesToSet = {};
    immunities.forEach((immunity, index) => {
      if (immunity.fields?.valueBox?.hidden !== true) {
        valuesToSet[`data.immunities.${index}.fields.valueBox.hidden`] = true;
        valuesToSet[`data.immunities.${index}.fields.doubleVs.hidden`] = true;
      }
    });

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet, () => {
        updateIWRName("immunities");
      });
    } else {
      updateIWRName("immunities");
    }
  }

  function onAddWeakness() {
    updateIWRName("weaknesses");
  }

  function onAddResistance() {
    updateIWRName("resistances");
  }

  function performSaveRoll(save) {
    rollSave(record, save);
  }

  function filterActions(type) {
    if (type === "passive") {
      return [
        { field: "actionType", operator: "equals", value: "passive" },
        { field: "actionType", operator: "is_empty", isOr: true },
      ];
    }
    return [{ field: "actionType", operator: "equals", value: type }];
  }

  function onAddAction(type) {
    const actions = record.data?.actions || [];
    const newAction = {
      _id: generateUuid(),
      name: `New ${capitalize(type)}`,
      unidentifiedName: `${capitalize(type)}`,
      identified: true,
      recordType: "actions",
      icon: "IconRun",
      data: {
        actionType: type,
        actions: type === "action" ? "oneAction" : undefined,
        description: "",
      },
      fields: {
        actions: {
          hidden: type === "action" ? false : true,
        },
      },
    };

    api.addValue("data.actions", newAction);
  }

  function raiseShield(value) {
    if (value === "true") {
      const ourToken = api.getToken();
      if (ourToken) {
        api.floatText(ourToken, "Raising a Shield", "#0000ff");
      }
      api.sendMessage(
        "**[center]Raising a Shield[/center]**",
        undefined,
        [],
        [],
        ourToken
      );
    }
    if (value === "false") {
      const ourToken = api.getToken();
      if (ourToken) {
        api.floatText(ourToken, "Lowering a Shield", "#0000ff");
      }
      api.sendMessage(
        "**[center]Lowering a Shield[/center]**",
        undefined,
        [],
        [],
        ourToken
      );
    }

    // Check for a shield in the inventory and use this AC, else default to 2
    const inventory = record.data?.inventory || [];
    const shield = inventory.find((item) => item.data?.type === "shield");
    const equippedShield = inventory.find(
      (item) =>
        item.data?.carried === "equipped" && item.data?.type === "shield"
    );
    let shieldAc = 2;
    if (equippedShield || shield) {
      // Use equipped shield first, else the other one we find
      shieldAc = equippedShield?.data?.acBonus || shield?.data?.acBonus || 0;
    }

    // If raising, add to AC, else subtract
    let newAC = record.data?.ac || 0;
    if (value === "true") {
      newAC += shieldAc;
    } else {
      newAC -= shieldAc;
    }

    api.setValues({ "data.ac": newAC });
  }
</script>

                listtype="iwr_list"
                field="resistances"
                onchange="onAddResistance()"
              ></list>
            </div>
          </popover.dropdown>
        </popover>
      </div>
      <div style="margin-top: 4px; margin-bottom: 4px">
        <divider></divider>
      </div>
      <label field="resistancesLabel" size="xs"></label>
    </div>

    <!-- Speeds section -->
    <box field="npcProperties">
      <div
        style="
          margin-top: 8px;
          display: flex;
          flex-direction: column;
          margin-top: 4px;
        "
      >
        <div
          style="
            display: flex;
            flex-direction: row;
            gap: 4px;
            align-items: center;
            margin-bottom: 4px;
          "
        >
          <div style="flex: 1">
            <label label="Speeds" variant="bold" size="xs"></label>
          </div>
          <popover>
            <popover.target>
              <iconbutton
                size="sm"
                variant="default"
                hideonlocked="true"
                options='[{"icon": "IconEdit", "label": "Edit Speeds", "value": "editSpeeds"}]'
                onclick="onEditSpeeds()"
              ></iconbutton>
            </popover.target>
            <popover.dropdown>
              <div
                style="
                  display: flex;
                  flex-direction: column;
                  gap: 4px;
                  min-width: 300px;
                "
              >
                <label label="Speeds" variant="bold" size="xs"></label>
                <list listtype="npc_speeds_edit_list" field="speeds"></list>
              </div>
            </popover.dropdown>
          </popover>
        </div>
        <divider></divider>
        <div
          style="
            display: flex;
            flex-direction: row;
            gap: 4px;
            width: 100%;
            margin-bottom: 4px;
            justify-content: space-between;
          "
        >
          <div
            style="
              display: flex;
              flex-direction: row;
              gap: 4px;
              align-items: center;
              margin-top: 4px;
            "
          >
            <numberfield
              field="speed.value"
              placeholder="0"
              textalign="center"
              width="60px"
              hidecontrols="true"
              size="xs"
            ></numberfield>
            <stringfield
              field="speed.details"
              placeholder="Speed details..."
              width="100%"
              size="xs"
            ></stringfield>
          </div>
        </div>
        <list listtype="npc_speeds_list" field="speeds"></list>
      </div>
    </box>
  </box>

  <!-- Traits -->
  <box scrollarea="hover" width="100%" height="100%" class="npc-right-column">
    <div
      style="
        display: flex;
        flex-direction: row;
        width: 100%;
        gap: 4px;
        background-color: rgb(
          from var(--mantine-color-primary-filled) r g b / 0.25
        );
        border-radius: 4px;
        margin-bottom: 4px;
        padding: 0px 4px;
        align-items: center;
      "
    >
      <label
        field="namefield"
        placeholder="New NPC"
        size="lg"
        variant="bold"
      ></label>
      <div
        style="
          margin-left: auto;
          display: flex;
          flex-direction: row;
          gap: 4px;
          align-items: center;
        "
      >
        <label
          field="levelLabel"
          size="lg"
          variant="bold"
          hidewhenidentified="false"
        ></label>
        <div
          style="
            margin-bottom: 8px;
            width: 40px;
            border-bottom: 1px solid var(--mantine-color-primary-filled);
          "
        >
          <numberfield
            field="level"
            variant="unstyled"
            bold="true"
            textalign="center"
            size="md"
            height="34px"
            defaultvalue="0"
            width="100%"
            placeholder="0"
            hidecontrols="true"
          ></numberfield>
        </div>
      </div>
    </div>

    <div style="display: flex; flex-direction: column; width: 100%; gap: 4px">
      <div style="display: flex; flex-direction: row; width: 100%; gap: 4px">
        <list
          width="100%"
          hidewhenidentified="false"
          listtype="traits_list"
          field="traitsList"
        ></list>
        <!-- Elite and Weak Adjustments -->
        <box field="npcProperties">
          <div style="display: flex; flex-direction: row; margin-left: auto">
            <tag
              field="elite"
              hidden="true"
              bold="true"
              label="Elite"
              backgroundcolor="green-9"
              tooltipfunction="return getEliteAdjustmentTooltip();"
              color="#ffffff"
              onclick="onAddRemoveElite(value);"
            ></tag>
            <tag
              field="setElite"
              hidden="true"
              label="Elite"
              tooltipfunction="return getEliteAdjustmentTooltip();"
              color="default"
              onclick="onAddRemoveElite(value);"
            ></tag>
            <tag
              field="weak"
              hidden="true"
              label="Weak"
              bold="true"
              tooltipfunction="return getWeakAdjustmentTooltip();"
              backgroundcolor="red-9"
              color="#ffffff"
              onclick="onAddRemoveWeak(value);"
            ></tag>
            <tag
              field="setWeak"
              hidden="true"
              label="Weak"
              tooltipfunction="return getWeakAdjustmentTooltip();"
              color="default"
              onclick="onAddRemoveWeak(value);"
            ></tag>
          </div>
        </box>
      </div>

      <box field="traitsEditor" hideonlocked="true" onload="showHideFields()">
        <dropdown
          multiselect="100"
          placeholder="Enter Traits..."
          field="traits"
          combo="true"
          label="Traits"
          optionsfunction="return getTraitOptions();"
          hidewhenidentified="false"
          onchange="onTraitsChange(value);"
        >
        </dropdown>
      </box>

      <!-- NPC Properties Sections -->
      <!-- Attribute Modifiers and Senses Section - Side by Side -->
      <box field="npcProperties">
        <div
          style="
            display: flex;
            flex-direction: row;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
          "
        >
          <!-- Attribute Modifiers Section -->
          <div style="display: flex; flex-direction: column; gap: 4px">
            <divider
              color="primary"
              label="ATTRIBUTE MODIFIERS"
              textalign="center"
            ></divider>
            <div
              style="display: flex; flex-direction: row; gap: 8px; padding: 8px"
            >
              <!-- Left Column -->
              <div style="display: flex; flex-direction: column; gap: 4px">
                <div
                  style="
                    display: flex;
                    flex-direction: row;
                    justify-content: space-between;
                    align-items: center;
                    gap: 4px;
                  "
                >
                  <label label="Str" variant="bold" size="xs"></label>
                  <numberfield
                    showsign="true"
                    size="xs"
                    width="60px"
                    field="str"
                    placeholder="+0"
                  ></numberfield>
                </div>
                <div
                  style="
                    display: flex;
                    flex-direction: row;
                    justify-content: space-between;
                    align-items: center;
                    gap: 4px;
                  "
                >
                  <label label="Dex" variant="bold" size="xs"></label>
                  <numberfield
                    showsign="true"
                    size="xs"
                    width="60px"
                    field="dex"
                    placeholder="+0"
                  ></numberfield>
                </div>
                <div
                  style="
                    display: flex;
                    flex-direction: row;
                    justify-content: space-between;
                    align-items: center;
                    gap: 4px;
                  "
                >
                  <label label="Con" variant="bold" size="xs"></label>
                  <numberfield
                    showsign="true"
                    size="xs"
                    width="60px"
                    field="con"
                    placeholder="+0"
                  ></numberfield>
                </div>
              </div>
              <!-- Right Column -->
              <div style="display: flex; flex-direction: column; gap: 4px">
                <div
                  style="
                    display: flex;
                    flex-direction: row;
                    justify-content: space-between;
                    align-items: center;
                    gap: 4px;
                  "
                >
                  <label label="Int" variant="bold" size="xs"></label>
                  <numberfield
                    showsign="true"
                    size="xs"
                    width="60px"
                    field="int"
                    placeholder="+0"
                  ></numberfield>
                </div>
                <div
                  style="
                    display: flex;
                    flex-direction: row;
                    justify-content: space-between;
                    align-items: center;
                    gap: 4px;
                  "
                >
                  <label label="Wis" variant="bold" size="xs"></label>
                  <numberfield
                    showsign="true"
                    size="xs"
                    width="60px"
                    field="wis"
                    placeholder="+0"
                  ></numberfield>
                </div>
                <div
                  style="
                    display: flex;
                    flex-direction: row;
                    justify-content: space-between;
                    align-items: center;
                    gap: 4px;
                  "
                >
                  <label label="Cha" variant="bold" size="xs"></label>
                  <numberfield
                    showsign="true"
                    size="xs"
                    width="60px"
                    field="cha"
                    placeholder="+0"
                  ></numberfield>
                </div>
              </div>
            </div>
          </div>

          <!-- Senses Section -->
          <div style="flex: 1; display: flex; flex-direction: column; gap: 4px">
            <divider
              color="primary"
              label="SENSES"
              textalign="center"
            ></divider>
            <div
              style="
                padding: 8px;
                display: flex;
                flex-direction: column;
                gap: 8px;
              "
            >
              <div
                style="
                  display: flex;
                  flex-direction: row;
                  align-items: center;
                  gap: 8px;
                "
              >
                <label label="Perception" variant="bold" size="xs"></label>
                <numberfield
                  showsign="true"
                  size="xs"
                  width="60px"
                  field="perceptionMod"
                  placeholder="+0"
                ></numberfield>
              </div>
              <stringfield
                width="100%"
                multiline="true"
                size="xs"
                field="senses"
                label="Senses"
                placeholder="Enter Senses..."
              ></stringfield>
            </div>
          </div>
        </div>

        <!-- Skills Section -->
        <div style="flex: 1; display: flex; flex-direction: column; gap: 4px">
          <divider color="primary" label="SKILLS" textalign="center"></divider>
          <div style="display: flex; flex-direction: row; align-items: center">
            <!-- NPC Skills List-->
            <list listtype="npc_skill_list" field="skills"></list>
            <div style="display: flex; flex-direction: row; margin-left: auto">
              <popover>
                <popover.target>
                  <iconbutton
                    hideonlocked="true"
                    size="sm"
                    icon="IconPlus"
                    variant="default"
                    options='[{"icon": "IconEdit", "label": "Add Skill", "value": "addSkill"}]'
                  ></iconbutton>
                </popover.target>
                <popover.dropdown>
                  <div
                    style="
                      display: flex;
                      flex-direction: column;
                      gap: 4px;
                      max-width: 300px;
                    "
                  >
                    <div style="display: flex; flex-direction: row; gap: 4px">
                      <div style="width: 80px">
                        <label
                          label="Skill"
                          variant="bold"
                          size="xs"
                          textalign="left"
                        ></label>
                      </div>
                      <div style="flex: 1">
                        <label
                          label="Note"
                          variant="bold"
                          size="xs"
                          textalign="left"
                        ></label>
                      </div>
                      <div style="width: 70px">
                        <label
                          label="Modifier"
                          variant="bold"
                          size="xs"
                          textalign="left"
                        ></label>
                      </div>
                    </div>
                    <list listtype="npc_skill_edit_list" field="skills"></list>
                    <div style="display: flex; flex-direction: row; gap: 4px">
                      <dropdown
                        field="skillToAdd"
                        placeholder="Select Skill..."
                        width="100%"
                        size="xs"
                        options='[{"label": "Acrobatics", "value": "Acrobatics"}, {"label": "Arcana", "value": "Arcana"}, {"label": "Athletics", "value": "Athletics"}, {"label": "Crafting", "value": "Crafting"}, {"label": "Deception", "value": "Deception"}, {"label": "Diplomacy", "value": "Diplomacy"}, {"label": "Intimidation", "value": "Intimidation"}, {"label": "Medicine", "value": "Medicine"}, {"label": "Nature", "value": "Nature"}, {"label": "Occultism", "value": "Occultism"}, {"label": "Performance", "value": "Performance"}, {"label": "Religion", "value": "Religion"}, {"label": "Society", "value": "Society"}, {"label": "Stealth", "value": "Stealth"}, {"label": "Survival", "value": "Survival"}, {"label": "Thievery", "value": "Thievery"}]'
                      ></dropdown>
                      <button
                        size="xs"
                        width="120px"
                        label="Add"
                        icon="IconPlus"
                        variant="outline"
                        onclick="onAddSkill(value);"
                      ></button>
                    </div>
                    <divider
                      color="primary"
                      label="LORE"
                      textalign="center"
                    ></divider>
                    <div style="display: flex; flex-direction: row; gap: 4px">
                      <stringfield
                        field="loreSkillToAdd"
                        placeholder="Enter Lore Skill..."
                        width="100%"
                        size="xs"
                      ></stringfield>
                      <button
                        size="xs"
                        width="120px"
                        label="Add"
                        icon="IconPlus"
                        variant="outline"
                        label="Add Skill"
                        onclick="onAddLoreSkill(value);"
                      ></button>
                    </div>
                  </div>
                </popover.dropdown>
              </popover>
            </div>
          </div>
        </div>

        <!-- Languages Section -->
        <div style="flex: 1; display: flex; flex-direction: column; gap: 4px">
          <divider
            color="primary"
            label="LANGUAGES"
            textalign="center"
          ></divider>
          <div style="display: flex; flex-direction: row; align-items: center">
            <list
              field="languagesList"
              listtype="language_list"
              size="xs"
            ></list>
            <div style="display: flex; flex-direction: row; margin-left: auto">
              <popover position="bottom" offset="4" witharrow="true">
                <popover.target>
                  <iconbutton
                    size="sm"
                    variant="default"
                    hideonlocked="true"
                    options='[{"icon": "IconEdit", "label": "Edit Languages", "value": "languages"}]'
                    field="Edit Languages"
                  ></iconbutton>
                </popover.target>
                <popover.dropdown>
                  <div
                    style="
                      display: flex;
                      flex-direction: column;
                      gap: 4px;
                      width: 300px;
                    "
                  >
                    <dropdown
                      size="xs"
                      field="languages"
                      placeholder="Enter Languages..."
                      multiselect="100"
                      width="100%"
                      combo="true"
                      label="Languages"
                      onchange="updateLanguages(value)"
                      optionsfunction="return getLanguageOptions();"
                    ></dropdown>
                  </div>
                </popover.dropdown>
              </popover>
            </div>
          </div>
        </div>
      </box>

      <!-- Vehicle Properties -->
      <box field="vehicleProperties" hidden="true" width="100%">
        <div
          style="
            display: flex;
            flex-direction: row;
            width: 100%;
            gap: 4px;
            flex-wrap: wrap;
          "
        >
          <div style="min-width: 50px; flex: 1">
            <numberfield
              width="100%"
              size="xs"
              field="space.long"
              label="Length"
              placeholder="0"
            ></numberfield>
          </div>
          <div style="min-width: 50px; flex: 1">
            <numberfield
              width="100%"
              size="xs"
              field="space.wide"
              label="Width"
              placeholder="0"
            ></numberfield>
          </div>
          <div style="min-width: 50px; flex: 1">
            <numberfield
              width="100%"
              size="xs"
              field="space.high"
              label="Height"
              placeholder="0"
            ></numberfield>
          </div>
          <div style="min-width: 50px; flex: 1">
            <numberfield
              width="100%"
              size="xs"
              field="price"
              label="Price"
              placeholder="0"
            ></numberfield>
          </div>
        </div>
        <stringfield
          width="100%"
          size="xs"
          field="speed.details"
          label="Speed"
          placeholder="Enter speed..."
          multiline="true"
        ></stringfield>
        <stringfield
          width="100%"
          size="xs"
          field="crew"
          label="Crew"
          placeholder="Enter crew..."
          multiline="true"
        ></stringfield>
        <stringfield
          width="100%"
          size="xs"
          field="passengers"
          label="Passengers"
          placeholder="Enter passengers..."
          multiline="true"
        ></stringfield>
        <div style="display: flex; flex-direction: row; width: 100%; gap: 4px">
          <numberfield
            width="100%"
            size="xs"
            field="collisionDC"
            label="Collision DC"
            placeholder="0"
          ></numberfield>
          <stringfield
            width="100%"
            size="xs"
            field="collisionDamage"
            label="Collision Damage"
            placeholder="Enter damage..."
          ></stringfield>
        </div>
      </box>

      <!-- Hazard Properties -->
      <box field="hazardProperties" hidden="true" width="100%">
        <divider color="primary" label="STEALTH" textalign="center"></divider>
        <div style="margin-bottom: 4px">
          <numberfield
            width="100%"
            size="xs"
            field="sealth.value"
            label="Stealth DC"
            placeholder="0"
          ></numberfield>
        </div>
        <richtextfield
          width="100%"
          size="xs"
          field="stealth.details"
          placeholder="Enter stealth details..."
        ></richtextfield>
        <divider color="primary" label="DISABLE" textalign="center"></divider>
        <richtextfield
          width="100%"
          size="xs"
          field="disable"
          placeholder="Enter disable details..."
        ></richtextfield>
        <divider color="primary" label="ROUTINE" textalign="center"></divider>
        <div
          style="
            display: flex;
            flex-direction: row;
            align-items: center;
            margin-bottom: 4px;
          "
        >
          <checkbox size="xs" field="isComplex" label="Is Complex"></checkbox>
        </div>
        <richtextfield
          width="100%"
          size="xs"
          field="routine"
          placeholder="Enter routine details..."
        ></richtextfield>
        <divider color="primary" label="RESET" textalign="center"></divider>
        <richtextfield
          width="100%"
          size="xs"
          field="reset"
          placeholder="Enter reset details..."
        ></richtextfield>
      </box>
    </div>

    <!-- Proprties shared with other types -->
    <box field="sharedProperties">
      <!-- Attacks Section -->
      <div style="flex: 1; display: flex; flex-direction: column; gap: 4px">
        <divider color="primary" label="ATTACKS" textalign="center"></divider>
        <div style="display: flex; flex-direction: row; align-items: center">
          <list
            field="attacks"
            listtype="npc_attack_list"
            size="xs"
            onchange="onAddRemoveAttack();"
          ></list>
        </div>
      </div>

      <!-- Actions Section -->
      <div style="flex: 1; display: flex; flex-direction: column; gap: 4px">
        <div
          style="
            display: flex;
            flex-direction: row;
            align-items: center;
            width: 100%;
          "
        >
          <div style="width: 100%; margin-right: 4px">
            <divider
              color="primary"
              width="100%"
              label="ACTIONS"
              textalign="center"
            ></divider>
          </div>
          <iconbutton
            size="sm"
            variant="default"
            hideonlocked="true"
            options='[{"icon": "IconPlus", "label": "Add Action", "value": "addAction"}]'
            onclick="onAddAction('action');"
            field="addActionBtn"
          ></iconbutton>
        </div>
        <div style="display: flex; flex-direction: row; align-items: center">
          <list
            listtype="npc_actions_list"
            field="actions"
            getfilters="return filterActions('action');"
          ></list>
        </div>
      </div>

      <!-- Passives Section -->
      <div
        style="
          flex: 1;
          display: flex;
          flex-direction: column;
          gap: 4px;
          margin-top: 4px;
        "
      >
        <div
          style="
            display: flex;
            flex-direction: row;
            align-items: center;
            width: 100%;
          "
        >
          <div style="width: 100%; margin-right: 4px">
            <divider
              color="primary"
              width="100%"
              label="PASSIVES"
              textalign="center"
            ></divider>
          </div>
          <iconbutton
            size="sm"
            variant="default"
            hideonlocked="true"
            options='[{"icon": "IconPlus", "label": "Add Passive", "value": "addPassive"}]'
            onclick="onAddAction('passive');"
            field="addPassiveBtn"
          ></iconbutton>
        </div>
        <div style="display: flex; flex-direction: row; align-items: center">
          <list
            listtype="npc_actions_list"
            field="actions"
            getfilters="return filterActions('passive');"
          ></list>
        </div>
      </div>
    </box>
  </box>
</div>

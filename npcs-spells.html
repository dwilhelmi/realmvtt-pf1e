<script>
  function onAddSpellcastingEntry() {
    addSpellcastingEntry(record);
    api.closeOpenedPopovers();
  }
</script>

<div>
  <label variant="bold" textalign="center" label="Spellcasting"></label>
</div>

<div style="width: 100%">
  <list listtype="npc_spellcasting_entry_list" field="spells"></list>
  <popover>
    <popover.target>
      <div style="margin-top: 4px">
        <button
          size="xs"
          variant="outline"
          icon="IconPlus"
          label="Add Spellcasting Entry"
          hideonlocked="true"
        ></button>
      </div>
    </popover.target>
    <popover.dropdown>
      <div
        style="
          display: flex;
          flex-direction: column;
          gap: 4px;
          width: 200px;
          max-width: 200px;
        "
      >
        <label
          size="xs"
          variant="bold"
          label="Spellcasting Entry Settings"
        ></label>
        <dropdown
          size="xs"
          field="addType"
          placeholder="Select Type..."
          defaultvalue="prepared"
          width="100%"
          disablediflocked="false"
          label="Spellcasting Type"
          options='[{"label": "Prepared", "value": "prepared"},
        {"label": "Spontaneous", "value": "spontaneous"},
        {"label": "Spell-Like Abilities", "value": "innate"}]'
        ></dropdown>
        <divider></divider>
        <dropdown
          size="xs"
          field="addAttribute"
          placeholder="Select Attribute..."
          defaultvalue="int"
          width="100%"
          label="Casting Ability"
          disablediflocked="false"
          options='[{"label": "Intelligence", "value": "int"},
      {"label": "Wisdom", "value": "wis"},
      {"label": "Charisma", "value": "cha"}]'
        ></dropdown>
        <button
          size="xs"
          variant="outline"
          label="Add"
          onclick="onAddSpellcastingEntry();"
        ></button>
      </div>
    </popover.dropdown>
  </popover>
</div>

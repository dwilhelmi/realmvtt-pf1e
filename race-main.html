<div
  style="
    display: flex;
    flex-direction: row;
    width: 100%;
    gap: 4px;
    background-color: rgb(
      from var(--mantine-color-primary-filled) r g b / 0.25
    );
    border-radius: 4px;
    margin-bottom: 4px;
    padding: 0px 4px;
  "
>
  <label
    field="namefield"
    placeholder="New Race"
    size="lg"
    variant="bold"
  ></label>
</div>

<div
  style="
    display: flex;
    gap: 4px;
    flex-direction: column;
    width: 100%;
    margin-bottom: 4px;
  "
>
  <!-- Portrait + Basic Info -->
  <div style="display: flex; gap: 4px">
    <div
      style="width: 125px; height: 125px; min-height: 125px; min-width: 125px"
    >
      <portrait width="125px" height="125px" field="portrait"></portrait>
    </div>
    <div
      style="
        display: flex;
        gap: 4px;
        flex-direction: column;
        width: 100%;
      "
    >
      <div style="width: 100%; display: flex; gap: 4px">
        <dropdown
          width="100%"
          field="type"
          label="Type"
          placeholder="Select Type..."
          options='[{"label": "Aberration", "value": "aberration"}, {"label": "Animal", "value": "animal"}, {"label": "Construct", "value": "construct"}, {"label": "Dragon", "value": "dragon"}, {"label": "Fey", "value": "fey"}, {"label": "Humanoid", "value": "humanoid"}, {"label": "Magical Beast", "value": "magical_beast"}, {"label": "Monstrous Humanoid", "value": "monstrous_humanoid"}, {"label": "Outsider (Native)", "value": "outsider_native"}, {"label": "Plant", "value": "plant"}, {"label": "Undead", "value": "undead"}]'
        >
        </dropdown>
        <dropdown
          width="100%"
          field="size"
          label="Size"
          placeholder="Select Size..."
          options='[{"label": "Fine", "value": "fine"}, {"label": "Diminutive", "value": "diminutive"}, {"label": "Tiny", "value": "tiny"}, {"label": "Small", "value": "small"}, {"label": "Medium", "value": "medium"}, {"label": "Large", "value": "large"}, {"label": "Huge", "value": "huge"}, {"label": "Gargantuan", "value": "gargantuan"}, {"label": "Colossal", "value": "colossal"}]'
        >
        </dropdown>
      </div>
      <div style="width: 100%; display: flex; gap: 4px">
        <stringfield
          width="100%"
          field="subtypes"
          label="Subtypes"
          placeholder="e.g. Dwarf, Elf..."
        >
        </stringfield>
        <numberfield
          width="100%"
          field="speed"
          label="Speed (ft.)"
          placeholder="30"
        >
        </numberfield>
      </div>
      <stringfield
        width="100%"
        field="senses"
        label="Senses"
        placeholder="e.g. Darkvision 60 ft., Low-Light Vision..."
      >
      </stringfield>
    </div>
  </div>

  <!-- Ability Modifiers -->
  <divider label="Ability Modifiers"></divider>
  <div style="width: 100%; display: flex; gap: 4px">
    <numberfield width="100%" field="strMod" label="STR" placeholder="0">
    </numberfield>
    <numberfield width="100%" field="dexMod" label="DEX" placeholder="0">
    </numberfield>
    <numberfield width="100%" field="conMod" label="CON" placeholder="0">
    </numberfield>
    <numberfield width="100%" field="intMod" label="INT" placeholder="0">
    </numberfield>
    <numberfield width="100%" field="wisMod" label="WIS" placeholder="0">
    </numberfield>
    <numberfield width="100%" field="chaMod" label="CHA" placeholder="0">
    </numberfield>
  </div>

  <!-- Languages -->
  <divider label="Languages"></divider>
  <stringfield
    width="100%"
    field="languages"
    label="Starting Languages"
    placeholder="e.g. Common, Dwarven..."
  >
  </stringfield>
  <stringfield
    width="100%"
    field="bonusLanguages"
    label="Bonus Languages"
    placeholder="e.g. Giant, Gnome, Goblin, Orc, Terran, Undercommon..."
  >
  </stringfield>

  <!-- Racial Traits -->
  <divider label="Racial Traits"></divider>
  <list
    width="100%"
    field="racialTraits"
    listtype="racial_trait"
  ></list>
</div>

<!-- Description -->
<richtextfield
  placeholder="Enter race description..."
  field="description"
  label="Description"
></richtextfield>

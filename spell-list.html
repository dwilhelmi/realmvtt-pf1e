<script>
  // Helper function to get the spell slot level from a spell data path
  // Returns 0 for cantrips, 1-10 for spell ranks
  function getSlotLevelFromPath(spellDataPath) {
    const pathParts = spellDataPath.split(".");
    let spellListType = "";

    // Find the spell list type (cantrips, spells1, spells2, etc.) in the path
    for (let i = pathParts.length - 1; i >= 0; i--) {
      if (pathParts[i] === "cantrips" || pathParts[i].startsWith("spells")) {
        spellListType = pathParts[i];
        break;
      }
    }

    // Return 0 for cantrips
    if (spellListType === "cantrips") {
      return 0;
    }

    // Extract rank from spellListType (e.g., "spells1" -> 1, "spells10" -> 10)
    const rankMatch = spellListType.match(/spells(\d+)/);
    if (rankMatch) {
      return parseInt(rankMatch[1], 10);
    }

    return 0; // Default to 0 if not found
  }

  function deleteSpell() {
    const dataPathToSpell = getNearestParentDataPath(dataPath);

    // Extract the index (last part of the path)
    const pathParts = dataPathToSpell.split(".");
    const index = parseInt(pathParts.pop(), 10);

    // Join remaining parts to get the spell list path (keeps .data. intact)
    const spellListDataPath = pathParts.join(".");

    // Call removeValue with the list path and index
    api.removeValue(spellListDataPath, index);
  }

  function onCastSpell() {
    const dataPathToSpell = getNearestParentDataPath(dataPath);
    const spell = api.getValue(dataPathToSpell);
    castSpell(record, spell, dataPathToSpell);
  }

  function toggleUsed(value) {
    const dataPathToSpell = getNearestParentDataPath(dataPath);
    const spell = api.getValue(dataPathToSpell);
    const used = value;

    const valuesToSet = {};

    if (used) {
      valuesToSet[`${dataPathToSpell}.fields.nameBox.hidden`] = true;
      valuesToSet[`${dataPathToSpell}.fields.nameUsedBox.hidden`] = false;
    } else {
      valuesToSet[`${dataPathToSpell}.fields.nameUsedBox.hidden`] = true;
      valuesToSet[`${dataPathToSpell}.fields.nameBox.hidden`] = false;
    }

    api.setValues(valuesToSet);
  }

  function computeDefenseString(defense) {
    // Format the defense object into a string
    if (!defense && !defense?.passive && !defense?.save) {
      return "";
    }
    let defenseString = "";
    if (defense?.passive?.statistic) {
      let passiveStatistic = defense?.passive?.statistic;
      if (passiveStatistic === "ac") {
        passiveStatistic = "AC";
      } else if (passiveStatistic === "fortitude-dc") {
        passiveStatistic = "Fortitude DC";
      } else if (passiveStatistic === "reflex-dc") {
        passiveStatistic = "Reflex DC";
      } else if (passiveStatistic === "will-dc") {
        passiveStatistic = "Will DC";
      }
      defenseString += `${passiveStatistic} `;
    }
    if (defense?.save?.basic) {
      if (defenseString.length > 0) {
        defenseString += " |";
      }
      defenseString += " Basic";
    }
    if (defense?.save?.statistic) {
      if (defenseString.length > 0) {
        defenseString += " ";
      }
      defenseString += `${capitalize(defense?.save?.statistic)} `;
    }
    return defenseString.trim();
  }

  function onDrop(value, recordLink) {
    const dataPathToSpell = getNearestParentDataPath(dataPath);
    const spellSlot = api.getValue(dataPathToSpell);
    const spellCastingEntry = api.getValue(
      getNearestParentDataPath(dataPathToSpell)
    );
    const spell = recordLink?.value;

    const isSpontaneousOrFocus =
      spellCastingEntry?.data?.type === "spontaneous" ||
      spellCastingEntry?.data?.type === "innate" ||
      spellCastingEntry?.data?.type === "focus";

    if (value === "spells") {
      // If this is a spell slot, we set it
      const valuesToSet = {};

      // Make sure it matches the LEVEL of the slot else notify error
      const spellLevel = parseInt(spell?.data?.level || "0", 10);
      const slotLevel = getSlotLevelFromPath(dataPathToSpell);
      const isCantrip = (spell?.data?.traits || [])
        .map((trait) => trait.toLowerCase())
        .includes("cantrip");
      const spellType = spell?.data?.type;

      // Check cantrip vs non-cantrip first
      if (slotLevel === 0 && !isCantrip) {
        api.showNotification(
          `This slot only accepts Cantrips.`,
          "red",
          "Not a Cantrip"
        );
        return;
      }

      if (isCantrip && slotLevel > 0) {
        api.showNotification(
          `Cantrips can only be placed in Cantrip slots.`,
          "red",
          "Spell Type Mismatch"
        );
        return;
      }

      // Check if spell level is too high for the slot (only for non-cantrips)
      if (!isCantrip && spellLevel > slotLevel) {
        api.showNotification(
          `This slot requires a spell of Rank ${slotLevel} or lower.`,
          "red",
          "Spell Level Mismatch"
        );
        return;
      }

      const setSpell = () => {
        valuesToSet[`${dataPathToSpell}`] = {
          ...spell,
          _id: spellSlot?._id,
          data: {
            type: "spell",
            ...spell?.data,
            level: spell?.data?.level,
            slotOrder: spellSlot?.data?.slotOrder,
            defenseString: computeDefenseString(spell?.data?.defense),
          },
          fields: {
            ...(spell?.fields || {}),
            spellDetails: { hidden: false },
            spellSlot: { hidden: true },
            used: { hidden: isCantrip || isSpontaneousOrFocus },
          },
        };
        api.setValues(valuesToSet);
      };

      // If the spell was already set, we need to clear it first
      if (spellSlot.data?.type === "spell") {
        clearSpell(setSpell, false);
      } else {
        setSpell();
      }
    }
  }

  function clearSpell(callback, confirm = true) {
    const dataPathToSpell = getNearestParentDataPath(dataPath);
    const spellSlot = api.getValue(dataPathToSpell);

    const rank = getSlotLevelFromPath(dataPathToSpell);
    const isCantrip = rank === 0;

    // Check if spontaneous or focus
    const spellCastingEntryDataPath = getNearestParentDataPath(dataPathToSpell);
    const type =
      api.getValue(spellCastingEntryDataPath)?.data?.type || "prepared";
    const isSpontaneous = type === "spontaneous";
    const isFocus = type === "focus";
    const isInnate = type === "innate";

    let slotName = isCantrip ? "Cantrip Slot" : `Rank ${rank} Spell Slot`;
    if (isSpontaneous || isFocus || isInnate) {
      slotName = isCantrip ? "New Cantrip" : `New Rank ${rank} Spell`;
    }
    onDeleteSpell = () => {
      if (spellSlot.data?.type !== "slot") {
        const valuesToSet = {};
        valuesToSet[`${dataPathToSpell}`] = {
          name: slotName,
          unidentifiedName: slotName.replace("New ", ""),
          _id: spellSlot?._id,
          portrait: null,
          data: {
            type: "slot",
            traits: [],
            traditions: [],
            description: "",
            traitsList: [],
            defense: null,
            range: "",
            time: "",
            target: "",
            cost: "",
            duration: "",
            area: null,
            damage: null,
            heightened: null,
            overlays: null,
            level: rank,
            slotOrder: spellSlot?.data?.slotOrder,
            used: false,
          },
          fields: {
            spellDetails: { hidden: true },
            spellSlot: { hidden: false },
            nameBox: { hidden: false },
            nameUsedBox: { hidden: true },
            deleteBtn: { hidden: !isSpontaneous && !isFocus && !isInnate },
            used: { hidden: isSpontaneous || isFocus || isInnate || isCantrip },
          },
        };
        api.setValues(valuesToSet, () => {
          if (callback) {
            callback();
          }
        });
      }
    };

    if (confirm) {
      api.showConfirm(
        "Remove Spell",
        `Are you sure you want to remove ${spellSlot.name}?`,
        "Yes",
        "No",
        onDeleteSpell
      );
    } else {
      onDeleteSpell();
    }
  }

  function showSpellSlotOptions() {
    const dataPathToSpell = getNearestParentDataPath(dataPath);
    const spellSlot = api.getValue(dataPathToSpell);

    const spellSlotLevel = getSlotLevelFromPath(dataPathToSpell);
    const actualLevel = spellSlotLevel === 0 ? 1 : spellSlotLevel;

    const options = [];

    const optionSelection = (values) => {
      if (values.length > 0) {
        const spell = values[0];
        onDrop("spells", { value: spell, tooltip: spell.name });
      }
    };

    // Check the tradition of the spell list this slot is part of
    // and query for spells with that trait
    const spellListDataPath = getNearestParentDataPath(dataPathToSpell);
    const spellList = api.getValue(spellListDataPath);
    const tradition = spellList?.data?.tradition || "Arcane";

    const optionsQuery = {
      type: "spells",
      query: {
        $or: [
          { "data.level": { $lte: actualLevel } },
          { "data.level": { $exists: false } },
          { "data.level": null },
        ],
        $and: [
          {
            $or: [
              {
                "data.traits": {
                  $elemMatch: { $regex: `^${tradition}$`, $options: "i" },
                },
              },
              {
                "data.traditions": {
                  $elemMatch: { $regex: `^${tradition}$`, $options: "i" },
                },
              },
            ],
          },
          ...(spellSlotLevel === 0
            ? [
                {
                  "data.traits": {
                    $elemMatch: { $regex: `^cantrip$`, $options: "i" },
                  },
                },
              ]
            : [
                {
                  "data.traits": {
                    $not: {
                      $elemMatch: { $regex: `^cantrip$`, $options: "i" },
                    },
                  },
                },
              ]),
        ],
      },
    };

    let message = `Select a Rank ${spellSlotLevel} Spell`;
    if (spellSlotLevel === 0) {
      message += "Select a Cantrip";
    }
    if (tradition) {
      message += ` from the ${capitalize(tradition)} Tradition`;
    }

    api.showPrompt(
      message,
      spellSlotLevel === 0 ? "Select Cantrip" : "Select Spell",
      spellSlotLevel === 0 ? "Select a Cantrip..." : "Select a Spell...",
      null,
      optionsQuery,
      optionSelection
    );
  }
</script>

<box field="spellSlot" hidden="true">
  <div
    style="
      display: flex;
      flex-direction: column;
      gap: 2px;
      width: 100%;
      align-items: center;
      padding: 12px 4px;
      border-bottom: 1px solid var(--mantine-color-default-border);
    "
  >
    <div style="display: flex; gap: 4px; width: 100%; align-items: center">
      <div
        style="
          width: 30px;
          height: 30px;
          min-width: 30px;
          min-height: 30px;
          border: 1px solid var(--mantine-color-default-border);
        "
      >
        <iconbutton
          size="md"
          variant="subtle"
          color="default"
          onclick="showSpellSlotOptions()"
          options='[{"label": "Select Spell", "icon": "IconWand", "value": "selectSpell"}]'
        ></iconbutton>
      </div>
      <div style="display: flex; width: 100%; flex-direction: column; gap: 2px">
        <label size="sm" variant="bold" field="namefield"></label>
        <label size="xs" color="dimmed" label="Drag a Spell Here"></label>
      </div>
      <box field="deleteBtn" hidden="true">
        <div style="margin-right: 4px; margin-left: auto">
          <iconbutton
            size="sm"
            variant="default"
            color="red"
            hideonlocked="true"
            onclick="deleteSpell()"
            options='[{"label": "Remove Spell", "icon": "IconTrash", "value": "removeSpell"}]'
          ></iconbutton>
        </div>
      </box>
    </div>
  </div>
</box>
<box field="spellDetails" hidden="false">
  <accordion size="xs" field="descriptionOpen">
    <accordion.control>
      <div style="display: flex; gap: 4px; width: 100%; align-items: center">
        <div
          style="width: 30px; height: 30px; min-width: 30px; min-height: 30px"
        >
          <portrait width="30px" height="30px" field="portrait"></portrait>
        </div>
        <div
          style="
            display: flex;
            flex-direction: row;
            gap: 8px;
            min-width: 140px;
            flex-grow: 1;
            align-items: center;
          "
        >
          <box field="nameBox">
            <div style="width: fit-content">
              <label field="namefield" size="sm" variant="bold"></label>
            </div>
          </box>
          <box field="nameUsedBox" hidden="true">
            <div style="text-decoration: line-through; width: fit-content">
              <label field="namefield" size="sm" variant="bold"></label>
            </div>
          </box>
          <iconbutton
            field="actions"
            size="sm"
            variant="subtle"
            color="default"
            disabled="true"
            hidden="false"
            width="max-content"
            options='[{"label": "Free Action", "value": "free", "icon": "free-action"},
  {"label": "One Action", "value": "oneAction", "icon": "one-action"},
  {"label": "Two Actions", "value": "twoActions", "icon": "two-actions"},
  {"label": "Three Actions", "value": "threeActions", "icon": "three-actions"},
  {"label": "1 to 2 Actions", "value": "oneToTwoActions", "icon": "1-to-2"},
  {"label": "1 to 3 Actions", "value": "oneToThreeActions", "icon": "1-to-3"},
  {"label": "Reaction", "value": "reaction", "icon": "reaction"}]'
          ></iconbutton>
        </div>
        <div style="min-width: 100px; width: 100px; margin-left: 8px">
          <label size="sm" textalign="center" field="defenseString"></label>
        </div>
        <div style="min-width: 70px; width: 70px; margin-left: 8px">
          <label
            size="sm"
            width="100%"
            field="range"
            textalign="center"
          ></label>
        </div>
        <div style="min-width: 60px; width: 60px">
          <button
            size="xs"
            variant="light"
            width="100%"
            color="primary"
            label="Cast"
            onclick="onCastSpell()"
          ></button>
        </div>
        <checkbox
          size="xs"
          field="used"
          color="primary"
          editable="true"
          onchange="toggleUsed(value)"
        ></checkbox>
        <div style="margin-right: 4px; margin-left: auto">
          <iconbutton
            size="sm"
            variant="default"
            color="red"
            hideonlocked="true"
            onclick="clearSpell()"
            options='[{"label": "Remove Spell", "icon": "IconTrash", "value": "removeSpell"}]'
          ></iconbutton>
        </div>
      </div>
    </accordion.control>

    <div
      style="
        display: flex;
        flex-direction: row;
        width: 100%;
        gap: 4px;
        background-color: rgb(
          from var(--mantine-color-primary-filled) r g b / 0.25
        );
        border-radius: 4px;
        margin-bottom: 4px;
        align-items: center;
      "
    >
      <label field="namefield" size="sm" variant="bold"></label>
      <iconbutton
        field="actions"
        size="sm"
        variant="subtle"
        color="default"
        disabled="true"
        hidden="true"
        width="max-content"
        options='[{"label": "Free Action", "value": "free", "icon": "free-action"},
    {"label": "One Action", "value": "oneAction", "icon": "one-action"},
    {"label": "Two Actions", "value": "twoActions", "icon": "two-actions"},
    {"label": "Three Actions", "value": "threeActions", "icon": "three-actions"},
    {"label": "1 to 2 Actions", "value": "oneToTwoActions", "icon": "1-to-2"},
    {"label": "1 to 3 Actions", "value": "oneToThreeActions", "icon": "1-to-3"},
    {"label": "Reaction", "value": "reaction", "icon": "reaction"}]'
      ></iconbutton>
      <div style="margin-left: auto">
        <label
          hidden="true"
          field="levelLabel"
          size="sm"
          variant="bold"
        ></label>
      </div>
    </div>

    <div
      style="
        display: flex;
        gap: 4px;
        flex-direction: column;
        width: 100%;
        margin-bottom: 4px;
      "
    >
      <div style="display: flex; flex-direction: row; width: 100%; gap: 4px">
        <list
          width="100%"
          hidewhenidentified="false"
          listtype="traits_list"
          field="traitsList"
        ></list>
      </div>

      <richtextfield
        disablecontrols="true"
        field="description"
        placeholder="Spell description..."
      ></richtextfield>
    </div>
  </accordion>
</box>
<numberfield field="slotOrder" hidden="true"></numberfield>

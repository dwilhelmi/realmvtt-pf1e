<script>
  // TODO add things for other types such as Focus points
  // TODO in onEditFeature we need to set these values

  function deleteSpellcastingEntry() {
    const spellcastingEntryDataPath = getNearestParentDataPath(dataPath);
    const indexValue = parseInt(spellcastingEntryDataPath.split(".").pop(), 10);

    if (isNaN(indexValue) || indexValue < 0) {
      return;
    }

    api.showConfirm(
      "Delete Spellcasting Entry",
      "Are you sure you want to delete this spellcasting entry?",
      "Yes",
      "No",
      () => {
        api.removeValue("data.spells", indexValue);
      }
    );
  }

  function onChangeValue() {
    const spellcastingEntryDataPath = getNearestParentDataPath(dataPath);
    const spellcastingEntry = api.getValue(spellcastingEntryDataPath);

    updateSpellcastingEntry(
      record,
      spellcastingEntry,
      spellcastingEntryDataPath
    );
  }
</script>

<div
  style="
    display: flex;
    flex-direction: row;
    width: 100%;
    gap: 4px;
    background-color: rgb(
      from var(--mantine-color-primary-filled) r g b / 0.25
    );
    border: 1px solid var(--mantine-color-default-border);
    border-radius: 4px;
    margin-bottom: 4px;
    padding: 0px 4px;

  "
>
  <namefield

  <div style="margin-left: auto">

        <popover.dropdown>

              max-width: 200px;
            "
          >
            <label

            <dropdown

              options='[{"label": "Prepared", "value": "prepared"},
              {"label": "Spontaneous", "value": "spontaneous"},

      <iconbutton

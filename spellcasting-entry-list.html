<script>
  function onAddSpell(spellListName) {
    const spellcastingEntryDataPath = getNearestParentDataPath(dataPath);
    addSpell(`${spellcastingEntryDataPath}.data.${spellListName}`);
  }

  function deleteSpellcastingEntry() {
    const spellcastingEntryDataPath = getNearestParentDataPath(dataPath);
    const spellcastingEntry = api.getValue(spellcastingEntryDataPath);
    const indexValue = parseInt(spellcastingEntryDataPath.split(".").pop(), 10);

    if (isNaN(indexValue) || indexValue < 0) {
      return;
    }

    api.showConfirm(
      "Delete Spellcasting Entry",
      `Are you sure you want to delete the "${spellcastingEntry.name}" entry?`,
      "Yes",
      "No",
      () => {
        const allSpellcastingEntries = [...(record.data?.spells || [])];

        // Remove the entry
        allSpellcastingEntries.splice(indexValue, 1);

        // If we deleted the first entry and there are remaining entries,
        // ensure the new first entry has its move up button hidden
        if (indexValue === 0 && allSpellcastingEntries.length > 0) {
          allSpellcastingEntries[0].fields =
            allSpellcastingEntries[0].fields || {};
          allSpellcastingEntries[0].fields.moveUpBtn =
            allSpellcastingEntries[0].fields.moveUpBtn || {};
          allSpellcastingEntries[0].fields.moveUpBtn.hidden = true;
        }

        api.setValues({
          "data.spells": allSpellcastingEntries,
        });
      }
    );
  }

  function onChangeValue() {
    const spellcastingEntryDataPath = getNearestParentDataPath(dataPath);
    const spellcastingEntry = api.getValue(spellcastingEntryDataPath);

    updateSpellcastingEntry(
      record,
      spellcastingEntry,
      spellcastingEntryDataPath
    );
  }
</script>

  <div style="width: 100%; background-color: var(--mantine-color-dark-light); border: 1px solid var(--mantine-color-default-border); padding: 4px; margin-top: 4px; display: flex; flex-direction: row; align-items: center">
    <div style="display: flex; flex-direction: row; align-items: center; flex-grow: 1">
      <div style="min-width: 70px; width: 70px">
        <label label="7th Level" width="100%" size="xs" variant="bold" textalign="left"></label>
      </div>
      <box field="spontaneousBox" hidden="true">
        <div style="display: flex; flex-direction: row; gap: 4px; align-items: center; margin-right: 4px">
          <div style="min-width: 40px; width: 40px">
            <numberfield field="usedSpells7" maxvaluefield="numSpells7" width="100%" placeholder="0" minvalue="0" bold="true" hidecontrols="true" textalign="center" size="xs"></numberfield>
          </div>
          <label label="/" size="xs" variant="bold"></label>
        </div>
      </box>
      <div style="min-width: 40px; width: 40px">
        <numberfield field="numSpells7" updateonblur="true" onchange="onChangeValue();" width="100%" placeholder="0" minvalue="0" maxvalue="20" bold="true" hidecontrols="true" textalign="center" size="xs"></numberfield>
      </div>
    </div>
    <div style="min-width: 96px; width: 96px; margin-left: 16px"><label label="Save" size="xs" variant="bold"></label></div>
    <div style="min-width: 70px; width: 70px; margin-left: 16px"><label label="Range" size="xs" variant="bold"></label></div>
    <box field="spacer" hideonlocked="true"><div style="min-width: 20px; width: 20px"></div></box>
    <div style="min-width: 56px; width: 56px; margin-left: 16px"></div>
    <iconbutton field="addBtn" hidden="true" size="sm" variant="subtle" color="default" options='[{"icon": "IconPlus", "label": "Add Spell", "value": "add"}]' onclick="onAddSpell('spells7');"></iconbutton>
  </div>
  <list lazy="true" field="spells7" variant="striped" listtype="spell_list"></list>
</box>

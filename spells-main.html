<script>
  // Show or hide relevant values on load or change of type
  function showHideFields() {
    const spellDataPath = getNearestParentDataPath(dataPath);
    const spell = spellDataPath ? api.getValue(spellDataPath) : record;
    const dataPrefix = spellDataPath ? `${spellDataPath}.data` : "data";
    const fieldsPath = spellDataPath ? `${spellDataPath}.fields` : "fields";

    const valuesToSet = {};

    // Check if traits is set
    if (
      spell.data?.traits &&
      spell.data?.traits.length > 0 &&
      !spell.data?.traitsList
    ) {
      const traitsObjects = [];
      for (const trait of spell.data.traits) {
        traitsObjects.push({
          _id: generateUuid(),
          name: trait,
          identified: true,
          data: {},
        });
      }

      valuesToSet[`${dataPrefix}.traitsList`] = traitsObjects;
    }

    // Set actions based on time
    const showActions = spell.data?.type !== "ritual";
    if (showActions && spell.fields?.actions?.hidden !== false) {
      valuesToSet[`${fieldsPath}.actions.hidden`] = false;
    } else if (!showActions && spell.fields?.actions?.hidden !== true) {
      valuesToSet[`${fieldsPath}.actions.hidden`] = true;
    }

    const time = spell.data?.time || "";
    if (showActions) {
      if (time === "free" && spell.data?.actions !== "free") {
        valuesToSet[`${dataPrefix}.actions`] = "free";
      } else if (time === "1" && spell.data?.actions !== "oneAction") {
        valuesToSet[`${dataPrefix}.actions`] = "oneAction";
      } else if (time === "2" && spell.data?.actions !== "twoActions") {
        valuesToSet[`${dataPrefix}.actions`] = "twoActions";
      } else if (time === "3" && spell.data?.actions !== "threeActions") {
        valuesToSet[`${dataPrefix}.actions`] = "threeActions";
      } else if (
        time === "1 to 2" &&
        spell.data?.actions !== "oneToTwoActions"
      ) {
        valuesToSet[`${dataPrefix}.actions`] = "oneToTwoActions";
      } else if (
        time === "1 to 3" &&
        spell.data?.actions !== "oneToThreeActions"
      ) {
        valuesToSet[`${dataPrefix}.actions`] = "oneToThreeActions";
      } else if (time === "reaction" && spell.data?.actions !== "reaction") {
        valuesToSet[`${dataPrefix}.actions`] = "reaction";
      }
    }

    // Show/hide ritual box
    const showRitualBox = spell.data?.type === "ritual";
    if (showRitualBox && spell.fields?.ritualBox?.hidden !== false) {
      valuesToSet[`${fieldsPath}.ritualBox.hidden`] = false;
    } else if (!showRitualBox && spell.fields?.ritualBox?.hidden !== true) {
      valuesToSet[`${fieldsPath}.ritualBox.hidden`] = true;
    }

    // Show/hide spell box
    if (!showRitualBox && spell.fields?.spellBox?.hidden !== false) {
      valuesToSet[`${fieldsPath}.spellBox.hidden`] = false;
    } else if (showRitualBox && spell.fields?.spellBox?.hidden !== true) {
      valuesToSet[`${fieldsPath}.spellBox.hidden`] = true;
    }

    // Make sure time is set to a valid value if we're not a ritual
    if (
      !showRitualBox &&
      !["reaction", "free", "1", "2", "3", "1 to 2", "1 to 3"].includes(
        spell.data?.time
      )
    ) {
      valuesToSet[`${dataPrefix}.time`] = "1";
      valuesToSet[`${dataPrefix}.actions`] = "oneAction";
    }

    const isCantrip = (spell.data?.traits || []).some(
      (trait) => trait?.toLowerCase() === "cantrip"
    );

    const level = spell.data?.level || 1;
    const levelLabel = `${
      isCantrip ? "Cantrip" : showRitualBox ? "Ritual" : "Spell"
    } ${level}`;
    if (levelLabel && spell.fields?.levelLabel?.hidden !== false) {
      valuesToSet[`${fieldsPath}.levelLabel.hidden`] = false;
    } else if (!levelLabel && spell.fields?.levelLabel?.hidden !== true) {
      valuesToSet[`${fieldsPath}.levelLabel.hidden`] = true;
    }

    if (levelLabel && spell.data?.levelLabel !== levelLabel) {
      valuesToSet[`${dataPrefix}.levelLabel`] = levelLabel;
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }

  function updateCastingTime() {
    const spellDataPath = getNearestParentDataPath(dataPath);
    const spell = spellDataPath ? api.getValue(spellDataPath) : record;
    const dataPrefix = spellDataPath ? `${spellDataPath}.data` : "data";
    const fieldsPath = spellDataPath ? `${spellDataPath}.fields` : "fields";

    const valuesToSet = {};

    const actions = spell.data?.actions;
    if (actions === "free") {
      valuesToSet[`${dataPrefix}.time`] = "free";
    } else if (actions === "oneAction") {
      valuesToSet[`${dataPrefix}.time`] = "1";
    } else if (actions === "twoActions") {
      valuesToSet[`${dataPrefix}.time`] = "2";
    } else if (actions === "threeActions") {
      valuesToSet[`${dataPrefix}.time`] = "3";
    } else if (actions === "oneToTwoActions") {
      valuesToSet[`${dataPrefix}.time`] = "1 to 2";
    } else if (actions === "oneToThreeActions") {
      valuesToSet[`${dataPrefix}.time`] = "1 to 3";
    } else if (actions === "reaction") {
      valuesToSet[`${dataPrefix}.time`] = "reaction";
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }
</script>

{"label": "Divine", "value": "Divine"},
{"label": "Occult", "value": "Occult"},
{"label": "Primal", "value": "Primal"}]'

        </div>
      </div>

        <dropdown

          options='[{"label": "Spell or Cantrip", "value": "spell"}, {"label": "Ritual", "value": "ritual"}]'
        ></dropdown>
      </div>
    </div>
  </div>
